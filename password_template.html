<!DOCTYPE html>
<html class="staticrypt-html">

        <title>/*[|template_title|]*/0</title>

        <style>
            * {
                font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
                box-sizing: border-box;
            }

            .staticrypt-html,
            .staticrypt-body {
                height: 100%;
                margin: 0;
            }

            .staticrypt-content {
                height: 100%;
                background: #F8F7F6;
                display: flex;
                align-items: center;
                justify-content: center;
                -webkit-font-smoothing: antialiased;
                -moz-osx-font-smoothing: grayscale;
            }

            .staticrypt-page {
                width: 100%;
                max-width: 400px;
                padding: 0 24px;
            }

            .staticrypt-form {
                background: #FFFFFF;
                border: 1px solid rgba(0,0,0,0.06);
                border-radius: 14px;
                padding: 40px;
                text-align: center;
                box-shadow: 0 2px 8px rgba(0,0,0,0.06), 0 1px 4px rgba(0,0,0,0.03);
            }

            .staticrypt-title {
                font-size: 18px;
                font-weight: 650;
                color: #1A1A1A;
                margin: 0 0 8px 0;
                letter-spacing: -0.025em;
            }

            .staticrypt-instructions {
                color: #9A9A9A;
                font-size: 13.5px;
                margin-bottom: 28px;
            }

            .staticrypt-hr {
                border: 0;
                border-top: 1px solid rgba(0,0,0,0.06);
                margin: 0 0 24px 0;
            }

            .staticrypt-password-container {
                position: relative;
                background: #FFFFFF;
                border: 1px solid rgba(0,0,0,0.06);
                border-radius: 12px;
                margin-bottom: 16px;
                width: 100%;
                box-shadow: 0 1px 2px rgba(0,0,0,0.04), 0 1px 4px rgba(0,0,0,0.02);
                transition: all 0.15s ease;
            }

            .staticrypt-password-container:focus-within {
                border-color: rgba(104,63,207,0.3);
                box-shadow: 0 2px 8px rgba(0,0,0,0.06), 0 0 0 3px rgba(104,63,207,0.08);
            }

            .staticrypt-form input[type="password"],
            .staticrypt-form input[type="text"] {
                background: transparent;
                border: 0;
                color: #1A1A1A;
                font-size: 13.5px;
                outline: 0;
                padding: 14px 44px 14px 16px;
                width: 100%;
                font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            }

            .staticrypt-form input[type="password"]::placeholder,
            .staticrypt-form input[type="text"]::placeholder {
                color: #C0C0C0;
            }

            .staticrypt-toggle-password-visibility {
                cursor: pointer;
                height: 18px;
                opacity: 30%;
                padding: 0;
                position: absolute;
                right: 14px;
                top: 50%;
                transform: translateY(-50%);
                width: 18px;
            }

            .staticrypt-form .staticrypt-decrypt-button {
                width: 100%;
                padding: 14px;
                background: #683FCF;
                color: #FFFFFF;
                border: 0;
                border-radius: 12px;
                font-size: 13.5px;
                font-weight: 600;
                font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
                cursor: pointer;
                letter-spacing: -0.01em;
                margin-top: 8px;
                transition: all 0.15s ease;
                box-shadow: 0 2px 8px rgba(104,63,207,0.3);
            }

            .staticrypt-form .staticrypt-decrypt-button:hover {
                background: #5a35b3;
            }

            .staticrypt-form .staticrypt-decrypt-button:active {
                background: #4e2e9c;
            }

            label.staticrypt-remember {
                display: flex;
                align-items: center;
                justify-content: center;
                margin-bottom: 12px;
                color: #6B6B6B;
                font-size: 12.5px;
                gap: 8px;
            }

            .staticrypt-remember input[type="checkbox"] {
                accent-color: #683FCF;
                width: 15px;
                height: 15px;
            }

            .hidden {
                display: none !important;
            }

            .staticrypt-spinner-container {
                height: 100%;
                display: flex;
                align-items: center;
                justify-content: center;
                background: #F8F7F6;
            }

            .staticrypt-spinner {
                display: inline-block;
                width: 2rem;
                height: 2rem;
                border: 0.25em solid rgba(0,0,0,0.08);
                border-right-color: #683FCF;
                border-radius: 50%;
                animation: spinner-border 0.75s linear infinite;
            }

            @keyframes spinner-border {
                100% { transform: rotate(360deg); }
            }
        </style>
    </head>

                        <input type="submit" class="staticrypt-decrypt-button" value="/*[|template_button|]*/0" />

            </div>

            const templateError = "/*[|template_error|]*/0",

                templateToggleAltHide = "/*[|template_toggle_hide|]*/0",
                isRememberEnabled = /*[|is_remember_enabled|]*/ 0,
                staticryptConfig = /*[|staticrypt_config|]*/ 0;

            const templateConfig = {
                rememberExpirationKey: "staticrypt_expiration",
                rememberPassphraseKey: "staticrypt_passphrase",
                replaceHtmlCallback: null,
                clearLocalStorageCallback: null,
            };

            const staticrypt = staticryptInitiator.init(staticryptConfig, templateConfig);

            window.onload = async function () {
                const { isSuccessful } = await staticrypt.handleDecryptOnLoad();
                if (!isSuccessful) {
                    document.getElementById("staticrypt_loading").classList.add("hidden");
                    document.getElementById("staticrypt_content").classList.remove("hidden");
                    document.getElementById("staticrypt-password").focus();
                    if (isRememberEnabled) {

            toggleIcon.addEventListener("click", function () {
                const passwordInput = document.getElementById("staticrypt-password");
                if (passwordInput.type === "password") {
                    passwordInput.type = "text";
                    toggleIcon.src = imgSrcEyeOpened;
                    toggleIcon.alt = templateToggleAltHide;
                    toggleIcon.title = templateToggleAltHide;
                } else {
                    passwordInput.type = "password";
                    toggleIcon.src = imgSrcEyeClosed;
                    toggleIcon.alt = templateToggleAltShow;
                    toggleIcon.title = templateToggleAltShow;
                }
            });

            document.getElementById("staticrypt-form").addEventListener("submit", async function (e) {
                e.preventDefault();
                const password = document.getElementById("staticrypt-password").value,
                    isRememberChecked = document.getElementById("staticrypt-remember").checked;
                const { isSuccessful } = await staticrypt.handleDecryptionOfPage(password, isRememberChecked);
                if (!isSuccessful) {
                    alert(templateError);
                }
            });
        </script>
    </body>
</html>
