function matchScriptedIntent(text) {
  if (!text) return null;
  const lower = text.toLowerCase();
  for (let i = 0; i < SCRIPTED_INTENTS.length; i++) {
    const intent = SCRIPTED_INTENTS[i];
    for (let j = 0; j < intent.keywords.length; j++) {
      if (lower.indexOf(intent.keywords[j]) !== -1) return intent;
    }
  }
  return null;
}

/* Render plain text with one substring bolded (used for the "9 skills" inline bold) */
function renderTextWithBold(text, boldPart) {
  if (!boldPart) return text;
  const idx = text.indexOf(boldPart);
  if (idx < 0) return text;
  return (
    <React.Fragment>
      {text.slice(0, idx)}
      <strong style={{ color: "#1a1a1a", fontWeight: 600 }}>{boldPart}</strong>
      {text.slice(idx + boldPart.length)}
    </React.Fragment>
  );
}

/* ─── Live chat widget (Chat 2.0) — accepts an optional preloaded shopper message ─── */
function ModalLiveChat({ preloadMessage }) {
  const [messages, setMessages] = useState([]);
  const [input, setInput] = useState("");
  const [sending, setSending] = useState(false);
  const [viewState, setViewState] = useState(preloadMessage ? "thread" : "home"); // home | transitioning | thread
  const threadRef = useRef(null);
  const preloadFiredRef = useRef(false);

  const [toastVisible, setToastVisible] = useState(false);
  const toastTimerRef = useRef(null);
  const showKnowledgeToast = () => {
    setToastVisible(true);
    if (toastTimerRef.current) clearTimeout(toastTimerRef.current);
    toastTimerRef.current = setTimeout(() => setToastVisible(false), 3000);
  };
  const dismissToast = () => {
    setToastVisible(false);
    if (toastTimerRef.current) { clearTimeout(toastTimerRef.current); toastTimerRef.current = null; }
  };
  useEffect(() => {
    return () => { if (toastTimerRef.current) clearTimeout(toastTimerRef.current); };
  }, []);

  useEffect(() => {
    if (threadRef.current) threadRef.current.scrollTop = threadRef.current.scrollHeight;
  }, [messages, sending]);

  const appendVisible = () => {
    setMessages((prev) => prev.map((m, i) => i === prev.length - 1 ? Object.assign({}, m, { visible: true }) : m));
  };

  const doAssistantReply = useCallback((text) => {
    setSending(true);
    const intent = matchScriptedIntent(text);
    setTimeout(() => {
      const payload = intent === null
        ? { role: "assistant", isFallback: true, visible: false }
        : { role: "assistant", text: intent.response, products: intent.products || null, visible: false };
      setMessages((prev) => prev.concat([payload]));
      setSending(false);
      setTimeout(appendVisible, 50);
    }, 700);
  }, []);

  const sendMessage = useCallback((text) => {
    if (!text || sending) return;
    const userMsg = { role: "user", text: text, visible: false };
    setInput("");
    if (viewState === "home" || viewState === "transitioning") {
      setViewState("transitioning");
      setTimeout(() => {
        setViewState("thread");
        setMessages((prev) => prev.concat([userMsg]));
        setTimeout(() => { appendVisible(); doAssistantReply(text); }, 50);
      }, 500);
    } else {
      setMessages((prev) => prev.concat([userMsg]));
      setTimeout(() => { appendVisible(); doAssistantReply(text); }, 50);
    }
  }, [sending, viewState, doAssistantReply]);

  /* Preload: fire once on mount with the supplied message, skip home view */
  useEffect(() => {
    if (!preloadMessage || preloadFiredRef.current) return;
    preloadFiredRef.current = true;
    const userMsg = { role: "user", text: preloadMessage, visible: false };
    setMessages([userMsg]);
    setTimeout(() => { appendVisible(); doAssistantReply(preloadMessage); }, 80);
  }, [preloadMessage, doAssistantReply]);

  const onChipClick = (chip) => sendMessage(chip);
  const onKeyDown = (e) => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(input.trim()); }
  };
  const handleBack = () => { setMessages([]); setViewState("home"); };

  const isTransitioning = viewState === "transitioning";

/* ─── Skill card (each skill is its own card, matches the Voice card visual style) ─── */

/* ─── Skill list: separate cards + inline "N more skills" expander (matches research "4 more" pattern) ─── */
function SkillListCard({ activeSkillIdx, expanded, onToggleExpanded, onPreview, onEdit }) {
  const visibleCount = 3;
  const visibleSkills = expanded ? SKILLS : SKILLS.slice(0, visibleCount);
  const hiddenCount = SKILLS.length - visibleCount;

  return (
    <div style={{ marginTop: 8 }}>
      {visibleSkills.map((skill, i) => (
        <SkillCard
          key={skill.key}
          skill={skill}
          index={i}
          isActive={activeSkillIdx === i}
          onPreview={onPreview}
          onEdit={onEdit}
        />
      ))}
      {hiddenCount > 0 && (
        <div
          onClick={onToggleExpanded}
          style={{
            display: "inline-flex", alignSelf: "flex-start",
            alignItems: "center", gap: 6,
            padding: "5px 8px", cursor: "pointer", borderRadius: 8,
            marginTop: 2, marginBottom: 8,
            width: "fit-content",
          }}
          onMouseEnter={(e) => { e.currentTarget.style.background = SURFACE; }}
          onMouseLeave={(e) => { e.currentTarget.style.background = "transparent"; }}
        >
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" style={{
            transition: "transform .2s",
            transform: expanded ? "rotate(180deg)" : "rotate(0deg)",
          }}>
            <path d="M4 5.5l3 3 3-3" stroke={TEXT_MUTED} strokeWidth="1.3" strokeLinecap="round" strokeLinejoin="round" />
          </svg>
          <span style={{ fontSize: 12, color: TEXT_MUTED }}>
            {expanded ? "Show less" : hiddenCount + " more skills"}
          </span>
        </div>
      )}
    </div>
  );
}

  );
}

/* ─── Main intake page (orchestrator) ─── */
function IntakePage() {
  const [sidebarCollapsed, setSidebarCollapsed] = useState(false);

  // Setup checklist (3 items, parallel to existing 6-item version)
  const [checklist, setChecklist] = useState({ tone: false, skills: false, channels: false });
  const completeChecklistItem = useCallback((key) => {
    setChecklist((prev) => prev[key] ? prev : { ...prev, [key]: true });
  }, []);

  // Cinematic
  const [cinematicPhase, setCinematicPhase] = useState("playing"); // "playing" | "done"
  const [landingClosing, setLandingClosing] = useState(false);
  const handleStartSetup = () => {
    if (landingClosing) return;
    setLandingClosing(true);
    setTimeout(() => {
      setCinematicPhase("done");
      setLandingClosing(false);
    }, 500);
  };
  const cinematicRef = useRef(null);

  // Welcome typing
  const [chatMessages, setChatMessages] = useState([]);
  const [typingText, setTypingText] = useState("");
  const [isTypingMessage, setIsTypingMessage] = useState(false);
  const [currentMsgIndex, setCurrentMsgIndex] = useState(0);

  // Free-form chat input (always visible at the bottom unless a picker takes over)
  const [chatInput, setChatInput] = useState("");
  const handleSend = () => {
    if (!chatInput.trim()) return;
    const userText = chatInput.trim();
    setChatInput("");
    if (activePanel === "edit") {
      // Route into edit-scoped thread, with a skill-aware stub Copilot ack
      setEditChatMessages((prev) => prev.concat([{ role: "user", text: userText }]));
      setTimeout(() => {
        setEditChatMessages((prev) => prev.concat([
          { role: "ai", text: "Got it — I’ll update the skill instructions to reflect that." },
        ]));
      }, 800);
    } else {
      setChatMessages((prev) => [...prev, { role: "user", text: userText }]);
      setTimeout(() => {
        setChatMessages((prev) => [...prev, { role: "ai", text: "Got it — I’ll factor that in. Want to keep going?" }]);
      }, 1000);
    }
  };
  const welcomeMessages = [
    { text: "I’m your Gorgias Copilot and I will work alongside you to learn about UrbanStems’ shoppers, priorities, and challenges." },
    { text: "By the end of this conversation, we’ll have AI Agent live and ready to help UrbanStems’s shoppers." },
    { text: "I’ll start by pulling up some publicly available information about your business to make sure I’ve got your brand right." },
  ];

  // Research
  const [researchPhase, setResearchPhase] = useState("idle"); // idle | running | done
  const [researchSources, setResearchSources] = useState([]);
  const [researchExpanded, setResearchExpanded] = useState(true);

  // Voice findings + card
  const [findingsTyping, setFindingsTyping] = useState(false);
  const [findingsText, setFindingsText] = useState("");
  const [findingsComplete, setFindingsComplete] = useState(false);
  const [showVoiceCard, setShowVoiceCard] = useState(false);
  const [showVoiceConfirm, setShowVoiceConfirm] = useState(false);
  const [voiceUserReply, setVoiceUserReply] = useState(null);
  const [voiceEditHelp, setVoiceEditHelp] = useState(null);
  const [voiceFreeform, setVoiceFreeform] = useState("");
  const findingsStartedRef = useRef(false);
  const findingsFullText = "Here’s how I’d describe UrbanStems’ voice based on your site, social, and product copy:";
  const findingsBold = "UrbanStems’ voice";
  const findingsFollowUp = "Take a quick look — does this sound like your brand? You can fine-tune these details later in settings at anytime.";

  // Right-side panels (Voice card / Preview / Edit)
  const [activePanel, setActivePanel] = useState(null); // null | "voice" | "preview" | "edit"
  const [activeSkillIdx, setActiveSkillIdx] = useState(null);
  const [panelClosing, setPanelClosing] = useState(false);
  const closePanel = () => {
    setPanelClosing(true);
    setTimeout(() => {
      setActivePanel(null);
      setActiveSkillIdx(null);
      setPanelClosing(false);
    }, 180);
  };

  // Skills phase: 3 sequential typed Copilot messages, then SkillListCard + QuestionCard, then confirmation row, then advance
  const [skillsPhase, setSkillsPhase] = useState("idle"); // idle | typing | shown | confirmed | done
  const [skillsMsgIdx, setSkillsMsgIdx] = useState(-1); // -1 idle, 0..2 = which msg is typing
  const [skillsTypingText, setSkillsTypingText] = useState("");
  const [skillsTypingActive, setSkillsTypingActive] = useState(false);
  const [skillsCommittedMessages, setSkillsCommittedMessages] = useState([]); // committed messages, sequential
  const SKILL_INTRO_MESSAGES = [
    { text: "Right now your AI Agent can answer most questions using the knowledge sources I pulled in — your help center, FAQs, product pages." },
    { text: "But, “can answer” isn’t the same as “answers the same way every time”." },
    { text: "That’s why I’ve drafted 9 skills based on best practices I see in gifting brands like UrbanStems. Each one replaces a “best guess” with a stable, reliable answer.", bold: "9 skills" },
  ];
  const [skillsExpanded, setSkillsExpanded] = useState(false);
  const [questionCardClosed, setQuestionCardClosed] = useState(false);
  const [skillSelection, setSkillSelection] = useState(null); // null | "all" | "pick" | "freeform"
  const [skillFreeform, setSkillFreeform] = useState("");
  const skillEnabledCount = 9; // stub — both "all" and "pick" enable all 9 for this prompt

  // Channels phase
  const [channelsPhase, setChannelsPhase] = useState("idle"); // idle | typing-intro | shown | done
  const [channelsTypingText, setChannelsTypingText] = useState("");
  const [channelsTypingActive, setChannelsTypingActive] = useState(false);
  const [channelsCommittedMessages, setChannelsCommittedMessages] = useState([]);
  const [channelsMsgIdx, setChannelsMsgIdx] = useState(-1);
  const CHANNEL_INTRO_MESSAGES = [
    { text: "Now, where should your AI Agent help shoppers? I found two channels active for UrbanStems:", bold: "two channels" },
    { text: "I’ve turned both on by default. You can toggle either off if you’d rather start with just one." },
  ];
  const [channelToggles, setChannelToggles] = useState({ email: true, chat: true });
  const [channelsCardClosed, setChannelsCardClosed] = useState(false);
  const [channelsFreeform, setChannelsFreeform] = useState("");

  // Edit panel follow-up state (one-shot stub: shows once when Edit is first opened)
  const [followUpAnswered, setFollowUpAnswered] = useState(false);
  const [followUpAnswer, setFollowUpAnswer] = useState(null);
  const [followUpAnswerSkillKey, setFollowUpAnswerSkillKey] = useState(null);
  const [followUpFreeform, setFollowUpFreeform] = useState("");
  const [editChatMessages, setEditChatMessages] = useState([]); // { role, text } appended on follow-up answer + free-text sends while Edit is open

  // Closing
  const [closingPhase, setClosingPhase] = useState("idle"); // idle | shown
  const [showConfetti, setShowConfetti] = useState(false);

  const chatEndRef = useRef(null);

  /* Landing → setup transition: phase advances on user click of Start setup (no auto-play animation) */
  /* Disabled cinematic (kept structure, gated to never run) */
  useEffect(() => {
    if (cinematicPhase !== "__never__") return;
    const el = cinematicRef.current;
    if (!el) return;
    const WELCOME_TEXT = "AI Agent";
    const words = WELCOME_TEXT.split(" ");
    el.innerHTML = "";
    const wordSpans = [];
    words.forEach((word, i) => {
      const span = document.createElement("span");
      span.textContent = word + (i < words.length - 1 ? " " : "");
      span.style.cssText = "display:inline-block; will-change:transform,filter,opacity;";
      el.appendChild(span);
      wordSpans.push(span);
      const anim = span.animate([
        { filter: "blur(10px)", opacity: 0,   transform: "translateY(-50px)" },
        { filter: "blur(5px)",  opacity: 0.5, transform: "translateY(5px)"   },
        { filter: "blur(0px)",  opacity: 1,   transform: "translateY(0px)"   },
      ], { duration: 1400, delay: i * 300, easing: "ease", fill: "both" });
      if (i === words.length - 1) {
        anim.addEventListener("finish", () => {
          setTimeout(() => {
            wordSpans.forEach((s, j) => {
              const exitAnim = s.animate([
                { opacity: 1, transform: "translateY(0px)",   filter: "blur(0px)" },
                { opacity: 0, transform: "translateY(-24px)", filter: "blur(4px)" },
              ], { duration: 700, delay: j * 150, easing: "ease", fill: "forwards" });
              if (j === wordSpans.length - 1) {
                exitAnim.addEventListener("finish", () => setCinematicPhase("done"));
              }
            });
          }, 1800);
        });
      }
    });
  }, [cinematicPhase]);

  /* Type welcome messages */
  useEffect(() => {
    if (cinematicPhase !== "done") return;
    if (currentMsgIndex >= welcomeMessages.length) return;
    const fullText = welcomeMessages[currentMsgIndex].text;
    let charIndex = 0;
    setIsTypingMessage(true);
    setTypingText("");
    const startDelay = setTimeout(() => {
      const interval = setInterval(() => {
        charIndex++;
        setTypingText(fullText.substring(0, charIndex));
        if (charIndex >= fullText.length) {
          clearInterval(interval);
          setIsTypingMessage(false);
          setChatMessages((prev) => [...prev, { role: "ai", text: fullText }]);
          setTypingText("");
          if (currentMsgIndex < welcomeMessages.length - 1) {
            setTimeout(() => setCurrentMsgIndex((p) => p + 1), 600);
          } else {
            setTimeout(() => setResearchPhase("running"), 800);
          }
        }
      }, 18);
    }, currentMsgIndex === 0 ? 500 : 300);
    return () => clearTimeout(startDelay);
  }, [currentMsgIndex, cinematicPhase]);

  /* Research source animation */
  useEffect(() => {
    if (researchPhase !== "running") return;
    let cancelled = false;
    let idx = 0;
    let timerId = null;
    const tick = () => {
      if (cancelled) return;
      if (idx >= VOICE_RESEARCH_SOURCES.length) {
        timerId = setTimeout(() => {
          if (!cancelled) { setResearchPhase("done"); setResearchExpanded(false); }
        }, 600);
        return;
      }
      const item = VOICE_RESEARCH_SOURCES[idx];
      if (item) setResearchSources((prev) => [...prev, item]);
      idx++;
      timerId = setTimeout(tick, 250 + Math.random() * 350);
    };
    timerId = setTimeout(tick, 400);
    return () => { cancelled = true; clearTimeout(timerId); };
  }, [researchPhase]);

  /* Findings typing */
  useEffect(() => {
    if (researchPhase !== "done") return;
    if (findingsStartedRef.current) return;
    findingsStartedRef.current = true;
    const startDelay = setTimeout(() => {
      setFindingsTyping(true);
      let charIdx = 0;
      const interval = setInterval(() => {
        charIdx++;
        setFindingsText(findingsFullText.substring(0, charIdx));
        if (charIdx >= findingsFullText.length) {
          clearInterval(interval);
          setFindingsTyping(false);
          setFindingsComplete(true);
          setFindingsText(findingsFullText);
          setTimeout(() => setShowVoiceCard(true), 300);
          setTimeout(() => setShowVoiceConfirm(true), 1500);
        }
      }, 14);
    }, 800);
    return () => clearTimeout(startDelay);
  }, [researchPhase]);

  /* Skills intro typing — 3 sequential messages */
  useEffect(() => {
    if (skillsPhase !== "typing") return;
    if (skillsMsgIdx < 0 || skillsMsgIdx >= SKILL_INTRO_MESSAGES.length) return;
    const msg = SKILL_INTRO_MESSAGES[skillsMsgIdx];
    const fullText = msg.text;
    let charIdx = 0;
    setSkillsTypingActive(true);
    setSkillsTypingText("");
    const interval = setInterval(() => {
      charIdx++;
      setSkillsTypingText(fullText.substring(0, charIdx));
      if (charIdx >= fullText.length) {
        clearInterval(interval);
        setSkillsTypingActive(false);
        // Commit message, then move to next or transition to "shown"
        setSkillsCommittedMessages((prev) => prev.concat([{ text: fullText, bold: msg.bold || null }]));
        setSkillsTypingText("");
        if (skillsMsgIdx < SKILL_INTRO_MESSAGES.length - 1) {
          setTimeout(() => setSkillsMsgIdx(skillsMsgIdx + 1), 500);
        } else {
          setTimeout(() => setSkillsPhase("shown"), 600);
        }
      }
    }, 14);
    return () => clearInterval(interval);
  }, [skillsPhase, skillsMsgIdx]);

  /* Channels intro typing — 2 sequential messages */
  useEffect(() => {
    if (channelsPhase !== "typing-intro") return;
    if (channelsMsgIdx < 0 || channelsMsgIdx >= CHANNEL_INTRO_MESSAGES.length) return;
    const msg = CHANNEL_INTRO_MESSAGES[channelsMsgIdx];
    const fullText = msg.text;
    let charIdx = 0;
    setChannelsTypingActive(true);
    setChannelsTypingText("");
    const interval = setInterval(() => {
      charIdx++;
      setChannelsTypingText(fullText.substring(0, charIdx));
      if (charIdx >= fullText.length) {
        clearInterval(interval);
        setChannelsTypingActive(false);
        setChannelsCommittedMessages((prev) => prev.concat([{ text: fullText, bold: msg.bold || null }]));
        setChannelsTypingText("");
        if (channelsMsgIdx < CHANNEL_INTRO_MESSAGES.length - 1) {
          setTimeout(() => setChannelsMsgIdx(channelsMsgIdx + 1), 500);
        } else {
          setTimeout(() => setChannelsPhase("shown"), 500);
        }
      }
    }, 14);
    return () => clearInterval(interval);
  }, [channelsPhase, channelsMsgIdx]);

  /* Auto-scroll */
  useEffect(() => {
    chatEndRef.current?.scrollIntoView({ behavior: "smooth", block: "end" });
  });

  /* Helper to kick off the skills typing sequence */
  const startSkillsTyping = () => {
    setSkillsPhase("typing");
    setSkillsMsgIdx(0);
  };

  /* Voice card actions */
  const handleVoiceYes = () => {
    setVoiceUserReply("Yes, looks good. I’ll adjust it later if needed.");
    setShowVoiceConfirm(false);
    completeChecklistItem("tone");
    closePanel();
    setTimeout(startSkillsTyping, 900);
  };
  const handleVoiceNo = () => {
    setVoiceUserReply("No, I need to update the tone of voice");
    setShowVoiceConfirm(false);
    setTimeout(() => {

                    onConfirm={onChannelConfirm}
                    onSkip={onChannelSkip}
                    onClose={onChannelClose}
                    freeformValue={channelsFreeform}
                    onFreeformChange={setChannelsFreeform}
                    onFreeformSubmit={onChannelFreeformSubmit}
                    frozen={false}
                  />
                ) : (skillsPhase === "shown" && !skillSelection && !questionCardClosed) ? (
                  <QuestionCard
                    onSelect={(key) => { if (key === "all") onSkillSelectAll(); else if (key === "pick") onSkillSelectPick(); }}
                    onClose={() => setQuestionCardClosed(true)}
                    freeformValue={skillFreeform}
                    onFreeformChange={setSkillFreeform}
                    onFreeformSubmit={onSkillFreeformSubmit}
                  />
                ) : showVoiceConfirm ? (
                  <div style={{
                    animation: "fadeInUp .35s ease-out",
                    border: "1px solid " + BORDER, borderRadius: 16, background: CARD_BG,
                    boxShadow: "0 2px 16px rgba(0,0,0,.04)",
                    overflow: "hidden",
                  }}>
                    <div style={{ padding: "14px 18px 12px", fontSize: 14, fontWeight: 600, color: TEXT, borderBottom: "1px solid " + BORDER }}>
                      Does this sound like UrbanStems?
                    </div>
                    {[
                      { label: "Yes, looks good. I’ll adjust it later if needed.", icon: "check", onClick: handleVoiceYes },
                      { label: "No, I need to update the tone of voice", icon: "cross", onClick: handleVoiceNo },
                    ].map((opt, oi) => (
                      <div key={oi}
                        onClick={opt.onClick}
                        style={{
                          padding: "12px 18px", cursor: "pointer", display: "flex", alignItems: "center", gap: 12,
                          transition: "background .15s",
                          borderBottom: "1px solid " + BORDER,
                          background: CARD_BG,
                        }}
                        onMouseEnter={(e) => { e.currentTarget.style.background = SURFACE; }}
                        onMouseLeave={(e) => { e.currentTarget.style.background = CARD_BG; }}
                      >
                        <div style={{
                          width: 26, height: 26, borderRadius: 6,
                          background: "transparent", border: "1px solid " + BORDER,
                          display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0,
                        }}>
                          {opt.icon === "check" ? (
                            <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M3.5 8.5l3 3 6-6.5" stroke={TEXT_MUTED} strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round" /></svg>
                          ) : (
                            <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M4 4l8 8M12 4l-8 8" stroke={TEXT_MUTED} strokeWidth="1.4" strokeLinecap="round" /></svg>
                          )}
                        </div>
                        <span style={{ fontSize: 14, color: TEXT, fontFamily: "'Inter', sans-serif" }}>{opt.label}</span>
                      </div>
                    ))}
                    {/* Freeform Something else */}
                    <div style={{ padding: "12px 18px", display: "flex", alignItems: "center", gap: 12 }}>
                      <div style={{
                        width: 26, height: 26, borderRadius: 6,
                        background: "transparent", border: "1px solid " + BORDER,
                        display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0,
                      }}>
                        <svg width="12" height="12" viewBox="0 0 16 16" fill="none">
                          <path d="M11.2 1.8a1.6 1.6 0 0 1 2.3 0l.7.7a1.6 1.6 0 0 1 0 2.3L5.7 13.3l-3.4.9.9-3.4Z" stroke={TEXT_MUTED} strokeWidth="1.2" strokeLinecap="round" strokeLinejoin="round" fill="none" />
                          <path d="M9.5 3.5l3 3" stroke={TEXT_MUTED} strokeWidth="1.2" strokeLinecap="round" />
                        </svg>
                      </div>
                      <input
                        value={voiceFreeform}
                        onChange={(e) => setVoiceFreeform(e.target.value)}
                        onKeyDown={(e) => { if (e.key === "Enter") { e.preventDefault(); handleVoiceFreeformSubmit(); } }}
                        placeholder="Something else..."
                        style={{
                          flex: 1, border: "none", outline: "none", background: "transparent",
                          fontSize: 14, fontFamily: "'Inter', sans-serif", color: TEXT,
                          fontStyle: voiceFreeform ? "normal" : "italic",
                        }}
                      />
                    </div>
                  </div>
                ) : (
                  <div style={{
                    border: "1.5px solid " + BORDER, borderRadius: 16, background: CARD_BG,
                    boxShadow: "0 2px 16px rgba(0,0,0,.06), 0 0 0 1px rgba(0,0,0,.02)",
                    display: "flex", flexDirection: "column", padding: "4px 6px",
                  }}>
                    <textarea
                      value={chatInput}
                      onChange={(e) => setChatInput(e.target.value)}
                      onKeyDown={(e) => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); if (!sendDisabled) handleSend(); } }}
                      placeholder={activePanel === "edit" && activeSkillIdx !== null ? (SKILLS[activeSkillIdx].editPlaceholder || EDIT_PLACEHOLDER_DEFAULT) : "Reply..."}
                      rows={1}
                      style={{
                        width: "100%", border: "none", outline: "none", resize: "none",
                        padding: "8px 10px 4px", fontSize: 14, lineHeight: 1.5,
                        fontFamily: "'Inter', sans-serif", color: TEXT, background: "transparent",
                      }}
                    />
                    <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "0 0 2px" }}>
                      <div style={{
                        width: 32, height: 32, borderRadius: 8, display: "flex",
                        alignItems: "center", justifyContent: "center", cursor: "pointer",
                        transition: "background .15s", flexShrink: 0,
                      }}
                        onMouseEnter={(e) => { e.currentTarget.style.background = SURFACE; }}
                        onMouseLeave={(e) => { e.currentTarget.style.background = "transparent"; }}
                      >
                        <svg width="15" height="15" viewBox="0 0 20 20" fill="none">
                          <path d="M14.5 10.5l-6.2 6.2a3.5 3.5 0 01-5-5l7.8-7.8a2.33 2.33 0 013.3 3.3l-7.1 7.1a1.17 1.17 0 01-1.7-1.6l6.2-6.2" stroke={TEXT_MUTED} strokeWidth="1.3" strokeLinecap="round" strokeLinejoin="round" />
                        </svg>
                      </div>
                      <button
                        onClick={() => { if (!sendDisabled) handleSend(); }}
                        disabled={sendDisabled}
                        style={{
                          width: 30, height: 30, borderRadius: 8, border: "none",
                          background: sendDisabled ? "#E0E0E0" : TEXT,
                          cursor: sendDisabled ? "not-allowed" : "pointer",
                          display: "flex", alignItems: "center", justifyContent: "center",
                          transition: "background .15s", flexShrink: 0,
                        }}
                      >
                        <svg width="13" height="13" viewBox="0 0 14 14" fill="none" style={{ transform: "rotate(-90deg)" }}>
                          <path d="M1 7h12M8 2l5 5-5 5" stroke="white" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" />
                        </svg>
                      </button>
                    </div>
                  </div>
                )}
              </div>
            </div>
          );
        })()}

        {/* Cinematic closing overlay — scoped to content area only; left nav stays visible */}
        {closingPhase === "shown" && (
          <ClosingScreen
            onTakeMeToInbox={() => {}}
            onInviteTeammate={() => {}}
          />
        )}

      </div>

      {/* Voice card panel */}
      {activePanel === "voice" && (
        <div style={{
          position: "fixed", top: 0, right: 0, height: "100vh", width: 480,
          zIndex: 1000,
          background: "#ffffff",
          borderLeft: "1px solid #EBECEF",
          boxShadow: "-8px 0 32px rgba(0,0,0,.06)",
          animation: panelClosing ? "slideOutRight .2s ease forwards" : "slideInRight .2s ease-out forwards",
          display: "flex", flexDirection: "column",
        }}>
          <div onClick={closePanel}
            style={{
              position: "absolute", top: 16, right: 16, zIndex: 2,
              width: 32, height: 32, borderRadius: 8,
              display: "flex", alignItems: "center", justifyContent: "center",
              cursor: "pointer", transition: "background .15s",
            }}
            onMouseEnter={(e) => { e.currentTarget.style.background = SURFACE; }}
            onMouseLeave={(e) => { e.currentTarget.style.background = "transparent"; }}
          >
            <svg width="16" height="16" viewBox="0 0 14 14" fill="none">
              <path d="M3 3l8 8M11 3l-8 8" stroke={TEXT_MUTED} strokeWidth="1.5" strokeLinecap="round" />
            </svg>
          </div>
          <div style={{ flex: 1, overflowY: "auto", padding: "32px 24px" }}>
            <VoiceCardPanel />
          </div>
        </div>
      )}

      {/* Preview panel */}
      {activePanel === "preview" && activeSkillIdx !== null && (
        <PreviewPanel skillIdx={activeSkillIdx} onClose={closePanel} closing={panelClosing} />
      )}

      {/* Edit panel */}
      {activePanel === "edit" && activeSkillIdx !== null && (
        <EditPanel
          skillIdx={activeSkillIdx}
          onClose={closePanel}
          closing={panelClosing}
          postEditAnswer={(activeSkillIdx !== null && SKILLS[activeSkillIdx].key === followUpAnswerSkillKey) ? followUpAnswer : null}
        />
      )}

      {showConfetti && <ConfettiBurst />}
    </div>
  );
}

const __default__ = function App() {
  return <IntakePage />;
};

class __ErrorBoundary__ extends React.Component {
  constructor(props) { super(props); this.state = { hasError: false, error: null, info: null }; }
  static getDerivedStateFromError(error) { return { hasError: true, error }; }
  componentDidCatch(error, info) {
    console.error('REACT_CRASH:', error.message);
    console.error('COMPONENT_STACK:', info.componentStack);
  }
  render() {
    if (this.state.hasError) {
      return React.createElement('div', { style: { color: 'red', padding: 40, fontSize: 16, fontFamily: 'monospace', whiteSpace: 'pre-wrap' } },
        'React Error: ' + this.state.error.message + '\n\nCheck browser console for details.');
    }
    return this.props.children;
  }
}
window.addEventListener('error', function(e) {
  console.error('GLOBAL_ERROR:', e.message, e.filename, e.lineno);
  var d = document.createElement('div');
  d.style.cssText = 'position:fixed;top:0;left:0;right:0;padding:20px;background:red;color:white;font:14px monospace;z-index:99999;white-space:pre-wrap';
  d.textContent = 'JS ERROR: ' + e.message + ' (line ' + e.lineno + ')';
  document.body.appendChild(d);
});
ReactDOM.createRoot(document.getElementById('root')).render(
  React.createElement(__ErrorBoundary__, null, React.createElement(__default__))
);
</script>
