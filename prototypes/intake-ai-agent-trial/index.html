function getNextFollowUp(skillKey, answersMap) {
  const followUps = SKILL_FOLLOWUPS[skillKey];
  if (!followUps) return null;
  const answers = answersMap[skillKey] || {};
  return followUps.find(fu => !(fu.field in answers)) || null;
}

function matchScriptedIntent(text) {
  if (!text) return null;
  const lower = text.toLowerCase();
  for (let i = 0; i < SCRIPTED_INTENTS.length; i++) {
    const intent = SCRIPTED_INTENTS[i];
    for (let j = 0; j < intent.keywords.length; j++) {
      if (lower.indexOf(intent.keywords[j]) !== -1) return intent;
    }
  }
  return null;
}

  { term: "tone of voice", group: "tov", tip: "The style and personality AI Agent uses in replies." },

];

function GlossaryTip({ tip, children }) {
  const [show, setShow] = React.useState(false);
  const [visible, setVisible] = React.useState(false);
  const ref = React.useRef(null);
  const [pos, setPos] = React.useState({ top: 0, left: 0 });

  React.useEffect(() => {
    if (show && ref.current) {
      const r = ref.current.getBoundingClientRect();
      setPos({ top: r.top - 8, left: r.left + r.width / 2 });
      requestAnimationFrame(() => setVisible(true));
    } else {
      setVisible(false);
    }
  }, [show]);

  return (
    <span
      ref={ref}
      onMouseEnter={() => setShow(true)}
      onMouseLeave={() => setShow(false)}
      style={{ borderBottom: "1px dotted #8992A0", cursor: "help", position: "relative" }}
    >
      {children}
      {show && ReactDOM.createPortal(
        <div style={{
          position: "fixed", top: pos.top, left: pos.left,
          transform: "translate(-50%, " + (visible ? "-100%" : "calc(-100% + 4px)") + ")",
          opacity: visible ? 1 : 0,
          transition: "opacity .15s ease, transform .15s ease",
          background: "#1E242E", color: "#fff",
          fontSize: 12, lineHeight: 1.4, fontWeight: 450,
          padding: "6px 10px", borderRadius: 8,
          maxWidth: 260, pointerEvents: "none",
          zIndex: 99999, fontFamily: "'Inter', sans-serif",
          boxShadow: "0 4px 12px rgba(0,0,0,.15)",
        }}>{tip}</div>,
        document.body
      )}
    </span>
  );
}

function renderThreadText(text, seenTerms) {
  if (!text) return text;
  const lower = text.toLowerCase();
  const matches = [];
  GLOSSARY_TERMS_BASE.forEach((g) => {
    const key = g.group || g.term;
    if (seenTerms && seenTerms.has(key)) return;
    const idx = lower.indexOf(g.term);
    if (idx < 0) return;
    const end = idx + g.term.length;
    const before = idx === 0 ? " " : text[idx - 1];
    const after = end >= text.length ? " " : text[end];
    if (/\W/.test(before) && /\W|$/.test(after)) {
      matches.push({ start: idx, end: end, tip: g.tip, term: g.term, group: key });
    }
  });
  if (matches.length === 0) return text;
  matches.sort((a, b) => a.start - b.start);
  const filtered = [];
  for (const m of matches) {
    if (filtered.length === 0 || m.start >= filtered[filtered.length - 1].end) {
      filtered.push(m);
      if (seenTerms) seenTerms.add(m.group);
    }
  }
  const out = [];
  let cursor = 0;
  filtered.forEach((m, idx) => {
    if (cursor < m.start) out.push(<React.Fragment key={"t" + idx}>{text.slice(cursor, m.start)}</React.Fragment>);
    out.push(<GlossaryTip key={"g" + idx} tip={m.tip}>{text.slice(m.start, m.end)}</GlossaryTip>);
    cursor = m.end;
  });
  if (cursor < text.length) out.push(<React.Fragment key="tend">{text.slice(cursor)}</React.Fragment>);
  return <React.Fragment>{out}</React.Fragment>;
}

function renderTextWithBold(text, boldPart, seenTerms) {
  return renderThreadText(text, seenTerms);
}

function ModalLiveChat({ preloadMessage, skillId }) {
  const [messages, setMessages] = useState([]);
  const [input, setInput] = useState("");
  const [sending, setSending] = useState(false);
  const [thinkingSteps, setThinkingSteps] = useState([]);
  const [thinkingStepIdx, setThinkingStepIdx] = useState(0);
  const pendingIntentRef = useRef(null);
  const [viewState, setViewState] = useState(preloadMessage ? "thread" : "home"); // home | transitioning | thread
  const threadRef = useRef(null);
  const preloadFiredRef = useRef(false);

  const [toastVisible, setToastVisible] = useState(false);
  const toastTimerRef = useRef(null);
  const showKnowledgeToast = () => {
    setToastVisible(true);
    if (toastTimerRef.current) clearTimeout(toastTimerRef.current);
    toastTimerRef.current = setTimeout(() => setToastVisible(false), 3000);
  };
  const dismissToast = () => {
    setToastVisible(false);
    if (toastTimerRef.current) { clearTimeout(toastTimerRef.current); toastTimerRef.current = null; }
  };
  useEffect(() => {
    return () => { if (toastTimerRef.current) clearTimeout(toastTimerRef.current); };
  }, []);

  useEffect(() => {
    if (threadRef.current) threadRef.current.scrollTop = threadRef.current.scrollHeight;
  }, [messages, sending]);

  const appendVisible = () => {
    setMessages((prev) => prev.map((m, i) => i === prev.length - 1 ? Object.assign({}, m, { visible: true }) : m));
  };

  const doAssistantReply = useCallback((text) => {
    const intent = matchScriptedIntent(text);
    pendingIntentRef.current = intent;
    const skill = typeof getSkill === "function" && skillId ? getSkill(skillId) : null;
    const steps = skill && skill.thinkingSteps && skill.thinkingSteps.length
      ? skill.thinkingSteps
      : ["Thinking…"];
    setThinkingSteps(steps);
    setThinkingStepIdx(0);
    setSending(true);
  }, [skillId]);

  useEffect(() => {
    if (!sending || thinkingSteps.length === 0) return;
    const timer = setTimeout(() => {
      if (thinkingStepIdx < thinkingSteps.length - 1) {
        setThinkingStepIdx((i) => i + 1);
      } else {
        const intent = pendingIntentRef.current;
        const payload = intent === null
          ? { role: "assistant", isFallback: true, visible: false }
          : { role: "assistant", text: intent.response, products: intent.products || null, visible: false };
        setMessages((prev) => prev.concat([payload]));
        setSending(false);
        setThinkingSteps([]);
        setThinkingStepIdx(0);
        pendingIntentRef.current = null;
        setTimeout(appendVisible, 50);
      }
    }, 2000);
    return () => clearTimeout(timer);
  }, [sending, thinkingStepIdx, thinkingSteps]);

  const sendMessage = useCallback((text) => {
    if (!text || sending) return;
    const userMsg = { role: "user", text: text, visible: false };
    setInput("");
    if (viewState === "home" || viewState === "transitioning") {
      setViewState("transitioning");
      setTimeout(() => {
        setViewState("thread");
        setMessages((prev) => prev.concat([userMsg]));
        setTimeout(() => { appendVisible(); doAssistantReply(text); }, 50);
      }, 500);
    } else {
      setMessages((prev) => prev.concat([userMsg]));
      setTimeout(() => { appendVisible(); doAssistantReply(text); }, 50);
    }
  }, [sending, viewState, doAssistantReply]);

  /* Preload: fire once on mount with the supplied message, skip home view */
  useEffect(() => {
    if (!preloadMessage || preloadFiredRef.current) return;
    preloadFiredRef.current = true;
    const userMsg = { role: "user", text: preloadMessage, visible: false };
    setMessages([userMsg]);
    setTimeout(() => { appendVisible(); doAssistantReply(preloadMessage); }, 80);
  }, [preloadMessage, doAssistantReply]);

  const onChipClick = (chip) => sendMessage(chip);
  const onKeyDown = (e) => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(input.trim()); }
  };
  const handleBack = () => { setMessages([]); setViewState("home"); };

                  <svg width="14" height="14" viewBox="0 0 14 14" fill="none" style={{ flexShrink: 0, transform: "rotate(180deg)" }}>
                    <path d="M4.5 6l2.5 2.5L9.5 6" stroke={TEXT_MUTED} strokeWidth="1.3" strokeLinecap="round" strokeLinejoin="round" />
                  </svg>
                )}
              </div>
              {item.children && item.children.map((child) => (
                <div key={child.key}
                  style={{
                    padding: "7px 10px 7px 40px", borderRadius: 8, fontSize: 13.5,
                    color: child.active ? "#7E55F6" : TEXT,
                    background: child.active ? ACCENT_LIGHT : "transparent",
                    fontWeight: child.active ? 600 : 450,
                    cursor: "pointer", transition: "all .15s",
                  }}
                  onMouseEnter={(e) => { if (!child.active) e.currentTarget.style.background = "#EBEBEB"; }}
                  onMouseLeave={(e) => { if (!child.active) e.currentTarget.style.background = child.active ? ACCENT_LIGHT : "transparent"; }}
                >
                  {child.label}
                </div>
              ))}
            </React.Fragment>
          ))}
        </div>
      )}

      {/* Spacer + Get started widget */}
      <div style={{ flex: 1 }} />

      {/* Collapsed checklist icon with hover popup */}
      {collapsed && cinematicDone && !showSkillsScreen && (() => {
        const total = checklistItems.length;
        const r = 9;
        const circumference = 2 * Math.PI * r;
        const dashLength = (completedCount / total) * circumference;
        const allDone = completedCount === total;
        const ringTrackColor = allDone ? "#DFF3E6" : "#EDE8F8";
        const ringFillColor = allDone ? "#1F8A4C" : "#7E55F6";
        return (
          <div
            ref={checklistIconRef}
            style={{ display: "flex", justifyContent: "center", paddingBottom: 8 }}
            onMouseEnter={() => setChecklistHover(true)}
            onMouseLeave={() => setChecklistHover(false)}
          >
            <div style={{
              width: 36, height: 36, borderRadius: 8,
              display: "flex", alignItems: "center", justifyContent: "center",
              cursor: "pointer", transition: "background .15s",
              background: checklistHover ? "#EBEBEB" : "transparent",
            }}>
              <svg width="24" height="24" viewBox="0 0 24 24" style={{ flexShrink: 0 }}>
                <circle cx="12" cy="12" r={r} fill="none" stroke={ringTrackColor} strokeWidth="2.5" />
                <circle
                  cx="12" cy="12" r={r} fill="none" stroke={ringFillColor} strokeWidth="2.5"
                  strokeDasharray={dashLength + " " + circumference}
                  strokeLinecap="round"
                  transform="rotate(-90 12 12)"
                  style={{ transition: "stroke-dasharray .35s ease" }}
                />
              </svg>
            </div>
            {checklistHover && (() => {
              const rect = checklistIconRef.current?.getBoundingClientRect();
              const popupLeft = rect ? rect.right + 12 : 72;
              const popupBottom = rect ? window.innerHeight - rect.bottom : 0;
              return (
              <div style={{
                position: "fixed", left: popupLeft, bottom: popupBottom,
                background: "#fff", borderRadius: 14,
                boxShadow: "0 4px 24px rgba(0,0,0,.10), 0 1px 3px rgba(0,0,0,.06)",
                border: "1px solid #EBECEF",
                padding: "16px 20px 18px", width: 240, zIndex: 9999,
              }}>
                <div style={{ fontSize: 14, fontWeight: 700, color: "#1A1918", marginBottom: 14, fontFamily: "'Inter', sans-serif" }}>Get started</div>
                <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
                  {checklistItems.map((item, idx) => {
                    const checked = checklist[item.key];
                    const firstUnchecked = checklistItems.findIndex(ci => !checklist[ci.key]);
                    const isInProgress = !checked && idx === firstUnchecked;
                    return (
                      <div key={item.key} style={{ display: "flex", alignItems: "center", gap: 10 }}>
                        {checked ? (
                          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" style={{ flexShrink: 0 }}>
                            <path d="M5 9.5l2.5 2.5L13 6" stroke={TEXT_MUTED} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" />
                          </svg>
                        ) : isInProgress ? (
                          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" style={{ flexShrink: 0 }}>
                            <circle cx="9" cy="9" r="6.5" fill="none" stroke="#C4C7CD" strokeWidth="1.4" />
                          </svg>
                        ) : (
                          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" style={{ flexShrink: 0 }}>
                            <circle cx="9" cy="9" r="6.5" fill="none" stroke="#D4D6DB" strokeWidth="1.4" strokeDasharray="3 3" />
                          </svg>
                        )}
                        <span style={{
                          fontSize: 14, fontWeight: checked ? 400 : 500, lineHeight: 1.3,
                          fontFamily: "'Inter', sans-serif",
                          color: checked ? TEXT_MUTED : "#1E242E",
                        }}>{item.label}</span>
                      </div>
                    );
                  })}
                </div>
              </div>
            ); })()}
          </div>
        );
      })()}
      {!collapsed && cinematicDone && !showSkillsScreen && (() => {
        const total = checklistItems.length;
        const r = 7;
        const circumference = 2 * Math.PI * r;
        const dashLength = (completedCount / total) * circumference;
        const allDone = completedCount === total;
        const ringTrackColor = allDone ? "#DFF3E6" : "#EDE8F8";
        const ringFillColor = allDone ? "#1F8A4C" : "#7E55F6";
        const ProgressRing = (
          <svg width="20" height="20" viewBox="0 0 20 20" style={{ flexShrink: 0 }}>
            <circle cx="10" cy="10" r={r} fill="none" stroke={ringTrackColor} strokeWidth="2.2" />
            <circle
              cx="10" cy="10" r={r} fill="none" stroke={ringFillColor} strokeWidth="2.2"
              strokeDasharray={dashLength + " " + circumference}
              strokeLinecap="round"
              transform="rotate(-90 10 10)"
              style={{ transition: "stroke-dasharray .35s ease, stroke .25s ease" }}
            />
          </svg>
        );
        const Chevron = (
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" style={{
            flexShrink: 0,
            transition: "transform .2s ease",
            transform: goliveExpanded ? "rotate(0deg)" : "rotate(-90deg)",
          }}>
            <path d="M3.5 5l3.5 3.5 3.5-3.5" stroke="#8A8A8A" strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round" />
          </svg>
        );
        const headerRow = (
          <div
            onClick={() => setGoliveExpanded((p) => !p)}
            style={{
              display: "flex", alignItems: "center", gap: 10,
              padding: goliveExpanded ? "14px 16px 12px" : "8px 12px 8px 10px",
              cursor: "pointer", userSelect: "none",
              borderBottom: goliveExpanded ? "1px solid #EBECEF" : "none",
            }}
          >
            {ProgressRing}
            <span style={{
              fontSize: 13, fontWeight: 600, color: "#1A1918",
              fontFamily: "'Inter', sans-serif", flex: 1,
            }}>Get started</span>
            <span style={{
              fontSize: 12, fontWeight: 400, color: "#8A8A8A",
              fontFamily: "'Inter', sans-serif", whiteSpace: "nowrap",
            }}>{completedCount} of {total}</span>
            {Chevron}
          </div>
        );
        return (
          <div style={{ padding: 12 }}>
            <div style={{
              background: "#ffffff",
              border: "1px solid #EBECEF",
              borderRadius: 14,
              boxShadow: "0 1px 2px rgba(0,0,0,0.04), 0 4px 12px rgba(0,0,0,0.06)",
              overflow: "hidden",
            }}>
              {headerRow}
              <div style={{
                maxHeight: goliveExpanded ? 400 : 0,
                opacity: goliveExpanded ? 1 : 0,
                overflow: "hidden",
                transition: goliveExpanded
                  ? "max-height .32s cubic-bezier(.16,1,.3,1), opacity .22s ease .06s"
                  : "max-height .26s cubic-bezier(.7,0,.84,0), opacity .14s ease",
              }}>
                <div style={{
                  display: "flex", flexDirection: "column", gap: 14,
                  padding: "14px 16px 16px",
                }}>
                  {checklistItems.map((item) => {
                    const checked = checklist[item.key];
                    return (
                      <div key={item.key} style={{
                        display: "flex", alignItems: "center", gap: 10,
                      }}>
                        {checked ? (
                          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" style={{ flexShrink: 0 }}>
                            <circle cx="8" cy="8" r="7" fill="#7E55F6" />
                            <path d="M5 8.2l2 2 4-4.4" stroke="#fff" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round" />
                          </svg>
                        ) : (
                          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" style={{ flexShrink: 0 }}>
                            <circle cx="8" cy="8" r="7" fill="none" stroke="#C4C7CD" strokeWidth="1.4" />
                          </svg>
                        )}
                        <span style={{
                          fontSize: 13, fontWeight: 400, lineHeight: 1.4,
                          fontFamily: "'Inter', sans-serif",
                          color: checked ? "#8A8A8A" : "#1E242E",
                          textDecoration: checked ? "line-through" : "none",
                        }}>{item.label}</span>
                      </div>
                    );
                  })}
                </div>
              </div>
            </div>
          </div>
        );
      })()}

      {/* Bottom bar */}
      {collapsed ? (
        <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 6, padding: "0 0 14px" }}>
          <div style={{ width: 28, height: 1, background: BORDER, marginBottom: 2 }} />
          {/* Gear */}
          <div style={{ width: 36, height: 36, borderRadius: 8, display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer", transition: "background .15s" }}
            onMouseEnter={(e) => { e.currentTarget.style.background = "#EBEBEB"; }}
            onMouseLeave={(e) => { e.currentTarget.style.background = "transparent"; }}
          >
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
              <path d="M10 12.5a2.5 2.5 0 100-5 2.5 2.5 0 000 5z" stroke={TEXT} strokeWidth="1.3" />
              <path d="M16.2 12.2l-.8-.4a6.3 6.3 0 000-3.6l.8-.4a.8.8 0 00.3-1.1l-.6-1a.8.8 0 00-1.1-.3l-.8.4a5.7 5.7 0 00-3.2-1.8V3.2a.8.8 0 00-.8-.8h-1a.8.8 0 00-.8.8v.8A5.7 5.7 0 005 5.8l-.8-.4a.8.8 0 00-1.1.3l-.6 1a.8.8 0 00.3 1.1l.8.4a6.3 6.3 0 000 3.6l-.8.4a.8.8 0 00-.3 1.1l.6 1a.8.8 0 001.1.3l.8-.4a5.7 5.7 0 003.2 1.8v.8c0 .4.3.8.8.8h1c.4 0 .8-.3.8-.8v-.8a5.7 5.7 0 003.2-1.8l.8.4a.8.8 0 001.1-.3l.6-1a.8.8 0 00-.3-1.1z" stroke={TEXT} strokeWidth="1.1" />
            </svg>
          </div>
          {/* Question mark */}
          <div style={{ width: 36, height: 36, borderRadius: 8, display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer", transition: "background .15s" }}
            onMouseEnter={(e) => { e.currentTarget.style.background = "#EBEBEB"; }}
            onMouseLeave={(e) => { e.currentTarget.style.background = "transparent"; }}
          >
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
              <circle cx="10" cy="10" r="7.5" stroke={TEXT} strokeWidth="1.4" />
              <path d="M8 7.8a2.2 2.2 0 014 1.2c0 1.5-2 1.5-2 3" stroke={TEXT} strokeWidth="1.3" strokeLinecap="round" />
              <circle cx="10" cy="14" r=".8" fill={TEXT} />
            </svg>
          </div>
          {/* Avatar */}
          <div style={{
            width: 32, height: 32, borderRadius: "50%", background: "#D8D8D8",
            display: "flex", alignItems: "center", justifyContent: "center",
            fontSize: 11, fontWeight: 600, color: TEXT, flexShrink: 0, position: "relative",
          }}>
            JN
            <div style={{
              position: "absolute", bottom: -1, right: -1,
              width: 10, height: 10, borderRadius: "50%",
              background: "#34c759", border: "2px solid #fafafa",
            }} />
          </div>
        </div>
      ) : (
        <div style={{
          padding: "10px 12px 14px",
          borderTop: "1px solid " + BORDER,
          display: "flex", alignItems: "center", justifyContent: "space-between", gap: 8,
        }}>
          <div style={{
            width: 32, height: 32, borderRadius: "50%", background: "#D8D8D8",
            display: "flex", alignItems: "center", justifyContent: "center",
            fontSize: 11, fontWeight: 600, color: TEXT, flexShrink: 0, position: "relative",
          }}>
            JN
            <div style={{
              position: "absolute", bottom: -1, right: -1,
              width: 10, height: 10, borderRadius: "50%",
              background: "#34c759", border: "2px solid #fafafa",
            }} />
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 2 }}>
            <div style={{ width: 30, height: 30, borderRadius: 7, display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer", transition: "background .15s" }}
              onMouseEnter={(e) => { e.currentTarget.style.background = "#EBEBEB"; }}
              onMouseLeave={(e) => { e.currentTarget.style.background = "transparent"; }}
            >
              <svg width="18" height="18" viewBox="0 0 20 20" fill="none">
                <path d="M10 2l1.8 1.2 2.1-.4.9 2 1.8 1.2-.4 2.1L17.4 10l-1.2 1.8.4 2.1-1.8 1.2-.9 2-2.1-.4L10 18l-1.8-1.2-2.1.4-.9-2-1.8-1.2.4-2.1L2.6 10l1.2-1.8-.4-2.1 1.8-1.2.9-2 2.1.4L10 2z" stroke={TEXT} strokeWidth="1.3" strokeLinejoin="round" />
                <circle cx="10" cy="10" r="2.5" stroke={TEXT} strokeWidth="1.3" />
              </svg>
            </div>
            <div style={{ width: 30, height: 30, borderRadius: 7, display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer", transition: "background .15s" }}
              onMouseEnter={(e) => { e.currentTarget.style.background = "#EBEBEB"; }}
              onMouseLeave={(e) => { e.currentTarget.style.background = "transparent"; }}
            >
              <svg width="18" height="18" viewBox="0 0 20 20" fill="none">
                <path d="M10 3a5 5 0 0 0-5 5v3l-1.5 2h13L15 11V8a5 5 0 0 0-5-5z" stroke={TEXT} strokeWidth="1.4" strokeLinejoin="round" />
                <path d="M8 15a2 2 0 0 0 4 0" stroke={TEXT} strokeWidth="1.4" strokeLinecap="round" />
              </svg>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ─── Skill card (each skill is its own card, matches the Voice card visual style) ─── */
function SkillCard({ skill, index, isActive, onPreview, onEdit, needsInfo, answeredSkillKeys, actionDeclinedKeys, draftKeys }) {
  const isAnswered = answeredSkillKeys && answeredSkillKeys.has(skill.key);
  const isActionDeclined = actionDeclinedKeys && actionDeclinedKeys.has(skill.key);
  return (
    <div style={{
      border: isActive ? "1px solid " + ACCENT : "1px solid " + BORDER,
      borderRadius: 12,
      background: CARD_BG, overflow: "hidden",
      display: "flex", alignItems: "center", gap: 14,
      padding: "14px 16px",
      transition: "border-color .15s, box-shadow .15s",
      animation: "fadeInUp .35s cubic-bezier(.16,1,.3,1) forwards",
      marginBottom: 10,
    }}>
      <div style={{
        width: 56, height: 56, borderRadius: 10, background: SURFACE, flexShrink: 0,
        display: "flex", alignItems: "center", justifyContent: "center",
      }}>{skill.icon}</div>
      <div style={{ flex: 1, display: "flex", flexDirection: "column", gap: 6, minWidth: 0 }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 8 }}>
          <div style={{ minWidth: 0, display: "flex", alignItems: "center", gap: 6, flexWrap: "wrap" }}>
            {draftKeys && draftKeys.has(skill.key) ? (
              <span style={{
                fontSize: 11, fontWeight: 500, color: "#9CA3AF",
                border: "1px solid " + BORDER, padding: "2px 8px", borderRadius: 6,
                lineHeight: 1.3, whiteSpace: "nowrap",
                display: "inline-flex", alignItems: "center", gap: 4,
              }}>
                <span style={{ color: "#9CA3AF", fontSize: 8 }}>●</span> Draft
              </span>
            ) : needsInfo && (
              isAnswered ? (
                <span style={{
                  fontSize: 11, fontWeight: 500, color: "#555",
                  border: "1px solid " + BORDER, padding: "2px 8px", borderRadius: 6,
                  lineHeight: 1.3, whiteSpace: "nowrap",
                  display: "inline-flex", alignItems: "center", gap: 4,
                }}>
                  <span style={{ color: "#34C759", fontSize: 8 }}>●</span> Ready to enable
                </span>
              ) : (
                <span style={{
                  fontSize: 11, fontWeight: 500, color: "#A94F13",
                  border: "1px solid " + BORDER, padding: "2px 8px", borderRadius: 6,
                  lineHeight: 1.3, whiteSpace: "nowrap",
                  display: "inline-flex", alignItems: "center", gap: 4,
                }}>
                  <span style={{ color: "#E8912D", fontSize: 8 }}>●</span> Needs review
                </span>
              )
            )}
            {skill.takesAction && !isActionDeclined && (
              <span style={{
                fontSize: 11, fontWeight: 500, color: "#555",
                border: "1px solid " + BORDER, padding: "2px 8px 2px 5px", borderRadius: 6,
                lineHeight: 1.3, whiteSpace: "nowrap",
                display: "inline-flex", alignItems: "center", gap: 4,
              }}>
                <span style={{ width: 14, height: 14, borderRadius: 3, background: "#E8F5E9", display: "inline-flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                  <svg width="9" height="10" viewBox="0 0 11 12" fill="none"><path d="M7.5 2.5C7.5 2.5 7 2 6 2S4.5 2.8 4.5 2.8L4 4H3L2 11h7l-1-7H7l-.5-1.5z" fill="#95BF47" /><path d="M7 4L7.5 2.5C7.5 2.5 7 2 6 2v9l3 0-1-7H7z" fill="#5E8E3E" /></svg>
                </span>
                Takes action
              </span>
            )}
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 8, flexShrink: 0 }}>
            <button
              onClick={(e) => { e.stopPropagation(); onEdit(index); }}
              style={BTN_TERTIARY_SM}
              onMouseEnter={(e) => { Object.assign(e.currentTarget.style, BTN_TERTIARY_HOVER); }}
              onMouseLeave={(e) => { Object.assign(e.currentTarget.style, BTN_TERTIARY_LEAVE); }}
            >View</button>
            {(() => { const testDisabled = (needsInfo && !isAnswered) || (draftKeys && draftKeys.has(skill.key)); return (
            <button
              onClick={(e) => { e.stopPropagation(); if (!testDisabled) onPreview(index); }}
              disabled={testDisabled}
              style={{ ...BTN_SECONDARY_SM, opacity: testDisabled ? 0.4 : 1, cursor: testDisabled ? "default" : "pointer" }}
              onMouseEnter={(e) => { if (!testDisabled) Object.assign(e.currentTarget.style, BTN_SECONDARY_HOVER); }}
              onMouseLeave={(e) => { if (!testDisabled) Object.assign(e.currentTarget.style, BTN_SECONDARY_LEAVE); }}
            >Test</button>
            ); })()}
          </div>
        </div>
        <span style={{ fontSize: 13, fontWeight: 600, color: TEXT, lineHeight: 1.3 }}>{skill.title}</span>
      </div>
    </div>
  );
}

/* ─── Skill list: separate cards + inline "N more skills" expander (matches research "4 more" pattern) ─── */
function SkillListCard({ skills = SKILLS, startIndex = 0, visibleCount = 3, needsInfo = false, answeredSkillKeys, actionDeclinedKeys, activeSkillIdx, expanded, onToggleExpanded, onPreview, onEdit, draftKeys }) {
  const hiddenCount = skills.length - visibleCount;
  const peekSkill = !expanded && hiddenCount > 0 ? skills[visibleCount] : null;

  return (
    <div style={{ marginTop: 8 }}>
      {(expanded ? skills : skills.slice(0, visibleCount)).map((skill, i) => (
        <SkillCard
          key={skill.key}
          skill={skill}
          index={startIndex + i}
          isActive={activeSkillIdx === startIndex + i}
          onPreview={onPreview}
          onEdit={onEdit}
          needsInfo={needsInfo}
          answeredSkillKeys={answeredSkillKeys}
          actionDeclinedKeys={actionDeclinedKeys}
          draftKeys={draftKeys}
        />
      ))}
      {peekSkill && (
        <div style={{ position: "relative", maxHeight: 38, overflow: "hidden" }}>
          <div style={{ pointerEvents: "none", opacity: 0.7 }}>
            <SkillCard
              skill={peekSkill}
              index={startIndex + visibleCount}
              isActive={false}
              onPreview={() => {}}
              onEdit={() => {}}
              needsInfo={needsInfo}
              answeredSkillKeys={answeredSkillKeys}
              actionDeclinedKeys={actionDeclinedKeys}
              draftKeys={draftKeys}
            />
          </div>
          <div style={{
            position: "absolute", top: 0, left: 0, right: 0, bottom: 0,
            background: "linear-gradient(to bottom, rgba(255,255,255,0) 0%, rgba(255,255,255,1) 100%)",
            pointerEvents: "none",
          }} />
        </div>
      )}
      {hiddenCount > 0 && (
        <div
          onClick={onToggleExpanded}
          style={{
            display: "inline-flex", alignSelf: "flex-start",
            alignItems: "center", gap: 6, padding: "5px 8px",
            cursor: "pointer", borderRadius: 8,
            marginTop: 2, marginBottom: 8,
            width: "fit-content",
          }}
          onMouseEnter={(e) => { e.currentTarget.style.background = SURFACE; }}
          onMouseLeave={(e) => { e.currentTarget.style.background = "transparent"; }}
        >
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d={expanded ? "M4 8.5l3-3 3 3" : "M4 5.5l3 3 3-3"} stroke={TEXT_MUTED} strokeWidth="1.3" strokeLinecap="round" strokeLinejoin="round" />
          </svg>
          <span style={{ fontSize: 12, color: TEXT_MUTED }}>
            {expanded ? "Show less" : "Show " + hiddenCount + " more skill" + (hiddenCount !== 1 ? "s" : "")}
          </span>
        </div>
      )}
    </div>
  );
}

/* ─── Chat input bar: single-line with +, send/thinking icon ─── */
function ChatInputBar({ value, onChange, onSend, onKeyDown, placeholder, sendDisabled, thinking }) {
  const [focused, setFocused] = useState(false);
  const filled = value && value.trim().length > 0;
  return (
    <div style={{
      display: "flex", alignItems: "center", gap: 10,
      border: focused && !thinking ? "1px solid #8992A0" : "1px solid rgba(0,0,0,0.08)",
      borderRadius: 8,
      background: "#ffffff",
      padding: filled && !thinking ? "6px 8px" : "6px 4px 6px 8px",
      height: 40,
      transition: "border-color .15s ease, opacity .15s ease",
      opacity: thinking ? 0.6 : 1,
    }}>
      <input
        value={thinking ? "" : value}
        onChange={thinking ? undefined : onChange}
        onKeyDown={thinking ? undefined : onKeyDown}
        onFocus={() => setFocused(true)}
        onBlur={() => setFocused(false)}
        disabled={thinking}
        placeholder={placeholder || "Send a message..."}
        style={{
          flex: 1, border: "none", outline: "none", background: "transparent",
          fontSize: 14, fontWeight: 400, lineHeight: "20px",
          fontFamily: "'Inter', sans-serif",
          color: thinking ? "#8992A0" : (filled ? "#1E242E" : "#8992A0"),
          minWidth: 0,
          cursor: thinking ? "default" : "text",
        }}
      />

/* ─── Skill follow-up card: bold question + close + numbered options + freeform ─── */
function SkillFollowUpCard({ followUps, onComplete, onDismiss, onAnswerChange }) {
  const [stepIdx, setStepIdx] = useState(0);
  const [answers, setAnswers] = useState({});
  const [freeformValue, setFreeformValue] = useState("");
  const total = followUps.length;
  const current = followUps[stepIdx];
  const selectedAnswer = answers[current.field] || null;

  const advance = (newAnswers) => {
    if (stepIdx < total - 1) {
      setStepIdx(stepIdx + 1);
      setFreeformValue("");
    } else {
      onComplete(newAnswers || answers);
    }
  };

  const selectOption = (opt) => {
    const updated = { ...answers, [current.field]: opt };
    setAnswers(updated);
    if (onAnswerChange) onAnswerChange(current.field, opt);
    advance(updated);
  };

  const submitFreeform = () => {
    if (!freeformValue.trim()) return;
    selectOption(freeformValue.trim());
    setFreeformValue("");
  };

  const skipQuestion = () => {
    advance(answers);
  };

  const goPrev = () => { if (stepIdx > 0) { setStepIdx(stepIdx - 1); setFreeformValue(""); } };
  const goNext = () => { if (stepIdx < total - 1) { setStepIdx(stepIdx + 1); setFreeformValue(""); } };

  const chevronStyle = (enabled) => ({
    width: 24, height: 24, borderRadius: 4,
    display: "flex", alignItems: "center", justifyContent: "center",
    cursor: enabled ? "pointer" : "default",
    opacity: enabled ? 1 : 0.3,
  });

  return (
    <div style={{
      animation: "fadeInUp .35s ease-out",
      border: "1px solid " + BORDER, borderRadius: 8, background: "#ffffff",
      overflow: "hidden",
    }}>
      {/* Header: question + pagination + close */}
      <div style={{
        padding: "14px 16px 12px",
        display: "flex", alignItems: "center", justifyContent: "space-between",
      }}>
        <div style={{ fontSize: 14, fontWeight: 600, color: "#1E242E", flex: 1, minWidth: 0 }}>
          {current.question}
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 4, flexShrink: 0, marginLeft: 12 }}>
          <div onClick={goPrev} style={chevronStyle(stepIdx > 0)}>
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
              <path d="M10 4l-4 4 4 4" stroke={TEXT_MUTED} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" />
            </svg>
          </div>
          <span style={{ fontSize: 12, fontWeight: 500, color: TEXT_MUTED, whiteSpace: "nowrap" }}>{stepIdx + 1} of {total}</span>
          <div onClick={goNext} style={chevronStyle(stepIdx < total - 1)}>
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
              <path d="M6 4l4 4-4 4" stroke={TEXT_MUTED} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" />
            </svg>
          </div>
          <div
            onClick={onDismiss}
            style={{
              width: 24, height: 24, borderRadius: 6, marginLeft: 4,
              display: "flex", alignItems: "center", justifyContent: "center",
              cursor: "pointer",
            }}
          >
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
              <path d="M3 3l8 8M11 3l-8 8" stroke={TEXT_MUTED} strokeWidth="1.3" strokeLinecap="round" />
            </svg>
          </div>
        </div>
      </div>

      {/* Numbered options */}
      {current.options.map((opt, oi) => {
        const optLabel = typeof opt === "string" ? opt : opt.label;
        const optSublabel = typeof opt === "string" ? null : opt.sublabel;
        const optIcon = typeof opt === "string" ? null : opt.icon;
        const isSelected = selectedAnswer === optLabel;
        return (
          <div key={oi}
            onClick={() => selectOption(optLabel)}
            style={{
              padding: "14px 16px", cursor: "pointer",
              display: "flex", alignItems: "flex-start", gap: 12,
              transition: "background .15s",
              borderTop: "1px solid " + BORDER,
              background: isSelected ? "#F0F5FF" : "#ffffff",
            }}
            onMouseEnter={(e) => { if (!isSelected) e.currentTarget.style.background = SURFACE; }}
            onMouseLeave={(e) => { if (!isSelected) e.currentTarget.style.background = isSelected ? "#F0F5FF" : "#ffffff"; }}
          >
            <div style={{
              width: 26, height: 26, borderRadius: 6, marginTop: 1,
              background: isSelected ? ACCENT : "transparent",
              border: isSelected ? "1px solid " + ACCENT : "1px solid " + BORDER,
              display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0,
              fontSize: 12, fontWeight: 600, color: isSelected ? "#fff" : TEXT_MUTED,
            }}>
              {optIcon === "check" ? (
                <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M3.5 8.5l3 3 6-6.5" stroke={isSelected ? "#fff" : TEXT_MUTED} strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round" /></svg>
              ) : optIcon === "cross" ? (
                <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M4 4l8 8M12 4l-8 8" stroke={isSelected ? "#fff" : TEXT_MUTED} strokeWidth="1.4" strokeLinecap="round" /></svg>
              ) : (oi + 1)}
            </div>
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                <span style={{ fontSize: 14, color: "#1E242E", fontFamily: "'Inter', sans-serif" }}>{optLabel}</span>
                {current.aiDetectedOption === optLabel && (
                  <span style={{
                    fontSize: 11, fontWeight: 500,
                    color: ACCENT, background: ACCENT_LIGHT,
                    padding: "2px 8px", borderRadius: 6,
                    whiteSpace: "nowrap",
                  }}>AI detected</span>
                )}
              </div>
              {optSublabel && (
                <span style={{ fontSize: 13, color: "#8992A0", lineHeight: 1.4, marginTop: 2, display: "block" }}>{optSublabel}</span>
              )}
            </div>
          </div>
        );
      })}

      {/* Freeform Something else */}
      <div style={{ padding: "14px 16px", display: "flex", alignItems: "center", gap: 12, borderTop: "1px solid " + BORDER }}>
        <div style={{
          width: 26, height: 26, borderRadius: 6,
          background: "transparent", border: "1px solid " + BORDER,
          display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0,
        }}>
          <svg width="12" height="12" viewBox="0 0 16 16" fill="none">
            <path d="M11.2 1.8a1.6 1.6 0 0 1 2.3 0l.7.7a1.6 1.6 0 0 1 0 2.3L5.7 13.3l-3.4.9.9-3.4Z" stroke={TEXT_MUTED} strokeWidth="1.2" strokeLinecap="round" strokeLinejoin="round" fill="none" />
            <path d="M9.5 3.5l3 3" stroke={TEXT_MUTED} strokeWidth="1.2" strokeLinecap="round" />
          </svg>
        </div>
        <input
          value={freeformValue}
          onChange={(e) => setFreeformValue(e.target.value)}
          onKeyDown={(e) => { if (e.key === "Enter") { e.preventDefault(); submitFreeform(); } }}
          placeholder="Something else..."
          style={{
            flex: 1, border: "none", outline: "none", background: "transparent",
            fontSize: 14, fontFamily: "'Inter', sans-serif", color: "#1E242E",
            fontStyle: freeformValue ? "normal" : "italic",
          }}
        />
      </div>

      {/* Footer: hint + Skip */}
      <div style={{
        padding: "10px 16px", borderTop: "1px solid " + BORDER,
        display: "flex", alignItems: "center", justifyContent: "space-between",
      }}>
        <span style={{ fontSize: 12, color: TEXT_MUTED }}>Pick an option or skip question</span>
        <button
          onClick={skipQuestion}
          style={{
            fontSize: 12, fontWeight: 500, color: TEXT,
            background: "#fff", border: "1px solid " + BORDER, borderRadius: 6,
            padding: "4px 12px", cursor: "pointer",
          }}
        >Skip</button>
      </div>
    </div>
  );
}

          position: "absolute", top: 20, right: 20, zIndex: 2,
          width: 32, height: 32, borderRadius: 8,
          display: "flex", alignItems: "center", justifyContent: "center",
          cursor: "pointer", transition: "background .15s",
        }}
        onMouseEnter={(e) => { e.currentTarget.style.background = SURFACE; }}
        onMouseLeave={(e) => { e.currentTarget.style.background = "transparent"; }}
      >
        <svg width="16" height="16" viewBox="0 0 14 14" fill="none">
          <path d="M3 3l8 8M11 3l-8 8" stroke={TEXT_MUTED} strokeWidth="1.5" strokeLinecap="round" />
        </svg>
      </div>

      {/* Body */}
      <div style={{ flex: 1, overflowY: "auto", padding: "32px 36px 24px" }}>
        {/* Title */}
        <h2 style={{
          fontFamily: "'Inter', sans-serif",
          fontSize: 28, fontWeight: 700, color: TEXT,
          marginBottom: 6, paddingRight: 40,
        }}>{skill.title}</h2>
        <p style={{ fontSize: 13, color: TEXT_MUTED, marginBottom: isReturns && hasPlatform ? 10 : 28 }}>{skill.subtitle}</p>
        {isReturns && hasPlatform && (
          <div style={{
            display: "inline-flex", alignItems: "center", gap: 6,
            padding: "4px 10px", borderRadius: 6,
            background: "#F0F5FF", border: "1px solid #D6E4FF",
            marginBottom: 28,
          }}>
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
              <path d="M8 2v4M8 10v.01M3.5 5.5L8 8l4.5-2.5M2 5.5v5l6 3.5 6-3.5v-5L8 2 2 5.5z" stroke="#3B82F6" strokeWidth="1.2" strokeLinecap="round" strokeLinejoin="round" />
            </svg>
            <span style={{ fontSize: 12, fontWeight: 500, color: "#1E40AF" }}>Powered by {returnsPlatform}</span>
          </div>
        )}

        {/* Intents */}
        <h3 style={{
          fontSize: 14, fontWeight: 600, color: "#000000",
          letterSpacing: "normal", lineHeight: "20px",
          marginBottom: 10,
        }}>Intents this skill handles</h3>
        <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginBottom: 28 }}>
          {skill.edit.intents.map((intent, i) => (
            <span key={i} style={{
              fontSize: 13, fontWeight: 500, color: TEXT,
              padding: "5px 12px", borderRadius: 999,
              background: SURFACE, border: "1px solid " + BORDER,
            }}>{intent}</span>
          ))}
        </div>

        {/* Actions — only for skills with takesAction */}
        {skill.takesAction && skill.actions && skill.actions.length > 0 && (
          <div style={{ marginBottom: 28 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 12, position: "relative" }}>
              <h3 style={{
                fontSize: 14, fontWeight: 600, color: "#000000",
                letterSpacing: "normal", lineHeight: "20px",
                margin: 0,
              }}>Actions inserted in this skill's instructions</h3>
              <span
                style={{ cursor: "pointer", display: "inline-flex", position: "relative" }}
                onMouseEnter={(e) => { e.currentTarget.querySelector('[data-tooltip]').style.opacity = "1"; e.currentTarget.querySelector('[data-tooltip]').style.pointerEvents = "auto"; }}
                onMouseLeave={(e) => { e.currentTarget.querySelector('[data-tooltip]').style.opacity = "0"; e.currentTarget.querySelector('[data-tooltip]').style.pointerEvents = "none"; }}
              >
                <svg width="14" height="14" viewBox="0 0 16 16" fill="none" style={{ opacity: 0.4 }}>
                  <circle cx="8" cy="8" r="6.5" stroke="#6B7280" strokeWidth="1.2" />
                  <path d="M8 7v3.5M8 5.5v.01" stroke="#6B7280" strokeWidth="1.2" strokeLinecap="round" />
                </svg>
                <div data-tooltip style={{
                  position: "absolute", bottom: "calc(100% + 8px)", left: "50%", transform: "translateX(-50%)",
                  background: "#1E242E", color: "#fff", fontSize: 12, fontWeight: 400, lineHeight: 1.45,
                  padding: "8px 12px", borderRadius: 8, width: 240,
                  boxShadow: "0 4px 12px rgba(0,0,0,.2)",
                  opacity: 0, pointerEvents: "none", transition: "opacity .15s",
                  fontFamily: "'Inter', sans-serif",
                }}>Actions are operations AI Agent performs in connected apps (e.g. Shopify) to fulfill a customer request.</div>
              </span>
            </div>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
              {skill.actions.map((action, i) => (
                <span key={i} style={{
                  display: "inline-flex", alignItems: "center", gap: 5,
                  fontSize: 13, fontWeight: 500, color: TEXT,
                  padding: "5px 10px 5px 6px", borderRadius: 999,
                  background: SURFACE, border: "1px solid " + BORDER,
                }}>
                  <span style={{ width: 18, height: 18, borderRadius: 4, background: "#E8F5E9", display: "inline-flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                    <svg width="11" height="12" viewBox="0 0 11 12" fill="none"><path d="M7.5 2.5C7.5 2.5 7 2 6 2S4.5 2.8 4.5 2.8L4 4H3L2 11h7l-1-7H7l-.5-1.5z" fill="#95BF47" /><path d="M7 4L7.5 2.5C7.5 2.5 7 2 6 2v9l3 0-1-7H7z" fill="#5E8E3E" /></svg>
                  </span>
                  {action}
                  <span style={{ fontSize: 12, color: TEXT_MUTED, fontWeight: 400, marginLeft: 2 }}>in</span>
                  <span style={{ width: 16, height: 16, borderRadius: 3, background: "#E8F5E9", display: "inline-flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                    <svg width="9" height="10" viewBox="0 0 11 12" fill="none"><path d="M7.5 2.5C7.5 2.5 7 2 6 2S4.5 2.8 4.5 2.8L4 4H3L2 11h7l-1-7H7l-.5-1.5z" fill="#95BF47" /><path d="M7 4L7.5 2.5C7.5 2.5 7 2 6 2v9l3 0-1-7H7z" fill="#5E8E3E" /></svg>
                  </span>
                  <span style={{ fontSize: 13, fontWeight: 500 }}>Shopify</span>
                </span>
              ))}
            </div>
          </div>
        )}

        {/* Instructions header with pencil toggle */}
        <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 12 }}>
          <h3 style={{
            fontSize: 14, fontWeight: 600, color: "#000000",
            letterSpacing: "normal", lineHeight: "20px",
            margin: 0,
          }}>Instructions</h3>
          {hasInstructions && (
            <div
              onClick={() => setIsEditingInstructions((p) => !p)}
              title={isEditingInstructions ? "Lock instructions" : "Edit instructions"}
              style={{
                width: 26, height: 26, borderRadius: 6,
                display: "flex", alignItems: "center", justifyContent: "center",
                cursor: "pointer", transition: "background .15s",
                background: isEditingInstructions ? ACCENT_LIGHT : "transparent",
              }}
              onMouseEnter={(e) => { if (!isEditingInstructions) e.currentTarget.style.background = SURFACE; }}
              onMouseLeave={(e) => { if (!isEditingInstructions) e.currentTarget.style.background = "transparent"; }}
            >
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
                <path d="M14 4l6 6-10 10H4v-6z" stroke={isEditingInstructions ? ACCENT : TEXT_MUTED} strokeWidth="1.6" strokeLinejoin="round" />
                <path d="M11 7l6 6" stroke={isEditingInstructions ? ACCENT : TEXT_MUTED} strokeWidth="1.6" />
              </svg>
            </div>
          )}
        </div>

        {/* Instructions container — looks like a large textarea */}
        <div style={{
          border: "1px solid " + (isEditingInstructions ? "#8992A0" : BORDER),
          borderRadius: 10,
          background: "#fff",
          transition: "border-color .15s",
        }}>

        {/* ── Order Cancellation ── */}
        {isOrderCancellation ? (
          isEditingInstructions ? (
            <textarea
              defaultValue={cancellationInstructionsText}
              style={{
                width: "100%", minHeight: 420, padding: "20px 22px",
                fontSize: 14, lineHeight: 1.6, fontFamily: "'Inter', sans-serif",
                color: TEXT, border: "none", borderRadius: 10,
                background: "transparent", resize: "vertical", outline: "none",
              }}
            />
          ) : (
            <div style={{ fontSize: 14, color: TEXT, lineHeight: 1.6, padding: "20px 22px" }}>
              <div style={{ paddingBottom: 18, borderBottom: "1px solid " + BORDER, marginBottom: 18 }}>
                <div style={{ fontSize: 14, fontWeight: 600, marginBottom: 8, color: "#B91C1C" }}>Hard handover rule</div>
                <div><strong>IF</strong> the customer wants to cancel an order because of fraud, unauthorized purchases, or payment issues, <strong>THEN</strong> acknowledge the concern and hand over the ticket immediately.</div>
              </div>
              <div style={sectionStyle}>
                <div style={stepTitleStyle}>1. Order identification</div>
                <div><strong>IF</strong> the customer doesn't mention any specific order, assume they are referring to their last order.</div>
                <div style={{ marginTop: 6 }}><strong>IF</strong> no order data is found, <strong>THEN</strong>:</div>
                <ul style={{ marginLeft: 22, marginTop: 4, listStyle: "disc" }}>
                  <li>Ask the customer for their order number, name, email, or shipping address.</li>
                  <li>Attempt to locate the order again.</li>
                </ul>
              </div>
              <div style={sectionStyle}>
                <div style={stepTitleStyle}>2. Cancellation eligibility</div>
                <div><strong>IF</strong> the order fulfillment status contains <span style={dataFieldStyle}>Fulfilled</span>, <span style={dataFieldStyle}>Shipped</span>, <span style={dataFieldStyle}>Delivered</span>, or <span style={dataFieldStyle}>Partially Fulfilled</span>, <strong>THEN</strong>:</div>
                <ul style={{ marginLeft: 22, marginTop: 4, listStyle: "disc" }}>
                  <li>Inform the customer that cancellation is no longer possible.</li>
                  <li>Let them know they may return the item once delivered.</li>
                </ul>
                <div style={{ marginTop: 10 }}><strong>IF</strong> the order is <span style={dataFieldStyle}>Unfulfilled</span> <strong>AND</strong> was placed more than <span style={cancellationWindowStyle}>{cancellationWindowDisplay}</span> ago, <strong>THEN</strong> proceed to step 3.</div>
              </div>
              <div>
                <div style={stepTitleStyle}>3. Cancellation execution</div>
                <div><strong>IF</strong> the order is eligible for cancellation, <strong>THEN:</strong> {renderAction("Cancel Order")}</div>
              </div>
            </div>
          )

        /* ── Order Status / Tracking ── */
        ) : isOrderTracking ? (
          <div style={{ fontSize: 14, color: TEXT, lineHeight: 1.6, padding: "20px 22px" }}>
            <div style={sectionStyle}>
              <div style={stepTitleStyle}>1. Order identification</div>
              <div><strong>IF</strong> the customer doesn't mention any specific order, <strong>THEN</strong> assume they are referring to their last order.</div>
              <div style={{ marginTop: 6 }}><strong>IF</strong> {renderVar("Order: Name")} is null, <strong>THEN</strong>:</div>
              <ul style={{ marginLeft: 22, marginTop: 4, listStyle: "disc" }}>
                <li>Ask the customer for their order number, name, email, or shipping address.</li>
                <li>Attempt to locate the order again.</li>
              </ul>
            </div>
            <div style={sectionStyle}>
              <div style={stepTitleStyle}>2. Unfulfilled orders</div>
              <div><strong>IF</strong> {renderVar("Order: Fulfillment - Status")} = 'Unfulfilled', <strong>THEN</strong>:</div>
              <ul style={{ marginLeft: 22, marginTop: 4, listStyle: "disc" }}>
                <li><strong>IF</strong> {renderVar("Order: Created datetime")} is 5 days ago or less, <strong>THEN:</strong> Inform the customer the order is being processed and they'll receive a shipping confirmation email with a tracking link once it ships.</li>
                <li><strong>IF</strong> {renderVar("Order: Created datetime")} is more than 5 days ago, <strong>THEN:</strong> Acknowledge the delay and hand over the ticket for investigation.</li>
              </ul>
            </div>
            <div style={sectionStyle}>
              <div style={stepTitleStyle}>3. Order fulfilled but not delivered</div>
              <div><strong>IF:</strong></div>
              <ul style={{ marginLeft: 22, marginTop: 4, listStyle: "disc" }}>
                <li>{renderVar("Order: Fulfillment - Status")} = 'Fulfilled'</li>
                <li><strong>AND</strong> {renderVar("Order: Shipment - Status")} is not 'delivered'</li>
              </ul>
              <div style={{ marginTop: 6 }}><strong>THEN:</strong></div>
              <ul style={{ marginLeft: 22, marginTop: 4, listStyle: "disc" }}>
                <li>Share {renderVar("Order: Fulfillment - Tracking URL")} with the customer.</li>
                <li>Explain the current shipment status based on {renderVar("Order: Shipment - Status")} in plain, customer-friendly language.</li>
              </ul>
              <div style={{ marginTop: 10 }}><strong>IF</strong> {renderVar("Order: Fulfillment - Time since order")} is more than 9 days, <strong>THEN:</strong> Apologize for the delay and hand over for investigation.</div>
            </div>
            <div>
              <div style={stepTitleStyle}>4. Order delivered</div>
              <div><strong>IF</strong> tracking indicates the order is delivered, <strong>THEN</strong>:</div>
              <ul style={{ marginLeft: 22, marginTop: 4, listStyle: "disc" }}>
                <li>Confirm the delivery date and share {renderVar("Order: Fulfillment - Tracking URL")}.</li>
              </ul>
              <div style={{ marginTop: 10 }}><strong>IF</strong> the customer reports they haven't received the package, <strong>THEN</strong>:</div>
              <ul style={{ marginLeft: 22, marginTop: 4, listStyle: "disc" }}>
                <li>Acknowledge the concern.</li>
                <li>Ask the customer to check with neighbors, building staff, or common delivery locations (porch, mailroom, parcel lockers).</li>
                <li>Confirm the shipping address: {renderVar("Order: Shipping address 1")}, {renderVar("Order: Shipping address 2")}, {renderVar("Order: Zip")}, {renderVar("Order: City")}.</li>
              </ul>
              <div style={{ marginTop: 10 }}><strong>IF</strong> the customer has confirmed they checked surrounding locations and can't find the package, <strong>THEN:</strong> Hand over the ticket for investigation.</div>
            </div>
          </div>

        /* ── Promo Codes ── */
        ) : isPromo ? (
          <div style={{ fontSize: 14, color: TEXT, lineHeight: 1.6, padding: "20px 22px" }}>
            <div style={sectionStyle}>
              <div style={stepTitleStyle}>1. Customer needs help applying a code</div>
              <div><strong>IF</strong> the customer is asking where or how to apply a discount code, <strong>THEN</strong>:</div>
              <ul style={{ marginLeft: 22, marginTop: 4, listStyle: "disc" }}>
                <li>Walk them through the checkout flow: add items to cart, go to checkout, enter the code in the promo/discount field, and click Apply.</li>
                <li>Close the ticket.</li>
              </ul>
            </div>
            <div style={sectionStyle}>
              <div style={stepTitleStyle}>2. Code was not applied to a placed order</div>
              <div><strong>IF</strong> the customer reports a promo code wasn't reflected on their order, <strong>THEN:</strong> Check {renderVar("Order: Discount codes")}.</div>
              <ul style={{ marginLeft: 22, marginTop: 8, listStyle: "disc" }}>
                <li><strong>IF</strong> {renderVar("Order: Discount codes")} is not empty, <strong>THEN</strong>:
                  <ul style={{ marginLeft: 22, marginTop: 4, listStyle: "disc" }}>
                    <li>Share the applied code and discount amount, and ask the customer to verify if it matches what they expected.</li>
                    <li>Close the ticket.</li>
                  </ul>
                </li>
                <li><strong>IF</strong> {renderVar("Order: Discount codes")} is empty, <strong>THEN</strong>:
                  <ul style={{ marginLeft: 22, marginTop: 4, listStyle: "disc" }}>
                    <li>Confirm no code was applied and inform the customer that promo codes cannot be applied after an order is placed.</li>
                    <li>Escalate the ticket to investigate a possible partial refund.</li>
                  </ul>
                </li>
              </ul>
            </div>
            <div>
              <div style={stepTitleStyle}>3. Code is invalid or not working at checkout</div>
              <div><strong>IF</strong> the customer says a promo code isn't working during checkout, <strong>THEN</strong>:</div>
              <ul style={{ marginLeft: 22, marginTop: 4, listStyle: "disc" }}>
                <li>Remind the customer that only one promo code can be used per order, but free shipping can be combined with one discount code.</li>
              </ul>
              <div style={{ marginTop: 10 }}><strong>IF</strong> the code should be valid but still isn't working, <strong>THEN:</strong> Suggest clearing browser cache, trying a desktop browser, or using an incognito/private window.</div>
              <div style={{ marginTop: 10 }}><strong>IF</strong> the customer is still having trouble applying a discount code, escalate the ticket for further investigation.</div>
            </div>
          </div>

        /* ── Damaged / Defective ── */
        ) : isDamaged ? (
          <div style={{ fontSize: 14, color: TEXT, lineHeight: 1.6, padding: "20px 22px" }}>
            {renderOrderIdentification()}
            <div style={sectionStyle}>
              <div style={stepTitleStyle}>2. Risk review</div>
              <div>Review {renderVar("Customer: Tags")} and {renderVar("Order: Tags")}.</div>
              <div style={{ marginTop: 6 }}><strong>IF</strong> fraud, high-risk, or repeat-claim tags are present (examples: <span style={dataFieldStyle}>fraud</span>, <span style={dataFieldStyle}>high_risk</span>, <span style={dataFieldStyle}>chargeback</span>, <span style={dataFieldStyle}>do_not_refund</span>, <span style={dataFieldStyle}>blacklist</span>, <span style={dataFieldStyle}>excessive_claims</span>, <span style={dataFieldStyle}>refund_abuse</span>), <strong>THEN</strong>:</div>
              <ul style={{ marginLeft: 22, marginTop: 4, listStyle: "disc" }}>
                <li>Do not approve refunds, replacements, or store credit.</li>
                <li>Acknowledge the issue without referencing internal tags.</li>
                <li>Hand over the ticket.</li>
              </ul>
            </div>
            <div style={sectionStyle}>
              <div style={stepTitleStyle}>3. Claim eligibility</div>
              <div><strong>IF</strong> the delivery occurred more than <span style={claimWindowStyle}>{claimWindowDisplay}</span> ago, <strong>THEN</strong>:</div>
              <ul style={{ marginLeft: 22, marginTop: 4, listStyle: "disc" }}>
                <li>Inform the customer the claim is outside eligibility.</li>
                <li>Close the ticket.</li>
              </ul>
              <div style={{ marginTop: 10 }}><strong>IF</strong> the delivery occurred within <span style={claimWindowStyle}>{claimWindowDisplay}</span>, <strong>THEN:</strong> proceed to the next step.</div>
            </div>
            <div style={sectionStyle}>
              <div style={stepTitleStyle}>4. Evidence collection</div>
              <div>Request a photo of the damaged or affected item clearly showing the issue.</div>
              <div style={{ marginTop: 6 }}><strong>IF</strong> the customer refuses or no longer has the item, <strong>THEN</strong>:</div>
              <ul style={{ marginLeft: 22, marginTop: 4, listStyle: "disc" }}>
                <li>Inform the customer evidence is required to proceed.</li>
                <li>Hand over the ticket.</li>
              </ul>
            </div>
            <div>
              <div style={stepTitleStyle}>5. Resolution</div>
              <div><strong>IF</strong> only some items are affected, <strong>THEN</strong>:</div>
              <ul style={{ marginLeft: 22, marginTop: 4, listStyle: "disc" }}>
                <li>Confirm the affected items with the customer.</li>
                <li>Hand over the ticket for a replacement to be arranged.</li>
              </ul>
              <div style={{ marginTop: 10 }}><strong>IF</strong> all items or the entire shipment is affected, <strong>THEN</strong>:</div>
              <ul style={{ marginLeft: 22, marginTop: 4, listStyle: "disc" }}>
                <li>Ask the customer to confirm they want a free reshipment.</li>
                <li><strong>IF</strong> the customer confirms, <strong>THEN:</strong> {damageResolution ? <span style={confirmedStyle}>{damageResolutionDisplay}</span> : <span style={placeholderStyle}>{damageResolutionDisplay}</span>}</li>
              </ul>
              <div style={{ marginTop: 10 }}><strong>IF</strong> it's unclear how many items are affected, <strong>THEN:</strong> Ask the customer to clarify before taking action.</div>
            </div>
          </div>

        /* ── Returns & Exchanges ── */
        ) : isReturns ? (
          <div style={{ fontSize: 14, color: TEXT, lineHeight: 1.6, padding: "20px 22px" }}>
            <div style={{ paddingBottom: 18, borderBottom: "1px solid " + BORDER, marginBottom: 18 }}>
              <div style={{ fontSize: 14, fontWeight: 600, marginBottom: 8, color: "#B91C1C" }}>Hard handover rule</div>
              <div><strong>IF</strong> the customer wants to return or exchange products from at least 2 different orders, <strong>THEN</strong>:</div>
              <ul style={{ marginLeft: 22, marginTop: 4, listStyle: "disc" }}>
                <li>Acknowledge the concern.</li>
                <li>Hand over the ticket immediately.</li>
              </ul>
            </div>
            {renderOrderIdentification()}
            <div style={sectionStyle}>
              <div style={stepTitleStyle}>2. Return/exchange eligibility</div>
              <div><strong>IF</strong> {renderVar("Order: Created datetime")} is more than <span style={returnWindowStyle}>{returnWindowDisplay}</span> ago, <strong>THEN</strong>:</div>
              <ul style={{ marginLeft: 22, marginTop: 4, listStyle: "disc" }}>
                <li>Inform the customer that returns and exchanges are only accepted within <span style={returnWindowStyle}>{returnWindowDisplay}</span> of purchase.</li>
                <li>Do not reference policies, links, or exceptions.</li>
              </ul>
            </div>
            <div style={sectionStyle}>
              <div style={stepTitleStyle}>3. Initiate return or exchange</div>
              <div><strong>IF</strong> {renderVar("Order: Created datetime")} is <span style={returnWindowStyle}>{returnWindowDisplay}</span> ago or less, <strong>THEN</strong>:</div>
              <ul style={{ marginLeft: 22, marginTop: 4, listStyle: "disc" }}>
                <li>Provide the return portal link: {renderAction("Send return portal link")}</li>
                <li>Inform the customer they will receive a prepaid return shipping label via email once the request is authorized.</li>
                <li>Inform the customer of the timeline:
                  <ul style={{ marginLeft: 22, marginTop: 4, listStyle: "disc" }}>
                    <li>Processing takes up to 10 business days after the item is received.</li>
                    <li><strong>IF</strong> the customer requested a return: Refunds may take an additional 3–5 business days to appear in their account, issued to the original payment method.</li>
                    <li><strong>IF</strong> the customer requested an exchange: The new order will ship once the return is processed.</li>
                  </ul>
                </li>
              </ul>
            </div>
            <div>
              <div style={stepTitleStyle}>4. Refund status check</div>
              <div><strong>IF</strong> the customer asks about the status of a refund, <strong>THEN:</strong> Check {renderVar("Order: Return received at")}, {renderVar("Order: Return closed at")}, and {renderVar("Order: Refund processed at")}.</div>
              <ul style={{ marginLeft: 22, marginTop: 8, listStyle: "disc" }}>
                <li><strong>IF</strong> {renderVar("Order: Return received at")} is empty, <strong>THEN</strong>:
                  <ul style={{ marginLeft: 22, marginTop: 4, listStyle: "disc" }}>
                    <li>Inform the customer the returned item(s) have not yet been received.</li>
                    <li>Advise them to check their return tracking for delivery confirmation.</li>
                  </ul>
                </li>
                <li style={{ marginTop: 8 }}><strong>IF</strong> {renderVar("Order: Return received at")} is not empty and {renderVar("Order: Refund processed at")} is empty, <strong>THEN</strong>:
                  <ul style={{ marginLeft: 22, marginTop: 4, listStyle: "disc" }}>
                    <li>Inform the customer the return was received on {renderVar("Order: Return received at")} and is being processed.</li>
                    <li><strong>IF</strong> {renderVar("Order: Return received at")} is more than 10 business days ago, <strong>THEN:</strong> Apologize for the delay and hand over the ticket for investigation.</li>
                  </ul>
                </li>
                <li style={{ marginTop: 8 }}><strong>IF</strong> {renderVar("Order: Refund processed at")} is not empty, <strong>THEN</strong>:
                  <ul style={{ marginLeft: 22, marginTop: 4, listStyle: "disc" }}>
                    <li>Inform the customer the refund was processed on {renderVar("Order: Refund processed at")}.</li>
                    <li>Advise that refunds may take 3–5 business days to appear depending on their financial institution.</li>
                  </ul>
                </li>
                <li style={{ marginTop: 8 }}><strong>IF</strong> {renderVar("Order: Refund processed at")} is more than 5 business days ago and the customer reports they haven't received it, <strong>THEN:</strong> Hand over the ticket for investigation.</li>
              </ul>
            </div>
          </div>

        /* ── Missing Items ── */
        ) : isMissing ? (
          <div style={{ fontSize: 14, color: TEXT, lineHeight: 1.6, padding: "20px 22px" }}>
            {renderOrderIdentification()}
            <div style={sectionStyle}>
              <div style={stepTitleStyle}>2. Claim eligibility</div>
              <div><strong>IF</strong> the delivery date is more than <span style={claimWindowStyle}>{claimWindowDisplay}</span> ago, <strong>THEN</strong>:</div>
              <ul style={{ marginLeft: 22, marginTop: 4, listStyle: "disc" }}>
                <li>Inform the customer that delivery issues must be reported within <span style={claimWindowStyle}>{claimWindowDisplay}</span>.</li>
                <li>Close the ticket.</li>
              </ul>
            </div>
            <div style={sectionStyle}>
              <div style={stepTitleStyle}>3. Identify the missing items</div>
              <div><strong>IF</strong> the delivery date is <span style={claimWindowStyle}>{claimWindowDisplay}</span> ago or less, <strong>THEN</strong>:</div>
              <ul style={{ marginLeft: 22, marginTop: 4, listStyle: "disc" }}>
                <li>Ask the customer for the full name of the missing item(s).</li>
                <li>Check fulfillment status for the reported items.</li>
              </ul>
            </div>
            <div>
              <div style={stepTitleStyle}>4. Resolution</div>
              <div>Check {renderVar("Order: Shipment - Status")} for the reported item(s).</div>
              <div style={{ marginTop: 10 }}><strong>IF</strong> the item hasn't been delivered yet (e.g., unfulfilled, in transit, or pending shipment), <strong>THEN</strong>:</div>
              <ul style={{ marginLeft: 22, marginTop: 4, listStyle: "disc" }}>
                <li>Inform the customer the item hasn't been delivered yet and share any available tracking via {renderVar("Order: Fulfillment - Tracking URL")}.</li>
                <li>Close the ticket.</li>
              </ul>
              <div style={{ marginTop: 10 }}><strong>IF</strong> the item shows as delivered, <strong>THEN</strong>:</div>
              <ul style={{ marginLeft: 22, marginTop: 4, listStyle: "disc" }}>
                <li>Ask the customer to double-check the package contents and check with neighbors or building staff.</li>
              </ul>
              <div style={{ marginTop: 10 }}><strong>IF</strong> the item is still missing, <strong>THEN:</strong> Hand over the ticket.</div>
            </div>
          </div>

        /* ── Product Edits ── */
        ) : isProductEdits ? (
          <div style={{ fontSize: 14, color: TEXT, lineHeight: 1.6, padding: "20px 22px" }}>
            {renderOrderIdentification()}
            <div style={sectionStyle}>
              <div style={stepTitleStyle}>2. Modification eligibility</div>
              <div><strong>IF</strong> {renderVar("Order: Fulfillment status")} is <span style={dataFieldStyle}>fulfilled</span> or <span style={dataFieldStyle}>shipped</span>, <strong>THEN</strong>:</div>
              <ul style={{ marginLeft: 22, marginTop: 4, listStyle: "disc" }}>
                <li>Inform the customer that orders already shipped cannot be modified.</li>
                <li>Close the ticket.</li>
              </ul>
              <div style={{ marginTop: 10 }}><strong>IF</strong> {renderVar("Order: Created datetime")} is more than <span style={editWindowStyle}>{editWindowDisplay}</span> ago, <strong>THEN</strong>:</div>
              <ul style={{ marginLeft: 22, marginTop: 4, listStyle: "disc" }}>
                <li>Inform the customer that the modification window has passed.</li>
                <li>Close the ticket.</li>
              </ul>
              <div style={{ marginTop: 10 }}><strong>IF</strong> the order is unfulfilled and within <span style={editWindowStyle}>{editWindowDisplay}</span>, <strong>THEN:</strong> proceed to the next step.</div>
            </div>
            <div style={sectionStyle}>
              <div style={stepTitleStyle}>3. Identify requested changes</div>
              <div>Ask the customer what they'd like to change. Supported actions:</div>
              <ul style={{ marginLeft: 22, marginTop: 4, listStyle: "disc" }}>
                <li><strong>Remove a product</strong> — remove a specific item from the order</li>
                <li><strong>Replace a product</strong> — swap one item for another of equal or lesser value</li>
              </ul>
              <div style={{ marginTop: 10 }}><strong>IF</strong> the customer requests a change not listed above (e.g., add an item, change quantity), <strong>THEN:</strong> Hand over the ticket.</div>
            </div>
            <div style={sectionStyle}>
              <div style={stepTitleStyle}>4. Remove product</div>
              <div><strong>IF</strong> the customer wants to remove an item, <strong>THEN</strong>:</div>
              <ul style={{ marginLeft: 22, marginTop: 4, listStyle: "disc" }}>
                <li>Confirm the item name and quantity to remove.</li>
                <li><strong>IF</strong> the customer confirms, <strong>THEN:</strong> {renderAction("Remove line item from order")}</li>
                <li>Inform the customer the item has been removed and a partial refund will be issued to their original payment method.</li>
              </ul>
            </div>
            <div>
              <div style={stepTitleStyle}>5. Replace product</div>
              <div><strong>IF</strong> the customer wants to swap an item, <strong>THEN</strong>:</div>
              <ul style={{ marginLeft: 22, marginTop: 4, listStyle: "disc" }}>
                <li>Ask for the name of the item to remove and the name of the replacement item.</li>
                <li>Look up the replacement in {renderVar("Product: Title")} to confirm availability.</li>
                <li><strong>IF</strong> the replacement costs more than the original, <strong>THEN:</strong> Inform the customer of the price difference and hand over the ticket.</li>
                <li><strong>IF</strong> the replacement costs the same or less, <strong>THEN:</strong></li>
              </ul>
              <ul style={{ marginLeft: 44, marginTop: 4, listStyle: "disc" }}>
                <li>Confirm the swap with the customer.</li>
                <li><strong>IF</strong> the customer confirms, <strong>THEN:</strong> {renderAction("Remove line item from order")} then {renderAction("Add replacement item to order")}</li>
                <li>Inform the customer the swap is complete. If there is a price difference, a partial refund will be issued.</li>
              </ul>
            </div>
          </div>

        /* ── Placeholder for other skills ── */
        ) : (
          <div style={{ padding: "32px 22px", textAlign: "center" }}>
            <div style={{ fontSize: 14, fontWeight: 600, color: TEXT_MUTED, marginBottom: 4 }}>No instructions yet</div>
            <div style={{ fontSize: 13, color: TEXT_MUTED, lineHeight: 1.5 }}>
              Instructions for this skill will be generated during setup.
            </div>
          </div>
        )}

        </div>{/* end instructions container */}
      </div>

    </div>
  );
}

    if (cinematicPhase !== "__never__") return;
    const el = cinematicRef.current;
    if (!el) return;
    const WELCOME_TEXT = "AI Agent";
    const words = WELCOME_TEXT.split(" ");
    el.innerHTML = "";
    const wordSpans = [];
    words.forEach((word, i) => {
      const span = document.createElement("span");
      span.textContent = word + (i < words.length - 1 ? " " : "");
      span.style.cssText = "display:inline-block; will-change:transform,filter,opacity;";
      el.appendChild(span);
      wordSpans.push(span);
      const anim = span.animate([
        { filter: "blur(10px)", opacity: 0,   transform: "translateY(-50px)" },
        { filter: "blur(5px)",  opacity: 0.5, transform: "translateY(5px)"   },
        { filter: "blur(0px)",  opacity: 1,   transform: "translateY(0px)"   },
      ], { duration: 1400, delay: i * 300, easing: "ease", fill: "both" });
      if (i === words.length - 1) {
        anim.addEventListener("finish", () => {
          setTimeout(() => {
            wordSpans.forEach((s, j) => {
              const exitAnim = s.animate([
                { opacity: 1, transform: "translateY(0px)",   filter: "blur(0px)" },
                { opacity: 0, transform: "translateY(-24px)", filter: "blur(4px)" },
              ], { duration: 700, delay: j * 150, easing: "ease", fill: "forwards" });
              if (j === wordSpans.length - 1) {
                exitAnim.addEventListener("finish", () => setCinematicPhase("done"));
              }
            });
          }, 1800);
        });
      }
    });
  }, [cinematicPhase]);

  /* Type welcome messages */
  useEffect(() => {
    if (cinematicPhase !== "done") return;
    if (currentMsgIndex >= welcomeMessages.length) return;
    const fullText = welcomeMessages[currentMsgIndex].text;
    let charIndex = 0;
    setIsTypingMessage(true);
    setTypingText("");
    const startDelay = setTimeout(() => {
      const interval = setInterval(() => {
        charIndex++;
        setTypingText(fullText.substring(0, charIndex));
        if (charIndex >= fullText.length) {
          clearInterval(interval);
          setIsTypingMessage(false);
          setChatMessages((prev) => [...prev, { role: "ai", text: fullText, bold: welcomeMessages[currentMsgIndex].bold || null }]);
          setTypingText("");
          if (currentMsgIndex < welcomeMessages.length - 1) {
            setTimeout(() => setCurrentMsgIndex((p) => p + 1), 600);
          } else {
            setTimeout(() => setResearchPhase("running"), 800);
          }
        }
      }, 10);
    }, currentMsgIndex === 0 ? 500 : 300);
    return () => clearTimeout(startDelay);
  }, [currentMsgIndex, cinematicPhase]);

  /* Research source slot-machine: rotate through all sources once, then done */
  useEffect(() => {
    if (researchPhase !== "running") return;
    setResearchSources(VOICE_RESEARCH_SOURCES);
    setRotatingIndex(0);
    setRotatingTransition("in");
    let cancelled = false;
    let idx = 0;
    const reducedMotion = window.matchMedia
      ? window.matchMedia("(prefers-reduced-motion: reduce)").matches
      : false;
    const DISPLAY_DURATION = reducedMotion ? 2000 : 1800;
    const TRANSITION_DURATION = 300;
    const timer = setInterval(() => {
      if (cancelled) return;
      idx++;
      if (idx >= VOICE_RESEARCH_SOURCES.length) {
        clearInterval(timer);
        setTimeout(() => {
          if (!cancelled) {
            setRotatingIndex(VOICE_RESEARCH_SOURCES.length - 1);
            setRotatingTransition("in");
            setResearchPhase("done");
            setResearchExpanded(false);
          }
        }, 400);
        return;
      }
      if (reducedMotion) {
        setRotatingIndex(idx);
      } else {
        setRotatingTransition("out");
        setTimeout(() => {
          if (!cancelled) {
            setRotatingIndex(idx);
            setRotatingTransition("in");
          }
        }, TRANSITION_DURATION);
      }
    }, DISPLAY_DURATION);
    return () => { cancelled = true; clearInterval(timer); };
  }, [researchPhase]);

  /* Findings typing */
  useEffect(() => {
    if (researchPhase !== "done") return;
    if (findingsStartedRef.current) return;
    findingsStartedRef.current = true;
    const startDelay = setTimeout(() => {
      setFindingsTyping(true);
      let charIdx = 0;
      const interval = setInterval(() => {
        charIdx++;
        setFindingsText(findingsFullText.substring(0, charIdx));

          setFindingsTyping(false);
          setFindingsComplete(true);

          setTimeout(() => setShowVoiceConfirm(true), 1500);
        }

  }, [researchPhase]);

    setSkillsTypingActive(true);
