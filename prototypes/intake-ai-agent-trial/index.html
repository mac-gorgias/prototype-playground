  const commitAllFollowUpAnswers = (answersMap) => {
    const skillKey = activeSkillIdx !== null ? SKILLS[activeSkillIdx].key : null;
    if (!skillKey) return;
    setSkillFollowUpAnswers((prev) => {
      const updated = {
        ...prev,
        [skillKey]: { ...(prev[skillKey] || {}), ...answersMap },
      };
      if (skillKey === "items-missing" && answersMap.claim_window_days) {
        const damagedAnswers = prev.damaged || {};
        if (!damagedAnswers.claim_window_days) {
          updated.damaged = { ...damagedAnswers, claim_window_days: answersMap.claim_window_days };
        }
      }
      return updated;
    });
    setAnsweredSkillKeys((prev) => new Set([...prev, skillKey]));
    if (answersMap.shopify_action && answersMap.shopify_action.startsWith("No")) {
      setActionDeclinedKeys((prev) => new Set([...prev, skillKey]));
    } else if (answersMap.shopify_action && !answersMap.shopify_action.startsWith("No")) {
      setActionDeclinedKeys((prev) => { const next = new Set(prev); next.delete(skillKey); return next; });
    }
    const followUps = SKILL_FOLLOWUPS[skillKey];
    const mergedAnswers = { ...(skillFollowUpAnswers[skillKey] || {}), ...answersMap };
    const isDraft = (answersMap.shopify_action && answersMap.shopify_action.startsWith("No")) ||
      (followUps && !followUps.every(fu => fu.field in mergedAnswers));
    if (isDraft) {
      if (activeSkillIdx < batch1Skills.length) {
        setSkillPickerToggles((prev) => ({ ...prev, [skillKey]: false }));
      } else {
        setB2EnablePickerToggles((prev) => ({ ...prev, [skillKey]: false }));
      }
    }
    const phase = batchMode ? (activeSkillIdx < batch1Skills.length ? "batch1" : "batch2") : "batch1";

    return () => clearInterval(interval);

  const handleFollowUpCTA = (type) => {

          return;

  };

  const onFollowUpComplete = (answersMap) => {

    if (activeSkillIdx !== null && activeSkillIdx >= batch1Skills.length) {

      const merged = { ...skillFollowUpAnswers, [currentKey]: { ...(skillFollowUpAnswers[currentKey] || {}), ...answersMap } };
      if (currentKey === "items-missing" && answersMap.claim_window_days) {
        merged.damaged = { ...(merged.damaged || {}), claim_window_days: answersMap.claim_window_days };
      }
      let nextIdx = null;
      for (let i = batch1Skills.length; i < SKILLS.length; i++) {
        if (i !== activeSkillIdx && getNextFollowUp(SKILLS[i].key, merged)) {

          break;
        }
      }
      if (nextIdx !== null) {

        setTimeout(() => { closePanel(true); }, 800);
      }
    }

  const onFollowUpAnswerChange = (field, value) => {

    setSkillFollowUpAnswers((prev) => ({
      ...prev,
      [skillKey]: { ...(prev[skillKey] || {}), [field]: value },

  const onFollowUpDismiss = () => {

    if (skillKey) {

      if (activeSkillIdx < batch1Skills.length) {
        setSkillPickerToggles((prev) => ({ ...prev, [skillKey]: false }));
      } else {
        setB2EnablePickerToggles((prev) => ({ ...prev, [skillKey]: false }));
      }
    }
  };

  const panelOpen = !!activePanel && !panelClosing;

  const seenTerms = new Set();

  return (

    }}>

      />

      <div

          background: "#ffffff", borderRadius: 16,

        }}
      >


        {showSkillsScreen && (() => {

          } else if (skillsBatch1Choice === "pick") {

          }

        {cinematicPhase === "done" && closingPhase !== "shown" && !showSkillsScreen && (

                  const _followUps = _allFollowUps.filter(fu => !(fu.field in _existingAnswers));
                  const _dismissed = _skillKey && followUpDismissed.has(_skillKey);
                  return _followUps.length > 0 && !_dismissed ? (
                    <SkillFollowUpCard
                      key={_skillKey}
                      followUps={_allFollowUps}
                      onComplete={onFollowUpComplete}
                      onDismiss={onFollowUpDismiss}
                      onAnswerChange={onFollowUpAnswerChange}

const CARD_WIDTHS = { sm: 180, md: 220, lg: 240 };

function FloatingCard({ card, phase }) {
  const outerRef = React.useRef(null);
  const innerRef = React.useRef(null);
  const convergedRef = React.useRef(false);

  React.useEffect(() => {
    if (phase !== "converge" || !outerRef.current || !innerRef.current || convergedRef.current) return;
    convergedRef.current = true;
    const opts = { duration: 900, delay: card.delay * 300, easing: "cubic-bezier(0.7, 0, 0.84, 0)", fill: "both" };
    outerRef.current.animate(
      [
        { left: `${card.x}%`, top: `${card.y}%` },
        { left: "50%",        top: "50%" },
      ],
      opts
    );
    innerRef.current.animate(
      [
        { opacity: 1, transform: `rotate(${card.rotate}deg) scale(1)`,    filter: "blur(0px)" },
        { opacity: 0, transform: "rotate(0deg) scale(0.1)",                filter: "blur(6px)" },
      ],
      opts
    );
  }, [phase, card]);

  const baseAnim =
    phase === "converge"
      ? "none"
      : `welcomeCardArrive 800ms cubic-bezier(0.22, 1, 0.36, 1) ${card.delay}s both, welcomeCardDrift ${card.driftDuration}s ease-in-out ${card.delay}s infinite`;

  const cardWidth = CARD_WIDTHS[card.size] || 220;

  let body;
  if (card.kind === "integration") {
    const logo = INTEGRATION_LOGOS[card.logo];
    body = (
      <div style={{ display: "flex", alignItems: "center", gap: 10, padding: "10px 12px" }}>

          flexShrink: 0, width: 36, height: 36, borderRadius: 12,

          fontSize: 15, fontWeight: 600,
        }}>{logo.glyph}</div>
        <div style={{ display: "flex", flexDirection: "column" }}>
          <span style={{ fontSize: 13, fontWeight: 500, color: "#171717" }}>{card.title}</span>
          <span style={{ fontSize: 11, color: "#737373" }}>{card.subtitle}</span>
        </div>
      </div>
    );
  } else if (card.kind === "prompt") {
    body = (
      <div style={{ display: "flex", alignItems: "flex-start", gap: 8, padding: "12px 14px" }}>
        <div style={{ marginTop: 6, flexShrink: 0, width: 6, height: 6, borderRadius: "50%", background: "#fda4af" }} />
        <span style={{ fontSize: 13, lineHeight: 1.4, color: "#262626" }}>"{card.title}"</span>
      </div>
    );
  } else {
    body = (
      <div style={{ display: "flex", flexDirection: "column" }}>
        <div style={{ position: "relative", aspectRatio: "4 / 5", width: "100%", overflow: "hidden", borderTopLeftRadius: 16, borderTopRightRadius: 16 }}>
          <img src={card.image} alt={card.caption || ""} loading="lazy" style={{ height: "100%", width: "100%", objectFit: "cover", display: "block" }} />
        </div>
        {card.caption && (
          <span style={{ padding: "8px 12px", fontSize: 11, letterSpacing: "0.02em", color: "#525252" }}>{card.caption}</span>
        )}
      </div>
    );
  }

  return (
    <div
      ref={outerRef}
      style={{
        position: "absolute",
        left: `${card.x}%`,
        top: `${card.y}%`,
        transform: "translate(-50%, -50%)",
        pointerEvents: "none",
        willChange: "left, top",
      }}
    >
      <div
        ref={innerRef}
        style={{
          "--rot": `${card.rotate}deg`,
          "--dx": `${card.driftX}px`,
          "--dy": `${card.driftY}px`,
          width: cardWidth,
          overflow: "hidden",
          borderRadius: 16,
          border: "1px solid rgba(229, 229, 229, 0.7)",
          background: "rgba(255, 255, 255, 0.95)",
          backdropFilter: "blur(2px)",
          WebkitBackdropFilter: "blur(2px)",
          boxShadow: "0 1px 2px rgba(15,15,20,0.04), 0 8px 24px -8px rgba(15,15,20,0.12), 0 24px 48px -16px rgba(15,15,20,0.08)",
          animation: baseAnim,
          opacity: 0,
          willChange: "transform, opacity",
        }}
      >
        {body}
      </div>
    </div>
  );
}

function WelcomeIntro({ onStartSetup, closing }) {
  const reducedMotion = typeof window !== "undefined" && window.matchMedia
    ? window.matchMedia("(prefers-reduced-motion: reduce)").matches
    : false;
  const slowmo = (() => {
    if (typeof window === "undefined") return 1;
    const v = parseFloat(new URLSearchParams(window.location.search).get("slowmo") || "1");
    return Number.isFinite(v) && v > 0 ? v : 1;
  })();

  const [phase, setPhase] = useState(reducedMotion ? "reveal" : "arrival");

  useEffect(() => {
    if (reducedMotion) return;
    const m = Math.max(1, slowmo);
    const timers = [
      setTimeout(() => setPhase("drift"),    1100 * m),
      setTimeout(() => setPhase("converge"), 4600 * m),
      setTimeout(() => setPhase("reveal"),   5700 * m),
    ];
    return () => timers.forEach(clearTimeout);
  }, [reducedMotion, slowmo]);

  const auroraOpacity =
    phase === "arrival"  ? 0.25 :
    phase === "drift"    ? 0.45 :
    phase === "converge" ? 0.7  : 1;
  const auroraScale =
    phase === "arrival"  ? 0.7  :
    phase === "drift"    ? 0.85 :
    phase === "converge" ? 0.55 : 1;

  const showCards = phase === "arrival" || phase === "drift" || phase === "converge";
  const showLogo  = phase === "reveal";

  return (
    <div style={{
      position: "absolute", inset: 0, zIndex: 5, overflow: "hidden",
      background: "#ffffff", borderRadius: 16,
      animation: closing ? "fadeOut .5s ease forwards" : "none",
      pointerEvents: closing ? "none" : "auto",
    }}>
      <AuroraBlob opacity={auroraOpacity} scale={auroraScale} />

      {showCards && (
        <div style={{ position: "absolute", inset: 0 }}>
          {introCards.map((c) => <FloatingCard key={c.id} card={c} phase={phase} />)}
        </div>
      )}

      {showLogo && (
        <div style={{
          position: "absolute", inset: 0,
          display: "flex", alignItems: "center", justifyContent: "center",
          padding: "32px 56px", overflow: "auto",
          animation: "welcomeLogoReveal 900ms cubic-bezier(0.22, 1, 0.36, 1) both",
        }}>
          <div style={{ flex: "0 1 480px", minWidth: 0, display: "flex", flexDirection: "column", gap: 22 }}>
            <img
              src="Logo AI Agent.svg"
              alt="AI Agent"
              style={{ height: 36, width: "auto", display: "block", alignSelf: "flex-start" }}
              draggable={false}
            />

            <h1 style={{
              fontSize: 32, fontWeight: 700, color: TEXT,
              lineHeight: 1.2, letterSpacing: "-0.5px", margin: 0,
            }}>
              Help shoppers browse, buy, and get support—24/7
            </h1>

            <div style={{ animation: "welcomeFadeUp 600ms cubic-bezier(0.22, 1, 0.36, 1) 300ms both" }}>
              <div style={{ fontSize: 15, color: TEXT_MUTED, marginBottom: 12 }}>
                Set up AI Agent with confidence:
              </div>
              <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                {[
                  "Define how it responds to specific topics",
                  "Test and refine conversations",
                  "Preview the shopper experience before going live",
                ].map((item, i) => (
                  <div key={i} style={{ display: "flex", alignItems: "center", gap: 10 }}>
                    <svg width="18" height="18" viewBox="0 0 18 18" fill="none" style={{ flexShrink: 0 }}>
                      <path d="M3.5 9.5l3 3 8-8" stroke="#1F8A4C" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" />
                    </svg>
                    <span style={{ fontSize: 15, color: TEXT, lineHeight: 1.5 }}>{item}</span>

                ))}

            <button
              type="button"

              style={{
                ...BTN_PRIMARY,
                alignSelf: "flex-start", marginTop: 8,
                animation: "welcomeFadeUp 600ms cubic-bezier(0.22, 1, 0.36, 1) 550ms both",
              }}
              onMouseEnter={(e) => { Object.assign(e.currentTarget.style, BTN_PRIMARY_HOVER); }}
              onMouseLeave={(e) => { Object.assign(e.currentTarget.style, BTN_PRIMARY_LEAVE); }}

/* ─── Thread Aurora — cursor-following gradient background ─── */
function ThreadAurora() {
  const containerRef = useRef(null);
  const mousePos = useRef({ x: 0.5, y: 0.5 });
  const isHovering = useRef(false);
  const blobsRef = useRef([
    { x: 0.3, y: 0.3, vx: 0.0003, vy: 0.0002, size: 0.6 },
    { x: 0.7, y: 0.6, vx: -0.0002, vy: 0.0003, size: 0.5 },
    { x: 0.5, y: 0.8, vx: 0.00025, vy: -0.00015, size: 0.55 },
  ]);
  const [, forceUpdate] = useState(0);
  const rafRef = useRef(null);
  const targetRef = useRef([
    { x: 0.3, y: 0.3 },
    { x: 0.7, y: 0.6 },
    { x: 0.5, y: 0.8 },
  ]);

  useEffect(() => {
    const el = containerRef.current;
    if (!el) return;
    const onMove = (e) => {
      const rect = el.getBoundingClientRect();
      mousePos.current = {
        x: (e.clientX - rect.left) / rect.width,
        y: (e.clientY - rect.top) / rect.height,
      };
      isHovering.current = true;
    };
    const onLeave = () => { isHovering.current = false; };
    el.addEventListener("mousemove", onMove);
    el.addEventListener("mouseleave", onLeave);

    let tick = 0;
    const animate = () => {
      const blobs = blobsRef.current;
      const targets = targetRef.current;
      tick++;
      for (let i = 0; i < blobs.length; i++) {
        const b = blobs[i];
        if (isHovering.current) {
          const offsets = [
            { dx: -0.08, dy: -0.06 },
            { dx: 0.1, dy: 0.05 },
            { dx: -0.03, dy: 0.1 },
          ];
          targets[i].x = mousePos.current.x + offsets[i].dx;
          targets[i].y = mousePos.current.y + offsets[i].dy;
        } else {
          const t = tick * 0.0004;
          const drifts = [
            { fx: 0.7, fy: 0.5 },
            { fx: 0.4, fy: 0.8 },
            { fx: 0.9, fy: 0.3 },
          ];
          targets[i].x = drifts[i].fx + Math.sin(t * (1 + i * 0.3)) * 0.25;
          targets[i].y = drifts[i].fy + Math.cos(t * (0.8 + i * 0.2)) * 0.2;
        }
        b.x += (targets[i].x - b.x) * 0.008;
        b.y += (targets[i].y - b.y) * 0.008;
      }
      if (tick % 2 === 0) forceUpdate((n) => n + 1);
      rafRef.current = requestAnimationFrame(animate);
    };
    rafRef.current = requestAnimationFrame(animate);
    return () => {
      el.removeEventListener("mousemove", onMove);
      el.removeEventListener("mouseleave", onLeave);
      cancelAnimationFrame(rafRef.current);
    };
  }, []);

  const blobs = blobsRef.current;
  const colors = [
    "rgba(225, 210, 255, 0.35)",
    "rgba(254, 225, 249, 0.3)",
    "rgba(225, 210, 255, 0.25)",
  ];
  const sizes = [420, 360, 480];

  return (
    <div ref={containerRef} style={{
      position: "absolute", inset: 0, pointerEvents: "none", overflow: "hidden",
      borderRadius: "inherit", zIndex: 0,
    }}>
      {blobs.map((b, i) => (
        <div key={i} style={{
          position: "absolute",
          left: (b.x * 100) + "%",
          top: (b.y * 100) + "%",
          width: sizes[i],
          height: sizes[i],
          marginLeft: -sizes[i] / 2,
          marginTop: -sizes[i] / 2,
          borderRadius: "50%",
          background: `radial-gradient(circle, ${colors[i]} 0%, transparent 70%)`,
          filter: "blur(60px)",
          willChange: "left, top",
        }} />
      ))}
    </div>
  );
}

/* ─── App entry ─── */
const __default__ = function App() {
  const [view, setView] = useState("inbox");
  const [jumpTarget, setJumpTarget] = useState(null);
  const [devMenuOpen, setDevMenuOpen] = useState(false);

  const jumpItems = [
    { key: "inbox", label: "Inbox" },
    { key: "intro", label: "Intro" },
    { key: "tov", label: "ToV / Knowledge" },
    { key: "skills", label: "Skill Setup" },
    { key: "channels", label: "Channel Mapping" },
    { key: "end", label: "End" },
  ];

  const handleJump = (key) => {
    setDevMenuOpen(false);
    if (key === "inbox") {
      setView("inbox");
      setJumpTarget(null);
    } else {
      setJumpTarget(key);
      setView("ai-agent");
    }
  };

  const jumpPill = (
    <div style={{
      position: "fixed", bottom: 16, right: 16, zIndex: 9999,
      display: "flex", alignItems: "center", gap: 8,
      background: "rgba(30,36,46,0.92)", color: "#fff",
      fontSize: 12, fontWeight: 500, fontFamily: "'Inter', sans-serif",
      padding: "8px 14px", borderRadius: 999,
      boxShadow: "0 4px 16px rgba(0,0,0,.25)",
      userSelect: "none",
    }}>
      <div style={{ position: "relative" }}>
        <span
          onClick={() => setDevMenuOpen((p) => !p)}
          style={{ cursor: "pointer", opacity: devMenuOpen ? 1 : 0.7, transition: "opacity .15s" }}
          onMouseEnter={(e) => { e.currentTarget.style.opacity = "1"; }}
          onMouseLeave={(e) => { if (!devMenuOpen) e.currentTarget.style.opacity = "0.7"; }}
        >Jump to &#9662;</span>
        {devMenuOpen && (
          <div style={{
            position: "absolute", bottom: "calc(100% + 10px)", right: 0,
            background: "rgba(30,36,46,0.96)", borderRadius: 10,
            padding: "6px 0", minWidth: 200,
            boxShadow: "0 8px 24px rgba(0,0,0,.35)",
          }}>
            {jumpItems.map((item) => (
              <div
                key={item.key}
                onClick={() => handleJump(item.key)}
                style={{
                  padding: "8px 16px", cursor: "pointer", fontSize: 12,
                  color: "#fff", transition: "background .1s",
                }}
                onMouseEnter={(e) => { e.currentTarget.style.background = "rgba(255,255,255,0.1)"; }}
                onMouseLeave={(e) => { e.currentTarget.style.background = "transparent"; }}
              >{item.label}</div>
            ))}
          </div>
        )}
      </div>
    </div>
  );

  if (view === "ai-agent") return (<>{jumpPill}<IntakePage initialJump={jumpTarget} /></>);
  return (<>{jumpPill}<FakeInbox onAiAgentClick={() => { setJumpTarget(null); setView("ai-agent"); }} /></>);
};

class __ErrorBoundary__ extends React.Component {
  constructor(props) { super(props); this.state = { hasError: false, error: null, info: null }; }
  static getDerivedStateFromError(error) { return { hasError: true, error }; }
  componentDidCatch(error, info) {
    console.error('REACT_CRASH:', error.message);
    console.error('COMPONENT_STACK:', info.componentStack);
  }
  render() {
    if (this.state.hasError) {
      return React.createElement('div', { style: { color: 'red', padding: 40, fontSize: 16, fontFamily: 'monospace', whiteSpace: 'pre-wrap' } },
        'React Error: ' + this.state.error.message + '\n\nCheck browser console for details.');
    }
    return this.props.children;
  }
}
window.addEventListener('error', function(e) {
  console.error('GLOBAL_ERROR:', e.message, e.filename, e.lineno);
  var d = document.createElement('div');
  d.style.cssText = 'position:fixed;top:0;left:0;right:0;padding:20px;background:red;color:white;font:14px monospace;z-index:99999;white-space:pre-wrap';
  d.textContent = 'JS ERROR: ' + e.message + ' (line ' + e.lineno + ')';
  document.body.appendChild(d);
});
ReactDOM.createRoot(document.getElementById('root')).render(
  React.createElement(__ErrorBoundary__, null, React.createElement(__default__))
);
</script>
