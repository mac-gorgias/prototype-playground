function matchScriptedIntent(text) {
  if (!text) return null;
  const lower = text.toLowerCase();
  for (let i = 0; i < SCRIPTED_INTENTS.length; i++) {
    const intent = SCRIPTED_INTENTS[i];
    for (let j = 0; j < intent.keywords.length; j++) {
      if (lower.indexOf(intent.keywords[j]) !== -1) return intent;
    }
  }
  return null;
}

/* Render plain text with one substring bolded (used for the "9 skills" inline bold) */
function renderTextWithBold(text, boldPart) {
  if (!boldPart) return text;
  const parts = Array.isArray(boldPart) ? boldPart : [boldPart];
  const matches = [];
  parts.forEach((p) => {
    if (!p) return;
    const i = text.indexOf(p);
    if (i < 0) return;
    matches.push({ start: i, end: i + p.length });
  });
  if (matches.length === 0) return text;
  matches.sort((a, b) => a.start - b.start);
  const merged = [];
  for (const m of matches) {
    if (merged.length && m.start <= merged[merged.length - 1].end) {
      merged[merged.length - 1].end = Math.max(merged[merged.length - 1].end, m.end);
    } else {
      merged.push({ ...m });
    }
  }
  const out = [];
  let cursor = 0;
  merged.forEach((m, idx) => {
    if (cursor < m.start) out.push(<React.Fragment key={"t" + idx}>{text.slice(cursor, m.start)}</React.Fragment>);
    out.push(<strong key={"b" + idx} style={{ color: "#1a1a1a", fontWeight: 600 }}>{text.slice(m.start, m.end)}</strong>);
    cursor = m.end;
  });
  if (cursor < text.length) out.push(<React.Fragment key="tend">{text.slice(cursor)}</React.Fragment>);
  return <React.Fragment>{out}</React.Fragment>;
}

/* ─── Live chat widget (Chat 2.0) — accepts an optional preloaded shopper message ─── */
function ModalLiveChat({ preloadMessage }) {
  const [messages, setMessages] = useState([]);
  const [input, setInput] = useState("");
  const [sending, setSending] = useState(false);
  const [viewState, setViewState] = useState(preloadMessage ? "thread" : "home"); // home | transitioning | thread
  const threadRef = useRef(null);
  const preloadFiredRef = useRef(false);

  const [toastVisible, setToastVisible] = useState(false);
  const toastTimerRef = useRef(null);
  const showKnowledgeToast = () => {
    setToastVisible(true);
    if (toastTimerRef.current) clearTimeout(toastTimerRef.current);
    toastTimerRef.current = setTimeout(() => setToastVisible(false), 3000);
  };
  const dismissToast = () => {
    setToastVisible(false);
    if (toastTimerRef.current) { clearTimeout(toastTimerRef.current); toastTimerRef.current = null; }
  };
  useEffect(() => {
    return () => { if (toastTimerRef.current) clearTimeout(toastTimerRef.current); };
  }, []);

  useEffect(() => {
    if (threadRef.current) threadRef.current.scrollTop = threadRef.current.scrollHeight;
  }, [messages, sending]);

  const appendVisible = () => {
    setMessages((prev) => prev.map((m, i) => i === prev.length - 1 ? Object.assign({}, m, { visible: true }) : m));
  };

  const doAssistantReply = useCallback((text) => {
    setSending(true);
    const intent = matchScriptedIntent(text);
    setTimeout(() => {
      const payload = intent === null
        ? { role: "assistant", isFallback: true, visible: false }
        : { role: "assistant", text: intent.response, products: intent.products || null, visible: false };
      setMessages((prev) => prev.concat([payload]));
      setSending(false);
      setTimeout(appendVisible, 50);
    }, 700);
  }, []);

  const sendMessage = useCallback((text) => {
    if (!text || sending) return;
    const userMsg = { role: "user", text: text, visible: false };
    setInput("");
    if (viewState === "home" || viewState === "transitioning") {
      setViewState("transitioning");
      setTimeout(() => {
        setViewState("thread");
        setMessages((prev) => prev.concat([userMsg]));
        setTimeout(() => { appendVisible(); doAssistantReply(text); }, 50);
      }, 500);
    } else {
      setMessages((prev) => prev.concat([userMsg]));
      setTimeout(() => { appendVisible(); doAssistantReply(text); }, 50);
    }
  }, [sending, viewState, doAssistantReply]);

  /* Preload: fire once on mount with the supplied message, skip home view */
  useEffect(() => {
    if (!preloadMessage || preloadFiredRef.current) return;
    preloadFiredRef.current = true;
    const userMsg = { role: "user", text: preloadMessage, visible: false };
    setMessages([userMsg]);
    setTimeout(() => { appendVisible(); doAssistantReply(preloadMessage); }, 80);
  }, [preloadMessage, doAssistantReply]);

  const onChipClick = (chip) => sendMessage(chip);
  const onKeyDown = (e) => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(input.trim()); }
  };
  const handleBack = () => { setMessages([]); setViewState("home"); };

  const isHome = viewState === "home";
  const isTransitioning = viewState === "transitioning";
  const showHomeElements = isHome || isTransitioning;
  const showThread = viewState === "thread";

  return (
    <div style={{
      width: "100%", height: "100%",
      display: "flex", flexDirection: "column",
      borderRadius: 40, overflow: "hidden",
      background: "radial-gradient(ellipse 100% 90% at 100% 105%, rgba(241, 157, 79, 0.55), transparent 62%), radial-gradient(ellipse 100% 90% at 0% -5%, rgba(207, 191, 170, 0.75), transparent 60%), linear-gradient(180deg, #EAE2CF 0%, #EFD4CE 100%)",
      border: "1.5px solid rgba(255,255,255,0.7)",
      boxShadow: "0 20px 60px rgba(0,0,0,0.12), 0 8px 24px rgba(0,0,0,0.08)",
      position: "relative",
      fontFamily: "'Inter', sans-serif",
      color: "#1E242E",
    }}>
      {/* Top nav */}
      <div style={{
        display: "flex", alignItems: "center", justifyContent: "space-between",
        padding: "32px 20px 16px", flexShrink: 0,
        backdropFilter: "blur(5px)", WebkitBackdropFilter: "blur(5px)",
      }}>
        <div style={{ width: 44, height: 44 }}>
          <button onClick={handleBack} style={{
            width: 44, height: 44, borderRadius: 24,
            background: "rgba(255,255,255,0.2)",
            border: "none",
            boxShadow: "0 2px 3px rgba(0,0,0,0.1)",
            display: "flex", alignItems: "center", justifyContent: "center",
            cursor: "pointer", padding: 0,
            color: "#1E242E",
            opacity: showThread ? 1 : 0,
            transform: showThread ? "scale(1)" : "scale(0.9)",
            pointerEvents: showThread ? "auto" : "none",
            transition: "all .5s",
          }}>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round">
              <polyline points="15 18 9 12 15 6" />
            </svg>
          </button>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <button style={{

              <path d="M2 2h2.37l2.61 9.26c.07.24.21.45.41.59.19.15.44.23.68.23h7.02c.25 0 .49-.08.69-.23.19-.14.34-.36.41-.59L18 4.8H5.17" stroke="#1E242E" strokeWidth="1.3" strokeLinecap="round" strokeLinejoin="round" />

        </div>

        {showHomeElements && !isTransitioning && <div style={{ flex: 1 }} />}

        {showThread && messages.map((msg, i) => {
          let priorAssistantCount = 0;
          for (let pi = 0; pi < i; pi++) if (messages[pi].role === "assistant") priorAssistantCount++;
          const isFirstAssistant = msg.role === "assistant" && priorAssistantCount === 0;

/* ─── Skill list: separate cards + inline "N more skills" expander (matches research "4 more" pattern) ─── */
function SkillListCard({ skills = SKILLS, startIndex = 0, visibleCount = 3, needsInfo = false, activeSkillIdx, expanded, onToggleExpanded, onPreview, onEdit }) {
  const visibleSkills = expanded ? skills : skills.slice(0, visibleCount);
  const hiddenCount = skills.length - visibleCount;

  return (
    <div style={{ marginTop: 8 }}>
      {visibleSkills.map((skill, i) => (
        <SkillCard
          key={skill.key}
          skill={skill}
          index={startIndex + i}
          isActive={activeSkillIdx === startIndex + i}
          onPreview={onPreview}
          onEdit={onEdit}
          needsInfo={needsInfo}
        />
      ))}
      {hiddenCount > 0 && (
        <div
          onClick={onToggleExpanded}
          style={{
            display: "inline-flex", alignSelf: "flex-start",
            alignItems: "center", gap: 6,
            padding: "5px 8px", cursor: "pointer", borderRadius: 8,
            marginTop: 2, marginBottom: 8,
            width: "fit-content",
          }}
          onMouseEnter={(e) => { e.currentTarget.style.background = SURFACE; }}
          onMouseLeave={(e) => { e.currentTarget.style.background = "transparent"; }}
        >
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" style={{
            transition: "transform .2s",
            transform: expanded ? "rotate(180deg)" : "rotate(0deg)",
          }}>
            <path d="M4 5.5l3 3 3-3" stroke={TEXT_MUTED} strokeWidth="1.3" strokeLinecap="round" strokeLinejoin="round" />
          </svg>
          <span style={{ fontSize: 12, color: TEXT_MUTED }}>
            {expanded ? "Show less" : hiddenCount + " more skills"}
          </span>
        </div>
      )}
    </div>
  );
}

          onChange={(e) => { if (!frozen) onFreeformChange && onFreeformChange(e.target.value); }}
          onKeyDown={(e) => { if (e.key === "Enter") { e.preventDefault(); if (!frozen && (freeformValue || "").trim() && onFreeformSubmit) onFreeformSubmit(); } }}
          placeholder="Something else..."
          disabled={frozen}

      <div style={{ padding: "14px 18px", display: "flex", alignItems: "center", justifyContent: "flex-end", gap: 12 }}>
        {onSkip && (
          <button
            onClick={() => { if (!frozen) onSkip(); }}
            style={{
              fontSize: 14, fontWeight: 500, color: TEXT,
              background: "transparent", border: "none",
              borderRadius: 8, padding: "9px 14px",
              cursor: frozen ? "default" : "pointer",
              transition: "background .15s", fontFamily: "'Inter', sans-serif",
            }}
            onMouseEnter={(e) => { if (!frozen) e.currentTarget.style.background = SURFACE; }}
            onMouseLeave={(e) => { e.currentTarget.style.background = "transparent"; }}
          >Skip</button>
        )}
        <button
          onClick={handleSubmit}
          disabled={frozen || (!toggles.email && !toggles.chat)}
          style={{
            fontSize: 14, fontWeight: 600, color: "#fff",
            background: (frozen || (!toggles.email && !toggles.chat)) ? "#9CA3AF" : TEXT, border: "none",

          onMouseLeave={(e) => { if (!frozen && (toggles.email || toggles.chat)) e.currentTarget.style.background = TEXT; }}
        >Submit</button>
      </div>
    </div>
  );
}

    const wordSpans = [];
    words.forEach((word, i) => {
      const span = document.createElement("span");
      span.textContent = word + (i < words.length - 1 ? " " : "");
      span.style.cssText = "display:inline-block; will-change:transform,filter,opacity;";
      el.appendChild(span);
      wordSpans.push(span);
      const anim = span.animate([

        { filter: "blur(5px)",  opacity: 0.5, transform: "translateY(5px)"   },
        { filter: "blur(0px)",  opacity: 1,   transform: "translateY(0px)"   },
      ], { duration: 1400, delay: i * 300, easing: "ease", fill: "both" });
      if (i === words.length - 1) {
        anim.addEventListener("finish", () => {
          setTimeout(() => {
            wordSpans.forEach((s, j) => {
              const exitAnim = s.animate([
                { opacity: 1, transform: "translateY(0px)",   filter: "blur(0px)" },
                { opacity: 0, transform: "translateY(-24px)", filter: "blur(4px)" },
              ], { duration: 700, delay: j * 150, easing: "ease", fill: "forwards" });

          setIsTypingMessage(false);
          setChatMessages((prev) => [...prev, { role: "ai", text: fullText, bold: welcomeMessages[currentMsgIndex].bold || null }]);

      timerId = setTimeout(tick, 250 + Math.random() * 350);

    return () => { cancelled = true; clearTimeout(timerId); };

const INTEGRATION_LOGOS = {

const CARD_WIDTHS = { sm: 180, md: 220, lg: 240 };

function FloatingCard({ card, phase }) {
  const outerRef = React.useRef(null);
  const innerRef = React.useRef(null);
  const convergedRef = React.useRef(false);

  React.useEffect(() => {
    if (phase !== "converge" || !outerRef.current || !innerRef.current || convergedRef.current) return;
    convergedRef.current = true;
    const opts = { duration: 900, delay: card.delay * 300, easing: "cubic-bezier(0.7, 0, 0.84, 0)", fill: "both" };
    outerRef.current.animate(
      [
        { left: `${card.x}%`, top: `${card.y}%` },
        { left: "50%",        top: "50%" },
      ],
      opts
    );
    innerRef.current.animate(
      [
        { opacity: 1, transform: `rotate(${card.rotate}deg) scale(1)`,    filter: "blur(0px)" },
        { opacity: 0, transform: "rotate(0deg) scale(0.1)",                filter: "blur(6px)" },
      ],
      opts
    );
  }, [phase, card]);

  const baseAnim =
    phase === "converge"
      ? "none"
      : `welcomeCardArrive 800ms cubic-bezier(0.22, 1, 0.36, 1) ${card.delay}s both, welcomeCardDrift ${card.driftDuration}s ease-in-out ${card.delay}s infinite`;

  const cardWidth = CARD_WIDTHS[card.size] || 220;

  let body;
  if (card.kind === "integration") {
    const logo = INTEGRATION_LOGOS[card.logo];
    body = (
      <div style={{ display: "flex", alignItems: "center", gap: 10, padding: "10px 12px" }}>
        <div style={{
          flexShrink: 0, width: 36, height: 36, borderRadius: 12,
          background: logo.bg, color: "#fff",
          display: "flex", alignItems: "center", justifyContent: "center",
          fontSize: 15, fontWeight: 600,
        }}>{logo.glyph}</div>
        <div style={{ display: "flex", flexDirection: "column" }}>
          <span style={{ fontSize: 13, fontWeight: 500, color: "#171717" }}>{card.title}</span>
          <span style={{ fontSize: 11, color: "#737373" }}>{card.subtitle}</span>
        </div>
      </div>
    );
  } else if (card.kind === "prompt") {
    body = (
      <div style={{ display: "flex", alignItems: "flex-start", gap: 8, padding: "12px 14px" }}>
        <div style={{ marginTop: 6, flexShrink: 0, width: 6, height: 6, borderRadius: "50%", background: "#fda4af" }} />
        <span style={{ fontSize: 13, lineHeight: 1.4, color: "#262626" }}>"{card.title}"</span>
      </div>
    );
  } else {
    body = (
      <div style={{ display: "flex", flexDirection: "column" }}>
        <div style={{ position: "relative", aspectRatio: "4 / 5", width: "100%", overflow: "hidden", borderTopLeftRadius: 16, borderTopRightRadius: 16 }}>
          <img src={card.image} alt={card.caption || ""} loading="lazy" style={{ height: "100%", width: "100%", objectFit: "cover", display: "block" }} />
        </div>
        {card.caption && (
          <span style={{ padding: "8px 12px", fontSize: 11, letterSpacing: "0.02em", color: "#525252" }}>{card.caption}</span>
        )}
      </div>
    );
  }

  return (
    <div
      ref={outerRef}
      style={{
        position: "absolute",
        left: `${card.x}%`,
        top: `${card.y}%`,
        transform: "translate(-50%, -50%)",
        pointerEvents: "none",
        willChange: "left, top",
      }}
    >
      <div
        ref={innerRef}
        style={{
          "--rot": `${card.rotate}deg`,
          "--dx": `${card.driftX}px`,
          "--dy": `${card.driftY}px`,
          width: cardWidth,
          overflow: "hidden",
          borderRadius: 16,
          border: "1px solid rgba(229, 229, 229, 0.7)",
          background: "rgba(255, 255, 255, 0.95)",
          backdropFilter: "blur(2px)",
          WebkitBackdropFilter: "blur(2px)",
          boxShadow: "0 1px 2px rgba(15,15,20,0.04), 0 8px 24px -8px rgba(15,15,20,0.12), 0 24px 48px -16px rgba(15,15,20,0.08)",
          animation: baseAnim,
          opacity: 0,
          willChange: "transform, opacity",
        }}
      >
        {body}
      </div>
    </div>
  );
}

function WelcomeIntro({ onStartSetup, closing }) {
  const reducedMotion = typeof window !== "undefined" && window.matchMedia
    ? window.matchMedia("(prefers-reduced-motion: reduce)").matches
    : false;
  const slowmo = (() => {
    if (typeof window === "undefined") return 1;
    const v = parseFloat(new URLSearchParams(window.location.search).get("slowmo") || "1");
    return Number.isFinite(v) && v > 0 ? v : 1;
  })();

  const [phase, setPhase] = useState(reducedMotion ? "reveal" : "arrival");

  useEffect(() => {
    if (reducedMotion) return;
    const m = Math.max(1, slowmo);
    const timers = [
      setTimeout(() => setPhase("drift"),    1100 * m),
      setTimeout(() => setPhase("converge"), 4600 * m),
      setTimeout(() => setPhase("reveal"),   5700 * m),
    ];
    return () => timers.forEach(clearTimeout);
  }, [reducedMotion, slowmo]);

  const auroraOpacity =
    phase === "arrival"  ? 0.25 :
    phase === "drift"    ? 0.45 :
    phase === "converge" ? 0.7  : 1;
  const auroraScale =
    phase === "arrival"  ? 0.7  :
    phase === "drift"    ? 0.85 :
    phase === "converge" ? 0.55 : 1;

  const showCards = phase === "arrival" || phase === "drift" || phase === "converge";
  const showLogo  = phase === "reveal";

  return (
    <div style={{
      position: "absolute", inset: 0, zIndex: 5, overflow: "hidden",
      background: "#ffffff", borderRadius: 16,
      animation: closing ? "fadeOut .5s ease forwards" : "none",
      pointerEvents: closing ? "none" : "auto",
    }}>
      <AuroraBlob opacity={auroraOpacity} scale={auroraScale} />

      {showCards && (
        <div style={{ position: "absolute", inset: 0 }}>
          {introCards.map((c) => <FloatingCard key={c.id} card={c} phase={phase} />)}
        </div>
      )}

      {showLogo && (
        <div style={{
          position: "absolute", inset: 0,
          display: "flex", alignItems: "center", justifyContent: "center",
          padding: "32px 56px", overflow: "auto",
          animation: "welcomeLogoReveal 900ms cubic-bezier(0.22, 1, 0.36, 1) both",
        }}>
          <div style={{ flex: "0 1 480px", minWidth: 0, display: "flex", flexDirection: "column", gap: 22 }}>
            <img
              src="Logo AI Agent.svg"
              alt="AI Agent"
              style={{ height: 36, width: "auto", display: "block", alignSelf: "flex-start" }}
              draggable={false}
            />

            <h1 style={{
              fontSize: 32, fontWeight: 700, color: TEXT,
              lineHeight: 1.2, letterSpacing: "-0.5px", margin: 0,
            }}>
              Help shoppers browse, buy, and get support—24/7
            </h1>

            <div style={{ animation: "welcomeFadeUp 600ms cubic-bezier(0.22, 1, 0.36, 1) 300ms both" }}>
              <div style={{ fontSize: 15, color: TEXT_MUTED, marginBottom: 12 }}>
                Set up AI Agent with confidence:
              </div>
              <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                {[
                  "Define how it responds to specific topics",
                  "Test and refine conversations",
                  "Preview the shopper experience before going live",
                ].map((item, i) => (
                  <div key={i} style={{ display: "flex", alignItems: "center", gap: 10 }}>
                    <svg width="18" height="18" viewBox="0 0 18 18" fill="none" style={{ flexShrink: 0 }}>
                      <path d="M3.5 9.5l3 3 8-8" stroke="#1F8A4C" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" />
                    </svg>
                    <span style={{ fontSize: 15, color: TEXT, lineHeight: 1.5 }}>{item}</span>
                  </div>
                ))}
              </div>
            </div>

            <button
              type="button"
              onClick={onStartSetup}
              style={{
                alignSelf: "flex-start",
                fontSize: 14, fontWeight: 500, color: "#fff",
                background: TEXT, border: "1px solid " + TEXT,
                borderRadius: 8, padding: "10px 18px",
                display: "inline-flex", alignItems: "center", gap: 8,
                cursor: "pointer", transition: "background .15s, border-color .15s",
                fontFamily: "'Inter', sans-serif",
                marginTop: 8,
                animation: "welcomeFadeUp 600ms cubic-bezier(0.22, 1, 0.36, 1) 550ms both",
              }}
              onMouseEnter={(e) => { e.currentTarget.style.background = "#333"; e.currentTarget.style.borderColor = "#333"; }}
              onMouseLeave={(e) => { e.currentTarget.style.background = TEXT; e.currentTarget.style.borderColor = TEXT; }}
            >
              Start setup
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                <path d="M3 7h8M7 3l4 4-4 4" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" />
              </svg>
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

class __ErrorBoundary__ extends React.Component {
  constructor(props) { super(props); this.state = { hasError: false, error: null, info: null }; }
  static getDerivedStateFromError(error) { return { hasError: true, error }; }
  componentDidCatch(error, info) {
    console.error('REACT_CRASH:', error.message);
    console.error('COMPONENT_STACK:', info.componentStack);
  }
  render() {
    if (this.state.hasError) {
      return React.createElement('div', { style: { color: 'red', padding: 40, fontSize: 16, fontFamily: 'monospace', whiteSpace: 'pre-wrap' } },
        'React Error: ' + this.state.error.message + '\n\nCheck browser console for details.');
    }
    return this.props.children;
  }
}

  document.body.appendChild(d);
});
