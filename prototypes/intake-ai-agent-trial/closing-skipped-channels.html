<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Closing Screen — Channels Skipped</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Inter:wght@400;450;500;600;700&display=swap" rel="stylesheet" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', sans-serif; background: #FAFAF8; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  @keyframes cinematicWordIn {
    0% { opacity: 0; transform: translateY(20px); filter: blur(8px); }
    60% { opacity: 1; filter: blur(0); }
    100% { opacity: 1; transform: translateY(0); filter: blur(0); }
  }
  @keyframes cinematicIconPop {
    0% { opacity: 0; transform: scale(0.5) rotate(-12deg); }
    60% { opacity: 1; transform: scale(1.08) rotate(4deg); }
    100% { opacity: 1; transform: scale(1) rotate(0deg); }
  }
  @keyframes cinematicSlideUp {
    0% { opacity: 0; transform: translateY(24px); }
    100% { opacity: 1; transform: translateY(0); }
  }
  @keyframes overlayBackdropIn {
    0% { opacity: 0; backdrop-filter: blur(0px); -webkit-backdrop-filter: blur(0px); }
    100% { opacity: 1; backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
  }
  @keyframes fadeIn {
    0% { opacity: 0; }
    100% { opacity: 1; }
  }
</style>
<script>
const AURORA_PATH_A = "M421,318 C467,253 525,210 595,213 C682,217 738,287 736,366 C734,449 670,500 595,510 C504,522 401,477 380,395 C366,340 386,360 421,318 Z";
const AURORA_PATH_B = "M398,290 C462,232 552,206 622,242 C700,283 729,377 700,449 C672,518 588,541 510,520 C420,496 351,438 348,365 C346,310 354,330 398,290 Z";
const AURORA_PATH_C = "M440,340 C480,260 540,200 615,225 C700,253 745,330 730,410 C715,490 640,535 555,520 C470,505 395,460 385,390 C378,335 415,395 440,340 Z";
</script>
<script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.23.6/babel.min.js"></script>
</head>
<body>
<div id="root" style="width:100%;height:100vh;position:relative;"></div>
<script type="text/babel">
const ACCENT = "#7E55F6";
const TEXT = "#1E242E";
const TEXT_MUTED = "#8A8A8A";

const BTN_BASE = {
  display: "inline-flex", alignItems: "center", justifyContent: "center",
  gap: 6, fontFamily: "'Inter', sans-serif", fontWeight: 600,
  borderRadius: 8, cursor: "pointer", whiteSpace: "nowrap",
  boxSizing: "border-box", transition: "background .15s, box-shadow .15s, border-color .15s",
};
const BTN_MD = { ...BTN_BASE, height: 32, fontSize: 14, lineHeight: "20px", padding: "0 12px" };
const BTN_PRIMARY = { ...BTN_MD, color: "#fff", background: "#1E242E", border: "1px solid transparent", boxShadow: "0px 2px 3px 0px rgba(0,0,0,0.05)" };
const BTN_PRIMARY_HOVER = { background: "#333" };
const BTN_PRIMARY_LEAVE = { background: "#1E242E" };
const BTN_SECONDARY = { ...BTN_MD, color: "#1E242E", background: "rgba(255,255,255,0.5)", border: "1px solid rgba(103,113,131,0.5)", boxShadow: "0px 2px 3px 0px rgba(0,0,0,0.05)" };
const BTN_SECONDARY_HOVER = { background: "rgba(27,35,50,0.03)", boxShadow: "none" };
const BTN_SECONDARY_LEAVE = { background: "rgba(255,255,255,0.5)", boxShadow: "0px 2px 3px 0px rgba(0,0,0,0.05)" };

function AuroraBlob({ opacity, scale }) {
  return (
    <div style={{ position: "absolute", inset: 0, display: "flex", alignItems: "center", justifyContent: "center", pointerEvents: "none", opacity, transition: "opacity 600ms cubic-bezier(0.22, 1, 0.36, 1)" }}>
      <svg viewBox="0 0 1000 700" style={{ height: "140vh", width: "140vh", maxWidth: "none", filter: "blur(40px)", transform: `scale(${scale})`, transition: "transform 900ms cubic-bezier(0.22, 1, 0.36, 1)" }}>
        <defs>
          <radialGradient id="aurora-mint" cx="30%" cy="40%" r="40%"><stop offset="0%" stopColor="#F1ECFF" stopOpacity="0.95" /><stop offset="100%" stopColor="#F1ECFF" stopOpacity="0" /></radialGradient>
          <radialGradient id="aurora-pink" cx="70%" cy="35%" r="40%"><stop offset="0%" stopColor="#FEE1F9" stopOpacity="0.95" /><stop offset="100%" stopColor="#FEE1F9" stopOpacity="0" /></radialGradient>
          <radialGradient id="aurora-lav" cx="60%" cy="70%" r="45%"><stop offset="0%" stopColor="#E8F5F8" stopOpacity="0.9" /><stop offset="100%" stopColor="#E8F5F8" stopOpacity="0" /></radialGradient>
          <radialGradient id="aurora-peach" cx="35%" cy="65%" r="40%"><stop offset="0%" stopColor="#FDF1CD" stopOpacity="0.9" /><stop offset="100%" stopColor="#FDF1CD" stopOpacity="0" /></radialGradient>
        </defs>
        <path fill="url(#aurora-mint)" d={AURORA_PATH_A}><animate attributeName="d" values={`${AURORA_PATH_A};${AURORA_PATH_B};${AURORA_PATH_C};${AURORA_PATH_A}`} dur="8s" repeatCount="indefinite" /></path>
        <path fill="url(#aurora-pink)" d={AURORA_PATH_B}><animate attributeName="d" values={`${AURORA_PATH_B};${AURORA_PATH_C};${AURORA_PATH_A};${AURORA_PATH_B}`} dur="9s" repeatCount="indefinite" /></path>
        <path fill="url(#aurora-lav)" d={AURORA_PATH_C}><animate attributeName="d" values={`${AURORA_PATH_C};${AURORA_PATH_A};${AURORA_PATH_B};${AURORA_PATH_C}`} dur="10s" repeatCount="indefinite" /></path>
        <path fill="url(#aurora-peach)" d={AURORA_PATH_A}><animate attributeName="d" values={`${AURORA_PATH_A};${AURORA_PATH_C};${AURORA_PATH_B};${AURORA_PATH_A}`} dur="11s" repeatCount="indefinite" /></path>
      </svg>
    </div>
  );
}

function ClosingScreenSkipped() {
  const wordIn = (delay) => ({
    display: "inline-block",
    opacity: 0,
    animation: "cinematicWordIn .8s cubic-bezier(.16,1,.3,1) " + delay + "s forwards",
  });
  return (
    <div style={{
      position: "absolute", inset: 0, zIndex: 2000,
      background: "#ffffff",
      display: "flex", alignItems: "center", justifyContent: "center",
      padding: "48px 32px",
      animation: "overlayBackdropIn .6s ease forwards",
      overflow: "hidden",
    }}>
      <div style={{ position: "absolute", inset: 0, zIndex: 0, opacity: 0, animation: "fadeIn 1.2s ease 0.3s forwards" }}>
        <AuroraBlob opacity={0.7} scale={1.1} />
      </div>
      <div style={{ maxWidth: 640, width: "100%", textAlign: "center", position: "relative", zIndex: 1 }}>
        {/* Sparkle icon */}
        <div style={{
          width: 80, height: 80, borderRadius: 22,
          background: "linear-gradient(135deg, " + ACCENT + " 0%, #9474E5 100%)",
          color: "#fff",
          display: "inline-flex", alignItems: "center", justifyContent: "center",
          marginBottom: 32,
          boxShadow: "0 18px 40px rgba(104,63,207,.28), 0 4px 12px rgba(104,63,207,.15)",
          opacity: 0,
          animation: "cinematicIconPop .7s cubic-bezier(.16,1,.3,1) .25s forwards",
        }}>
          <svg width="38" height="38" viewBox="0 0 24 24" fill="none">
            <path d="M12 3l2 6 6 2-6 2-2 6-2-6-6-2 6-2z" fill="currentColor" />
          </svg>
        </div>

        {/* Headline */}
        <h1 style={{
          fontFamily: "'Inter', sans-serif",
          fontSize: 38, fontWeight: 700, letterSpacing: "-0.6px",
          color: "#1A1918", lineHeight: 1.2, marginBottom: 12,
        }}>
          <span style={wordIn(.65)}>Your AI Agent is ready to go</span>
        </h1>
        <p style={Object.assign({}, wordIn(.95), {
          fontFamily: "'Inter', sans-serif",
          fontSize: 18, fontWeight: 400, lineHeight: 1.45,
          color: TEXT_MUTED, marginBottom: 18, maxWidth: 560,
        })}>
          Tone of voice, knowledge, and skills are all configured. Connect a support channel to start helping customers.
        </p>

        {/* What happens next */}
        <div style={{ marginTop: 32, marginBottom: 40, textAlign: "left", maxWidth: 480, marginLeft: "auto", marginRight: "auto" }}>
          <div style={{
            fontSize: 14, fontWeight: 600, color: TEXT, marginBottom: 16,
            opacity: 0,
            animation: "cinematicSlideUp .55s cubic-bezier(.16,1,.3,1) 1.5s forwards",
          }}>Here's what you've set up:</div>
          <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
            {[
              {
                icon: (
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                    <path d="M10 17 L10 25 L16 25 L28 30 L28 12 L16 17 Z" stroke="currentColor" strokeWidth="1.4" fill="currentColor" fillOpacity="0.12" strokeLinejoin="round" transform="scale(0.7) translate(3,3)" />
                  </svg>
                ),
                text: "Tone of voice — your brand's personality is locked in",
              },
              {
                icon: (
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                    <path d="M12 7c-1.2-1.2-3-1.8-4.8-1.8s-3 .3-3 .3V17s1.2-.3 3-.3 3.6.6 4.8 1.8c1.2-1.2 3-1.8 4.8-1.8s3 .3 3 .3V5.5S18 5.2 16.8 5.2 13.2 5.8 12 7z" stroke="currentColor" strokeWidth="1.4" fill="currentColor" fillOpacity="0.08" strokeLinejoin="round" />
                    <path d="M12 7v11.5" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round" />
                  </svg>
                ),
                text: "Knowledge sources — website and help center connected",
              },
              {
                icon: (
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                    <path d="M4 6h8M16 6h4" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" />
                    <circle cx="14" cy="6" r="2" stroke="currentColor" strokeWidth="1.6" />
                    <path d="M4 12h2M10 12h10" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" />
                    <circle cx="8" cy="12" r="2" stroke="currentColor" strokeWidth="1.6" />
                    <path d="M4 18h12M20 18h0" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" />
                    <circle cx="18" cy="18" r="2" stroke="currentColor" strokeWidth="1.6" />
                  </svg>
                ),
                text: "Skills are configured and ready to handle conversations",
              },
              {
                icon: (
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                    <circle cx="12" cy="12" r="7" stroke="currentColor" strokeWidth="1.6" strokeDasharray="3 3" />
                    <path d="M12 9v3l2 2" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round" />
                  </svg>
                ),
                text: "Connect a support channel to go live",
                muted: true,
              },
            ].map((b, i) => (
              <div key={i} style={{
                display: "flex", alignItems: "center", gap: 14,
                opacity: 0,
                animation: "cinematicSlideUp .55s cubic-bezier(.16,1,.3,1) " + (1.7 + i * 0.18) + "s forwards",
              }}>
                <div style={{
                  width: 36, height: 36, borderRadius: 8,
                  background: b.muted ? "#F5F5F3" : "#EDE8F8",
                  color: b.muted ? "#8A8A8A" : "#7E55F6",
                  display: "flex", alignItems: "center", justifyContent: "center",
                  flexShrink: 0,
                }}>{b.icon}</div>
                <span style={{ fontSize: 15, color: b.muted ? TEXT_MUTED : TEXT, lineHeight: 1.5 }}>{b.text}</span>
              </div>
            ))}
          </div>
        </div>

        {/* CTAs */}
        <div style={{
          display: "flex", gap: 10, justifyContent: "center", flexWrap: "wrap",
          opacity: 0,
          animation: "cinematicSlideUp .55s cubic-bezier(.16,1,.3,1) 2.4s forwards",
        }}>
          <button
            style={BTN_SECONDARY}
            onMouseEnter={(e) => { Object.assign(e.currentTarget.style, BTN_SECONDARY_HOVER); }}
            onMouseLeave={(e) => { Object.assign(e.currentTarget.style, BTN_SECONDARY_LEAVE); }}
          >Take me to my inbox</button>
          <button
            style={BTN_PRIMARY}
            onMouseEnter={(e) => { Object.assign(e.currentTarget.style, BTN_PRIMARY_HOVER); }}
            onMouseLeave={(e) => { Object.assign(e.currentTarget.style, BTN_PRIMARY_LEAVE); }}
          >
            Connect a channel
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
              <path d="M3 7h8M7 3l4 4-4 4" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" />
            </svg>
          </button>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<ClosingScreenSkipped />);
</script>
</body>
</html>
