  /* ─── BorderGlow ─── */
  .border-glow-card {
    --edge-proximity: 0;
    --cursor-angle: 45deg;
    --edge-sensitivity: 30;
    --color-sensitivity: calc(var(--edge-sensitivity) + 20);
    --border-radius: 28px;
    --glow-padding: 40px;
    --cone-spread: 25;

    position: relative;
    border-radius: var(--border-radius);
    isolation: isolate;
    transform: translate3d(0, 0, 0.01px);
    display: grid;
    border: 1px solid rgb(255 255 255 / 15%);
    background: var(--card-bg, #060010);
    overflow: visible;
    box-shadow:
      rgba(0, 0, 0, 0.1) 0px 1px 2px,
      rgba(0, 0, 0, 0.1) 0px 2px 4px,
      rgba(0, 0, 0, 0.1) 0px 4px 8px,
      rgba(0, 0, 0, 0.1) 0px 8px 16px,
      rgba(0, 0, 0, 0.1) 0px 16px 32px,
      rgba(0, 0, 0, 0.1) 0px 32px 64px;
  }
  .border-glow-card::before,
  .border-glow-card::after,
  .border-glow-card > .edge-light {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: inherit;
    transition: opacity 0.25s ease-out;
    z-index: -1;
  }
  .border-glow-card:not(:hover):not(.sweep-active)::before,
  .border-glow-card:not(:hover):not(.sweep-active)::after,
  .border-glow-card:not(:hover):not(.sweep-active) > .edge-light {
    opacity: 0;
    transition: opacity 0.75s ease-in-out;
  }
  .border-glow-card::before {
    border: 1px solid transparent;
    background:
      linear-gradient(var(--card-bg, #060010) 0 100%) padding-box,
      linear-gradient(rgb(255 255 255 / 0%) 0% 100%) border-box,
      var(--gradient-one, radial-gradient(at 80% 55%, hsla(268, 100%, 76%, 1) 0px, transparent 50%)) border-box,
      var(--gradient-two, radial-gradient(at 69% 34%, hsla(349, 100%, 74%, 1) 0px, transparent 50%)) border-box,
      var(--gradient-three, radial-gradient(at 8% 6%, hsla(136, 100%, 78%, 1) 0px, transparent 50%)) border-box,
      var(--gradient-four, radial-gradient(at 41% 38%, hsla(192, 100%, 64%, 1) 0px, transparent 50%)) border-box,
      var(--gradient-five, radial-gradient(at 86% 85%, hsla(186, 100%, 74%, 1) 0px, transparent 50%)) border-box,
      var(--gradient-six, radial-gradient(at 82% 18%, hsla(52, 100%, 65%, 1) 0px, transparent 50%)) border-box,
      var(--gradient-seven, radial-gradient(at 51% 4%, hsla(12, 100%, 72%, 1) 0px, transparent 50%)) border-box,
      var(--gradient-base, linear-gradient(#c299ff 0 100%)) border-box;
    opacity: calc((var(--edge-proximity) - var(--color-sensitivity)) / (100 - var(--color-sensitivity)));
    mask-image:
      conic-gradient(
        from var(--cursor-angle) at center,
        black calc(var(--cone-spread) * 1%),
        transparent calc((var(--cone-spread) + 15) * 1%),
        transparent calc((100 - var(--cone-spread) - 15) * 1%),
        black calc((100 - var(--cone-spread)) * 1%)
      );
  }
  .border-glow-card::after {
    border: 1px solid transparent;
    background:
      var(--gradient-one, radial-gradient(at 80% 55%, hsla(268, 100%, 76%, 1) 0px, transparent 50%)) padding-box,
      var(--gradient-two, radial-gradient(at 69% 34%, hsla(349, 100%, 74%, 1) 0px, transparent 50%)) padding-box,
      var(--gradient-three, radial-gradient(at 8% 6%, hsla(136, 100%, 78%, 1) 0px, transparent 50%)) padding-box,
      var(--gradient-four, radial-gradient(at 41% 38%, hsla(192, 100%, 64%, 1) 0px, transparent 50%)) padding-box,
      var(--gradient-five, radial-gradient(at 86% 85%, hsla(186, 100%, 74%, 1) 0px, transparent 50%)) padding-box,
      var(--gradient-six, radial-gradient(at 82% 18%, hsla(52, 100%, 65%, 1) 0px, transparent 50%)) padding-box,
      var(--gradient-seven, radial-gradient(at 51% 4%, hsla(12, 100%, 72%, 1) 0px, transparent 50%)) padding-box,
      var(--gradient-base, linear-gradient(#c299ff 0 100%)) padding-box;
    mask-image:
      linear-gradient(to bottom, black, black),
      radial-gradient(ellipse at 50% 50%, black 40%, transparent 65%),
      radial-gradient(ellipse at 66% 66%, black 5%, transparent 40%),
      radial-gradient(ellipse at 33% 33%, black 5%, transparent 40%),
      radial-gradient(ellipse at 66% 33%, black 5%, transparent 40%),
      radial-gradient(ellipse at 33% 66%, black 5%, transparent 40%),
      conic-gradient(from var(--cursor-angle) at center, transparent 5%, black 15%, black 85%, transparent 95%);
    mask-composite: subtract, add, add, add, add, add;
    opacity: calc(var(--fill-opacity, 0.5) * (var(--edge-proximity) - var(--color-sensitivity)) / (100 - var(--color-sensitivity)));
    mix-blend-mode: soft-light;
  }
  .border-glow-card > .edge-light {
    inset: calc(var(--glow-padding) * -1);
    pointer-events: none;
    z-index: 1;
    mask-image:
      conic-gradient(
        from var(--cursor-angle) at center, black 2.5%, transparent 10%, transparent 90%, black 97.5%
      );
    opacity: calc((var(--edge-proximity) - var(--edge-sensitivity)) / (100 - var(--edge-sensitivity)));
    mix-blend-mode: plus-lighter;
  }
  .border-glow-card > .edge-light::before {
    content: "";
    position: absolute;
    inset: var(--glow-padding);
    border-radius: inherit;
    box-shadow:
      inset 0 0 0 1px var(--glow-color, hsl(40deg 80% 80% / 100%)),
      inset 0 0 1px 0 var(--glow-color-60, hsl(40deg 80% 80% / 60%)),

      inset 0 0 6px 0 var(--glow-color-40, hsl(40deg 80% 80% / 40%)),
      inset 0 0 15px 0 var(--glow-color-30, hsl(40deg 80% 80% / 30%)),
      inset 0 0 25px 2px var(--glow-color-20, hsl(40deg 80% 80% / 20%)),
      inset 0 0 50px 2px var(--glow-color-10, hsl(40deg 80% 80% / 10%)),
      0 0 1px 0 var(--glow-color-60, hsl(40deg 80% 80% / 60%)),
      0 0 3px 0 var(--glow-color-50, hsl(40deg 80% 80% / 50%)),
      0 0 6px 0 var(--glow-color-40, hsl(40deg 80% 80% / 40%)),
      0 0 15px 0 var(--glow-color-30, hsl(40deg 80% 80% / 30%)),
      0 0 25px 2px var(--glow-color-20, hsl(40deg 80% 80% / 20%)),
      0 0 50px 2px var(--glow-color-10, hsl(40deg 80% 80% / 10%));

  /* Go-live checklist card in the OnboardingChatPage sidebar */
  .golive-checklist {
    width: 100%;
    padding: 16px;
    box-sizing: border-box;
  }
  .golive-card {
    background: #ffffff;
    border: 1px solid #EBECEF;
    border-radius: 12px;
    padding: 16px 16px 24px 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;

  .golive-title {
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 600;
    line-height: 20px;
    color: #683fcf;
    margin: 0;
  }
  .golive-progress-track {
    width: 100%;
    height: 4px;
    background: #f1ecff;
    border-radius: 32px;
    margin-top: 6px;
    overflow: hidden;
  }
  .golive-progress-fill {
    height: 4px;
    background: #7e55f6;
    border-radius: 32px;
    transition: width 0.4s ease;
  }
  .golive-item {
    display: flex;
    flex-direction: row;
    align-items: center;
    gap: 8px;
  }
  .golive-item.checked {
    opacity: 0.5;
  }
  .golive-item.checked .golive-item-label {
    text-decoration: line-through;
  }
  .golive-item-label {
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 400;
    line-height: 16px;
    letter-spacing: 0.01em;
    color: #1e242e;
    white-space: nowrap;
  }
  .golive-item-optional {
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    font-weight: 400;
    color: #9ca3af;
    margin-left: 4px;
  }
  .golive-icon {
    width: 16px;
    height: 16px;
    flex-shrink: 0;
  }

  /* Complete state — title + bar turn green */
  .golive-card.complete {
    position: relative;
    overflow: hidden;
  }
  .golive-card.complete .golive-title {
    color: #1F8A4C;
    transition: color .4s ease;
  }
  .golive-card.complete .golive-progress-track {
    background: #DFF3E6;
    transition: background .4s ease;
  }
  .golive-card.complete .golive-progress-fill {
    background: #1F8A4C;
    transition: background .4s ease;
  }

  /* Full-screen confetti (fires when Zendesk import initiates) */
  .fullscreen-confetti {
    position: fixed;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
    z-index: 1500;
  }
  .fullscreen-confetti span {
    position: absolute;
    top: -20px;
    width: 8px;
    height: 14px;
    border-radius: 1px;
    opacity: 0;
    animation: fullscreenConfettiFall 4s cubic-bezier(.16,1,.3,1) forwards;
  }
  @keyframes fullscreenConfettiFall {
    0%   { transform: translateY(-20px) rotate(0deg); opacity: 0; }
    8%   { opacity: 1; }
    100% { transform: translateY(105vh) rotate(720deg); opacity: 0; }
  }

  /* Overrides for the white "Try the live chat" thread card */
  .border-glow-card.live-chat-card {
    border: 1px solid #E8E8E5;
    box-shadow: none;
  }
  .border-glow-card.live-chat-card .border-glow-inner {
    display: block;
    overflow: visible;

  /* Force a uniform glow ring on hover (no cursor-driven pinching) */
  .border-glow-card.live-chat-card:hover,
  .border-glow-card.live-chat-card.sweep-active {
    --edge-proximity: 100;
  }
  /* Drop the conic masks so the glow covers all sides equally */
  .border-glow-card.live-chat-card > .edge-light {
    mask-image: none;
    -webkit-mask-image: none;
  }
  .border-glow-card.live-chat-card::before {
    mask-image: none;
    -webkit-mask-image: none;
  }
  /* Hide the noisy mesh-fill layer entirely — only the outer halo + colored border ring remain */
  .border-glow-card.live-chat-card::after {
    display: none;
  }
  .animate-fadeInUp { animation: fadeInUp .7s cubic-bezier(.16,1,.3,1) forwards; }
  .animate-fadeIn { animation: fadeIn .5s ease forwards; }
  .animate-slideUp { animation: slideUp .5s cubic-bezier(.16,1,.3,1) forwards; }
  .animate-slideInRight { animation: slideInRight .45s cubic-bezier(.16,1,.3,1) forwards; }
  .animate-stageCardIn { animation: stageCardIn .4s cubic-bezier(.16,1,.3,1) forwards; }
  .chip-dropdown { position: relative; display: inline-flex; }
  .chip-dropdown-menu {
    position: absolute; top: calc(100% + 4px); left: 0; z-index: 50;
    background: white; border: 1px solid #e5e5e0; border-radius: 10px;

  }
  .chip-dropdown-menu button:hover { background: #f5f2fb; }
  .chip-dropdown-menu button.active { color: #683FCF; font-weight: 500; }
  input::placeholder { color: #B0B0B0; }
  ::-webkit-scrollbar { width: 4px; }

  .nav-item { display: flex; align-items: center; justify-content: center; width: 38px; height: 38px; border-radius: 10px; cursor: pointer; transition: all .15s; position: relative; }
  .nav-item:hover { background: #F0F0F0; }
  .nav-item.active-purple { background: #ede8f8; }
  .nav-item.active-pink { background: #fce8e6; }
`;
document.head.appendChild(styleEl);

/* ─── Chip Component ─── */
function Chip({ value, options, onChange }) {
  const [open, setOpen] = useState(false);
  const ref = useRef(null);

  useEffect(() => {
    const handler = (e) => {
      if (ref.current && !ref.current.contains(e.target)) setOpen(false);
    };
    document.addEventListener("mousedown", handler);
    return () => document.removeEventListener("mousedown", handler);
  }, []);

  return (
    <span className="chip-dropdown" ref={ref}>
      <button
        onClick={() => setOpen(!open)}
        style={{
          display: "inline-flex",
          alignItems: "center",
          gap: 4,
          padding: "3px 10px",
          background: ACCENT_LIGHT,
          color: ACCENT,
          border: `1px solid ${ACCENT}22`,
          borderRadius: 7,
          fontSize: 14,
          fontWeight: 500,
          cursor: "pointer",
          fontFamily: "'Inter', sans-serif",
          transition: "all .2s",
          lineHeight: 1.5,
          whiteSpace: "nowrap",
        }}
        onMouseEnter={(e) => {
          e.currentTarget.style.background = "#ddd5f3";
          e.currentTarget.style.borderColor = ACCENT + "44";
        }}
        onMouseLeave={(e) => {
          e.currentTarget.style.background = ACCENT_LIGHT;
          e.currentTarget.style.borderColor = ACCENT + "22";
        }}
      >
        {value}
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none" style={{ marginLeft: 2 }}>
          <path d="M3 4.5L6 7.5L9 4.5" stroke={ACCENT} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" />
        </svg>
      </button>
      {open && (
        <div className="chip-dropdown-menu">
          {options.map((opt) => (
            <button
              key={opt}
              className={opt === value ? "active" : ""}
              onClick={() => { onChange(opt); setOpen(false); }}
            >
              {opt}
            </button>
          ))}
        </div>
      )}
    </span>
  );
}

                      </div>
                    </div>
                  )}
                </div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

function LifecyclePage() {
  const [editingStageIdx, setEditingStageIdx] = useState(null);
  const [lifecycleConfigs, setLifecycleConfigs] = useState({});
  const updateLifecycleConfig = (stageIdx, key, val) => {
    setLifecycleConfigs((prev) => ({
      ...prev,
      [stageIdx]: { ...(prev[stageIdx] || {}), [key]: val },
    }));
  };

  return (
    <div style={{ flex: 1, display: "flex", flexDirection: "column", overflow: "hidden", background: BG }}>
      {/* Header */}
      <div style={{
        padding: "16px 40px 14px", borderBottom: `1px solid ${BORDER}`, background: CARD_BG,
        display: "flex", alignItems: "center", gap: 16,
      }}>
        <h1 className="fraunces" style={{ fontSize: 18, fontWeight: 600, color: TEXT, letterSpacing: "-0.02em", flex: 1 }}>
          Lifecycle
        </h1>
        <CopilotButton />
      </div>

      <div style={{ flex: 1, overflowY: "auto", padding: "36px 40px 60px" }}>
        <div style={{ maxWidth: 640 }}>
          <p style={{ fontSize: 14, color: TEXT_MUTED, lineHeight: 1.6, marginBottom: 28 }}>
            The lifecycle stages define how shoppers move through your brand's journey. Each stage determines who qualifies, what your goal is, and when someone is considered disengaged.
          </p>
          <div style={{ display: "flex", flexDirection: "column", gap: 0 }}>
            {STAGES.map((stage, i) => {
              const cfg = lifecycleConfigs[i] || {};
              const isEditing = editingStageIdx === i;
              const defChip = cfg.defChip ?? stage.defChipDefault;
              const defChip2 = cfg.defChip2 ?? (stage.defChip2Default || null);
              const goalChip = cfg.goalChip ?? stage.goalChipDefault;
              const disengageDays = cfg.disengageDays ?? stage.disengageDaysDefault;
              const disengageCondition = cfg.disengageCondition ?? stage.disengageConditionDefault;

              return (
                <div key={stage.name}>
                  {i > 0 && (
                    <div style={{ display: "flex", justifyContent: "center", height: 20 }}>
                      <div style={{ width: 1.5, height: "100%", background: ACCENT + "30" }} />
                    </div>
                  )}
                  <div style={{
                    background: CARD_BG,
                    border: `1px solid ${isEditing ? ACCENT + "44" : BORDER}`,
                    borderRadius: 14,
                    padding: "24px 28px",
                    transition: "all .2s",
                    boxShadow: isEditing ? `0 2px 12px ${ACCENT}10` : "0 1px 3px rgba(0,0,0,.03)",
                  }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 16 }}>
                      <div style={{
                        width: 28, height: 28, borderRadius: 8,
                        background: stage.color + "18", border: `1.5px solid ${stage.color}44`,
                        display: "flex", alignItems: "center", justifyContent: "center",
                      }}>
                        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                          <path d="M3 7l3 3 5-6" stroke={stage.color} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" />
                        </svg>
                      </div>
                      <div style={{ flex: 1 }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                          <div style={{ width: 8, height: 8, borderRadius: "50%", background: stage.color }} />
                          <h3 className="fraunces" style={{ fontSize: 18, fontWeight: 600, color: TEXT, letterSpacing: "-0.01em" }}>
                            {stage.name}
                          </h3>
                        </div>
                      </div>
                      <button
                        onClick={() => setEditingStageIdx(isEditing ? null : i)}
                        style={{
                          display: "flex", alignItems: "center", gap: 5,
                          padding: "5px 12px", borderRadius: 7,
                          border: `1px solid ${isEditing ? ACCENT + "33" : BORDER}`,
                          background: isEditing ? ACCENT_LIGHT : "transparent",
                          color: isEditing ? ACCENT : TEXT_MUTED,
                          fontSize: 12, fontWeight: 500, cursor: "pointer",
                          fontFamily: "'Inter', sans-serif", transition: "all .15s",
                        }}
                        onMouseEnter={(e) => { e.currentTarget.style.borderColor = isEditing ? ACCENT + "55" : "#ccc"; }}
                        onMouseLeave={(e) => { e.currentTarget.style.borderColor = isEditing ? ACCENT + "33" : BORDER; }}
                      >
                        <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
                          <path d="M7.5 2.5l2 2M2 8l-.5 2.5L4 10l6-6-2-2-6 6z" stroke="currentColor" strokeWidth="1.2" strokeLinecap="round" strokeLinejoin="round" />
                        </svg>
                        {isEditing ? "Done" : "Edit"}
                      </button>
                    </div>

                    {isEditing ? (
                      <div style={{ fontSize: 15, lineHeight: 1.7, color: "#3a3a3a" }}>
                        <p style={{ marginBottom: 12 }}>
                          {stage.defPre}
                          <Chip value={defChip} options={stage.defChipOptions} onChange={(v) => updateLifecycleConfig(i, "defChip", v)} />
                          {stage.defMid || ""}
                          {stage.defChip2Options && defChip2 && (
                            <Chip value={defChip2} options={stage.defChip2Options} onChange={(v) => updateLifecycleConfig(i, "defChip2", v)} />
                          )}
                          {stage.defPost}
                        </p>
                        <p style={{ marginBottom: 12 }}>
                          {stage.goalPre}
                          <Chip value={goalChip} options={stage.goalChipOptions} onChange={(v) => updateLifecycleConfig(i, "goalChip", v)} />
                          {stage.goalPost}
                        </p>
                        {stage.disengageDaysOptions && (
                          <p style={{ color: TEXT_MUTED, fontSize: 14 }}>
                            {stage.disengagePre}
                            <Chip value={disengageDays} options={stage.disengageDaysOptions} onChange={(v) => updateLifecycleConfig(i, "disengageDays", v)} />
                            {stage.disengageMid}
                            <Chip value={disengageCondition} options={stage.disengageConditionOptions} onChange={(v) => updateLifecycleConfig(i, "disengageCondition", v)} />
                            {stage.disengagePost}
                          </p>
                        )}
                      </div>
                    ) : (
                      <div style={{ paddingLeft: 38, display: "flex", flexDirection: "column", gap: 10 }}>
                        <div>
                          <div style={{ fontSize: 10.5, fontWeight: 600, color: "#a0a098", letterSpacing: "0.08em", textTransform: "uppercase", marginBottom: 3 }}>
                            Definition
                          </div>
                          <div style={{ fontSize: 13, color: TEXT, lineHeight: 1.5 }}>
                            {cfg.defChip
                              ? `${cfg.defChip}${cfg.defChip2 ? ", " + cfg.defChip2 : ""}`
                              : stage.defSummary}
                          </div>
                        </div>
                        <div>
                          <div style={{ fontSize: 10.5, fontWeight: 600, color: "#a0a098", letterSpacing: "0.08em", textTransform: "uppercase", marginBottom: 3 }}>
                            Goal
                          </div>
                          <div style={{ fontSize: 13, color: TEXT, lineHeight: 1.5 }}>
                            {cfg.goalChip || stage.goalSummary}
                          </div>
                        </div>
                        {stage.disengageSummary && (
                          <div>
                            <div style={{ fontSize: 10.5, fontWeight: 600, color: "#a0a098", letterSpacing: "0.08em", textTransform: "uppercase", marginBottom: 3 }}>
                              Disengagement
                            </div>
                            <div style={{ fontSize: 13, color: TEXT, lineHeight: 1.5 }}>
                              {cfg.disengageDays
                                ? `${cfg.disengageDays}, ${cfg.disengageCondition || "no engagement"}`
                                : stage.disengageSummary}
                            </div>
                          </div>
                        )}
                      </div>
                    )}
                  </div>
                </div>
              );
            })}
          </div>

          <div style={{ borderTop: `1px solid ${BORDER}`, paddingTop: 24, marginTop: 32, display: "flex", justifyContent: "flex-end" }}>
            <button style={{
              padding: "10px 28px", borderRadius: 10, border: "none",
              background: TEXT, color: "white", fontSize: 14, fontWeight: 500,
              cursor: "pointer", fontFamily: "'Inter', sans-serif", transition: "all .15s",
            }}
              onMouseEnter={(e) => { e.currentTarget.style.background = "#333"; }}
              onMouseLeave={(e) => { e.currentTarget.style.background = TEXT; }}
            >
              Save
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

function InsightsPage({ categoryFilter }) {
  const [copilotOpen, setCopilotOpen] = useState(false);
  const [copilotClosing, setCopilotClosing] = useState(false);
  const [copilotMessages, setCopilotMessages] = useState([]);
  const [copilotInput, setCopilotInput] = useState("");
  const copilotEndRef = useRef(null);

  useEffect(() => {
    if (copilotEndRef.current) copilotEndRef.current.scrollIntoView({ behavior: "smooth" });
  }, [copilotMessages]);

  const openCopilotWith = (seedMessage) => {
    setCopilotMessages([{ role: "assistant", content: seedMessage }]);
    setCopilotOpen(true);
    setCopilotClosing(false);
  };

  const closeCopilot = () => {
    setCopilotClosing(true);
    setTimeout(() => { setCopilotOpen(false); setCopilotClosing(false); }, 300);
  };

  const sendCopilotMessage = () => {
    if (!copilotInput.trim()) return;
    const msg = copilotInput.trim();
    setCopilotMessages(prev => [...prev, { role: "user", content: msg }]);
    setCopilotInput("");
    setTimeout(() => {
      setCopilotMessages(prev => [...prev, { role: "assistant", content: "Got it! Let me work on that for you. I'll have a draft ready in just a moment for you to review and refine." }]);
    }, 800);

      { insight: "23 shoppers asked about international shipping this month. Your agent had no answer and escalated every time.", why: "Each escalation costs your team time. One article would resolve this automatically going forward.", action: "Draft guidance", seed: "I noticed your agent couldn't answer questions about international shipping 23 times this month. I can draft an article for your knowledge base right now — just tell me which countries you ship to and any details about duties or timelines, and I'll have a draft ready for you to review." },
      { insight: "9 shoppers asked whether they can modify an order after placing it. The agent gave inconsistent answers.", why: "Inconsistent responses erode trust. A clear policy article would standardize this.", action: "Draft policy", seed: "I found that your agent gave inconsistent answers about order modifications 9 times this month. I can draft a clear order modification policy for your knowledge base that covers the window for changes, what can be modified, and the process. What's your current policy on post-purchase order changes?" },

                </div>

            <div ref={copilotEndRef} />
          </div>

          <div style={{ padding: "12px 18px 16px", borderTop: `1px solid ${BORDER}` }}>
            <div style={{ display: "flex", gap: 8 }}>
              <input
                value={copilotInput}

                </td>
              </tr>
            )}
          </tbody>
        </table>
      </div>

      {/* Detail panel for selected row */}
      {selectedRow && (() => {
        const entry = logEntries.find(e => e.id === selectedRow);

        return (
          <div style={{

            <div style={{ flex: 1 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 8 }}>
                <span style={{ fontSize: 11, fontWeight: 600, color: TEXT_MUTED, fontVariantNumeric: "tabular-nums" }}>{entry.id}</span>
                <span style={{ fontSize: 11, color: TEXT_MUTED }}>{formatTime(entry.timestamp)}</span>
                <span style={{
                  fontSize: 11, fontWeight: 500, padding: "2px 8px", borderRadius: 5,
                  background: outcomeStyles[entry.outcome].bg, color: outcomeStyles[entry.outcome].color,
                }}>{outcomeStyles[entry.outcome].label}</span>
              </div>
              <div style={{ fontSize: 13.5, color: TEXT, lineHeight: 1.6 }}>
                {entry.summary}
              </div>
            </div>

              onClick={() => setSelectedRow(null)}
              style={{
                padding: "6px 14px", borderRadius: 8, border: `1px solid ${BORDER}`,
                background: "transparent", fontSize: 12, fontWeight: 500, color: TEXT_MUTED,
                cursor: "pointer", fontFamily: "'Inter', sans-serif", transition: "all .15s",
                flexShrink: 0,
              }}
              onMouseEnter={(e) => { e.currentTarget.style.borderColor = "#ccc"; e.currentTarget.style.color = TEXT; }}
              onMouseLeave={(e) => { e.currentTarget.style.borderColor = BORDER; e.currentTarget.style.color = TEXT_MUTED; }}
            >
              Dismiss
            </button>
          </div>
        );
      })()}
    </div>
  );
}

  });

  const sorted = [...filtered].sort((a, b) => {
    if (sortField === "updated") {
      const da = new Date(a.updated), db = new Date(b.updated);
      return sortDir === "desc" ? db - da : da - db;
    }
    if (sortField === "tickets") {
      const av = a.tickets || 0, bv = b.tickets || 0;
      return sortDir === "desc" ? bv - av : av - bv;
    }
    if (sortField === "csat") {
      const av = a.csat || 0, bv = b.csat || 0;
      return sortDir === "desc" ? bv - av : av - bv;
    }
    if (sortField === "title") {
      return sortDir === "asc" ? a.title.localeCompare(b.title) : b.title.localeCompare(a.title);
    }
    return 0;
  });

  const handleSort = (field) => {
    if (sortField === field) setSortDir(d => d === "asc" ? "desc" : "asc");
    else { setSortField(field); setSortDir("desc"); }

              onClick={() => setActiveFilter(ct.id)}
              style={{
                padding: "10px 14px", cursor: "pointer",
                borderBottom: isActive ? `2px solid ${TEXT}` : "2px solid transparent",
                display: "flex", alignItems: "center", gap: 6,
                transition: "all .15s ease",
                color: isActive ? TEXT : TEXT_MUTED,
              }}
              onMouseEnter={(e) => { if (!isActive) e.currentTarget.style.color = TEXT; }}
              onMouseLeave={(e) => { if (!isActive) e.currentTarget.style.color = isActive ? TEXT : TEXT_MUTED; }}
            >
              {ct.icon && <span style={{ display: "flex", alignItems: "center", color: "inherit" }}>{ct.icon}</span>}
              <span style={{ fontSize: 13, fontWeight: isActive ? 600 : 500 }}>
                {ct.label}
              </span>
            </div>
          );
        })}
      </div>

      {/* Search + meta */}
      <div style={{
        padding: "14px 40px", display: "flex", alignItems: "center", gap: 16,
        borderBottom: `1px solid ${BORDER}`, background: CARD_BG,

            <circle cx="7" cy="7" r="5.5" stroke={TEXT_MUTED} strokeWidth="1.2"/>
            <path d="M11 11l3.5 3.5" stroke={TEXT_MUTED} strokeWidth="1.2" strokeLinecap="round"/>
          </svg>
          <input
            type="text"
            placeholder="Search..."
            value={searchQuery}
            onChange={(e) => setSearchQuery(e.target.value)}
            style={{
              border: "none", outline: "none", background: "transparent",
              fontSize: 13, color: TEXT, fontFamily: "'Inter', sans-serif",
              width: "100%", padding: "2px 0",
            }}
          />
        </div>

        {/* Item count */}
        <span style={{ fontSize: 12, color: TEXT_MUTED, marginLeft: "auto" }}>
          {sorted.length} items
        </span>
        <span style={{ fontSize: 11, color: TEXT_MUTED }}>
          Metrics from last 28 days
        </span>
      </div>

      {/* Table */}
      <div style={{ flex: 1, overflowY: "auto" }}>
        {/* Table header */}
        <div style={{
          display: "grid", gridTemplateColumns: "2.8fr 0.7fr 0.9fr 0.6fr 0.8fr 0.5fr",
          padding: "10px 40px", borderBottom: `1px solid ${BORDER}`, background: "#fafaf8",
          position: "sticky", top: 0, zIndex: 1,
        }}>
          {[
            { label: "Title", field: "title" },
            { label: "Tickets", field: "tickets" },
            { label: "Handover tickets", field: null },
            { label: "CSAT", field: "csat" },
            { label: "Last updated", field: "updated" },
            { label: "In use", field: null },
          ].map((col) => (
            <div
              key={col.label}
              onClick={col.field ? () => handleSort(col.field) : undefined}
              style={{
                fontSize: 11, fontWeight: 600, color: TEXT_MUTED, textTransform: "uppercase",
                letterSpacing: "0.05em", cursor: col.field ? "pointer" : "default",
                display: "flex", alignItems: "center", userSelect: "none",
                padding: "4px 0",
              }}
            >
              {col.label}
              {col.field && <SortArrow field={col.field} />}
            </div>
          ))}
        </div>

        {/* Rows */}
        {sorted.map((item) => (
          <div
            key={item.id}
            style={{
              display: "grid", gridTemplateColumns: "2.8fr 0.7fr 0.9fr 0.6fr 0.8fr 0.5fr",
              padding: "12px 40px", borderBottom: `1px solid ${BORDER}`,
              cursor: "pointer", transition: "background .1s", alignItems: "center",
            }}
            onMouseEnter={(e) => { e.currentTarget.style.background = "#fafaf8"; }}
            onMouseLeave={(e) => { e.currentTarget.style.background = "transparent"; }}
          >
            {/* Title + icon + status */}
            <div style={{ display: "flex", alignItems: "center", gap: 10, minWidth: 0 }}>
              <span style={{ display: "flex", flexShrink: 0 }}>{typeIcons[item.type]}</span>
              <span style={{
                fontSize: 13, fontWeight: 500, color: TEXT,
                overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap",
              }}>
                {item.title}
              </span>
              {item.status && (
                <span style={{
                  padding: "2px 8px", borderRadius: 4, fontSize: 10, fontWeight: 500, flexShrink: 0,
                  background: item.status === "Draft" ? SURFACE : "#fff7ed",

                }}>
                  {item.status}
                </span>
              )}
            </div>

            {/* Tickets */}
            <span style={{ fontSize: 13, color: item.tickets != null ? TEXT : TEXT_MUTED, fontVariantNumeric: "tabular-nums" }}>
              {item.tickets != null ? item.tickets.toLocaleString() : "––"}
            </span>

            {/* Handover tickets */}
            <span style={{ fontSize: 13, color: item.handoverTickets != null ? TEXT : TEXT_MUTED, fontVariantNumeric: "tabular-nums" }}>
              {item.handoverTickets != null ? item.handoverTickets : "––"}
            </span>

            {/* CSAT */}
            <span style={{ fontSize: 13, color: item.csat != null ? TEXT : TEXT_MUTED, fontVariantNumeric: "tabular-nums" }}>
              {item.csat != null ? `${item.csat}%` : "––"}
            </span>

            {/* Last updated */}
            <span style={{ fontSize: 12, color: TEXT_MUTED }}>
              {item.updated}
            </span>

            {/* In use by AI Agent */}
            <div style={{ display: "flex", alignItems: "center", justifyContent: "center" }}>
              {item.inUse ? (
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                  <path d="M3.5 8.5l3 3 6-6.5" stroke="#34c759" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
                </svg>
              ) : (
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                  <path d="M3.5 7h7" stroke={BORDER} strokeWidth="1.5" strokeLinecap="round"/>
                </svg>
              )}
            </div>
          </div>
        ))}

        {sorted.length === 0 && (
          <div style={{ padding: "40px 0", textAlign: "center", color: TEXT_MUTED, fontSize: 13 }}>
            No content items match your search.
          </div>
        )}
      </div>
    </div>
  );
}

          approach: "Lead with what's new or what they might have missed. Reference their past favorites. Offer a compelling reason to return without desperation.",
          mentions: ["New arrivals", "Past favorites", "Special comeback offer", "What's changed"],
          avoids: ["Guilt-tripping", "Too many messages", "Ignoring opt-out signals"],
        },
        "Graceful Sunset": {
          goal: "Respectfully wind down communication with long-unresponsive contacts — give them a clear choice to stay, adjust their preferences, or opt out, so we protect our sender reputation and respect their inbox.",
          trigger: "When a shopper has not engaged with any marketing message (no opens, no clicks, no replies) for 90 days, and the Win-Back playbook has already been attempted without response. Send one final check-in message. If no response within 7 days, automatically suppress from future marketing outreach.",
          approach: "Be respectful and transparent. Give clear options: stay subscribed, change preferences, or opt out. Make it easy and pressure-free.",
          mentions: ["Preference options", "Easy opt-out", "What they'll miss", "Respect for their time"],
          avoids: ["Guilt-tripping", "Hiding unsubscribe", "False urgency"],
        },
      };

      const content = playbookContent[playbook.name];
      if (content) {
        setGoal(content.goal);
        setTrigger(content.trigger);
        setApproach(content.approach);
        setStageGuidance(content.stageGuidance || {});
        setThingsToMention(content.mentions || []);
        setThingsToAvoid(content.avoids || []);
      } else {
        setGoal(`Drive engagement for ${playbook.name}`);
        setTrigger(`Activated when conditions are met for ${playbook.name}`);
        setApproach(`Personalized ${playbook.name} approach tailored to customer segment and context.`);
        setStageGuidance({});
        setThingsToMention([]);
        setThingsToAvoid([]);
      }
    }, [playbook.name]);

    const toggleStage = (stage) => {
      if (enabledStages.includes(stage)) {
        setEnabledStages(enabledStages.filter(s => s !== stage));
        setExpandedStages({ ...expandedStages, [stage]: false });
      } else {
        setEnabledStages([...enabledStages, stage]);
      }
    };

    const handleActivateToggle = () => {
      if (status === "Draft" || status === "Paused") {
        setStatus("Activating");
        setTimeout(() => setStatus("Active"), 2000);
      } else if (status === "Active") {
        setStatus("Paused");
      }
    };

    const allStages = ["Prospect", "Active", "Loyal", "Disengaged"];

    const toggleExpandedStage = (stage) => {
      setExpandedStages({ ...expandedStages, [stage]: !expandedStages[stage] });
    };

    const addMentionItem = (list, setList) => {
      const item = prompt("Add item:");
      if (item) setList([...list, item]);
    };

    const removeMentionItem = (list, setList, idx) => {
      setList(list.filter((_, i) => i !== idx));
    };

    return (
      <div style={{ flex: 1, display: "flex", flexDirection: "column", overflow: "hidden" }}>
        {/* ─── Header (Sticky) ─── */}
        <div style={{
          padding: "16px 40px",
          borderBottom: `1px solid ${BORDER}`,
          background: CARD_BG,
          flexShrink: 0,
          position: "sticky",
          top: 0,
          zIndex: 10,
        }}>
          {/* Back button & breadcrumb */}
          <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 16, justifyContent: "space-between" }}>
            <button
              onClick={onBack}
              style={{
                width: 32, height: 32, borderRadius: 8, border: `1px solid ${BORDER}`,
                background: CARD_BG, cursor: "pointer", display: "flex",
                alignItems: "center", justifyContent: "center", transition: "all .15s",
              }}
              onMouseEnter={(e) => { e.currentTarget.style.borderColor = "#ccc"; e.currentTarget.style.background = SURFACE; }}
              onMouseLeave={(e) => { e.currentTarget.style.borderColor = BORDER; e.currentTarget.style.background = CARD_BG; }}
            >
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                <path d="M10 12L4 7l6-5" stroke={TEXT_MUTED} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" />
              </svg>
            </button>
            <div style={{ fontSize: 13, color: TEXT_MUTED, flex: 1 }}>Playbooks / {name}</div>
            {copilotReady && !copilotOpen && (
              <button
                onClick={handleOpenCopilot}
                style={{
                  width: 34, height: 34, borderRadius: 10, border: "none",
                  background: ACCENT_LIGHT, cursor: "pointer",
                  display: "flex", alignItems: "center", justifyContent: "center",
                  transition: "all .2s",
                }}
                onMouseEnter={(e) => {
                  e.currentTarget.style.background = ACCENT + "20";
                  const icon = e.currentTarget.querySelector(".copilot-icon-spin");
                  if (icon) icon.style.animation = "copilotIconSpin .6s cubic-bezier(.4,0,.2,1) forwards";
                }}
                onMouseLeave={(e) => {
                  e.currentTarget.style.background = ACCENT_LIGHT;
                  const icon = e.currentTarget.querySelector(".copilot-icon-spin");
                  if (icon) icon.style.animation = "none";
                }}
              >
                <svg className="copilot-icon-spin" width="15" height="15" viewBox="0 0 14 14" fill="none" style={{ transition: "transform .3s" }}>
                  <path d="M7 1v4M7 9v4M1 7h4M9 7h4" stroke={ACCENT} strokeWidth="1.3" strokeLinecap="round" />
                </svg>
              </button>
            )}
          </div>

          {/* Title row with activate button */}
          <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 8 }}>
            <div style={{ flex: 1 }}>
              {!nameEditing ? (
                <h1
                  className="fraunces"
                  onClick={() => setNameEditing(true)}
                  style={{
                    fontSize: 22, fontWeight: 600, color: TEXT, letterSpacing: "-0.02em",
                    cursor: "pointer", display: "inline",
                  }}
                >
                  {name}
                </h1>
              ) : (
                <input
                  autoFocus
                  value={name}
                  onChange={(e) => setName(e.target.value)}
                  onBlur={() => setNameEditing(false)}
                  onKeyDown={(e) => { if (e.key === "Enter") setNameEditing(false); }}
                  style={{
                    fontSize: 22, fontWeight: 600, border: `1px solid ${BORDER}`,
                    borderRadius: 8, padding: "6px 10px", fontFamily: "'Inter', sans-serif",
                    color: TEXT, width: "100%",
                  }}
                />
              )}
            </div>
            {/* Activate / Pause button */}
            <button
              onClick={handleActivateToggle}
              disabled={status === "Activating"}
              style={{
                display: "flex", alignItems: "center", gap: 7,
                padding: "8px 18px", borderRadius: 10, border: "none",
                background: status === "Active" ? SURFACE : status === "Activating" ? SURFACE : ACCENT,
                color: status === "Active" ? TEXT : status === "Activating" ? TEXT_MUTED : "white",
                fontSize: 13, fontWeight: 500, cursor: status === "Activating" ? "default" : "pointer",
                fontFamily: "'Inter', sans-serif", transition: "all .25s",
                flexShrink: 0, opacity: status === "Activating" ? 0.8 : 1,
              }}
              onMouseEnter={(e) => {
                if (status === "Activating") return;
                if (status === "Active") { e.currentTarget.style.background = "#e8e8e3"; }
                else { e.currentTarget.style.background = ACCENT_DARK; }
              }}
              onMouseLeave={(e) => {
                if (status === "Activating") return;
                if (status === "Active") { e.currentTarget.style.background = SURFACE; }
                else { e.currentTarget.style.background = ACCENT; }
              }}
            >
              {status === "Activating" ? (
                <>
                  <svg width="14" height="14" viewBox="0 0 14 14" fill="none" style={{ animation: "spin 1s linear infinite" }}>
                    <circle cx="7" cy="7" r="5.5" stroke={TEXT_MUTED} strokeWidth="1.5" strokeDasharray="20 12" strokeLinecap="round" />
                  </svg>
                  <span>Activating…</span>
                </>
              ) : status === "Active" ? (
                <>
                  <svg width="13" height="13" viewBox="0 0 14 14" fill="none">
                    <rect x="2" y="2" width="3.5" height="10" rx="1" fill={TEXT} />
                    <rect x="8.5" y="2" width="3.5" height="10" rx="1" fill={TEXT} />
                  </svg>
                  <span>Pause playbook</span>
                </>
              ) : (
                <>
                  <svg width="13" height="13" viewBox="0 0 14 14" fill="none">
                    <path d="M3 1.5l9 5.5-9 5.5V1.5z" fill="white" />
                  </svg>
                  <span>{status === "Paused" ? "Resume playbook" : "Activate playbook"}</span>
                </>
              )}
            </button>
          </div>
        </div>

        {/* ─── Tab Bar ─── */}
        <div style={{
          padding: "0 40px",
          borderBottom: `1px solid ${BORDER}`,
          background: CARD_BG,
          display: "flex", gap: 32, flexShrink: 0,
        }}>
          {["brief", "test", "performance"].map((tab) => (
            <button
              key={tab}
              onClick={() => setActiveTab(tab)}
              style={{
                padding: "14px 0", fontSize: 13, fontWeight: 500, color: activeTab === tab ? TEXT : TEXT_MUTED,
                background: "transparent", border: "none", cursor: "pointer",
                borderBottom: activeTab === tab ? `2px solid ${ACCENT}` : "2px solid transparent",
                transition: "all .2s",
              }}
            >
              {tab === "brief" ? "Brief" : tab === "test" ? "Test" : "Performance"}
            </button>
          ))}
        </div>

        {/* ─── Content Area (Scrollable) ─── */}
        <div style={{ flex: 1, overflowY: "auto", padding: "24px 40px 40px", background: BG }}>
          {activeTab === "brief" ? (
            <div style={{ maxWidth: 800 }}>
              {/* ─── Metadata Bar ─── */}
              <div className="animate-stageCardIn" style={{
                background: CARD_BG, border: `1px solid ${BORDER}`,
                borderRadius: 14, padding: "16px 24px", marginBottom: 24,
                opacity: 0, display: "flex", alignItems: "center", gap: 0,
              }}>
                {/* Status column */}
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 11, fontWeight: 500, color: TEXT_MUTED, textTransform: "uppercase", letterSpacing: ".04em", marginBottom: 6 }}>Status</div>
                  <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                    {status === "Activating" ? (
                      <svg width="10" height="10" viewBox="0 0 14 14" fill="none" style={{ animation: "spin 1s linear infinite", flexShrink: 0 }}>
                        <circle cx="7" cy="7" r="5.5" stroke={ACCENT} strokeWidth="1.5" strokeDasharray="20 12" strokeLinecap="round" />
                      </svg>
                    ) : (
                      <div style={{
                        width: 8, height: 8, borderRadius: "50%", flexShrink: 0,
                        background: status === "Draft" ? "#b0b0a8" : status === "Active" ? "#2E7D32" : status === "Paused" ? "#E65100" : "#b0b0a8",
                      }} />
                    )}
                    <span style={{
                      fontSize: 13, fontWeight: 500,
                      color: status === "Activating" ? ACCENT : status === "Active" ? "#2E7D32" : TEXT,
                    }}>
                      {status === "Activating" ? "Activating…" : status}
                    </span>
                  </div>
                </div>
                {/* Divider */}
                <div style={{ width: 1, height: 32, background: BORDER, margin: "0 24px" }} />
                {/* Last used column */}
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 11, fontWeight: 500, color: TEXT_MUTED, textTransform: "uppercase", letterSpacing: ".04em", marginBottom: 6 }}>Last used</div>
                  <div style={{ fontSize: 13, color: (status === "Draft" || status === "Activating") ? TEXT_MUTED : TEXT }}>
                    {(status === "Draft" || status === "Activating") ? <span style={{ textDecoration: "line-through" }}>—</span> : status === "Active" ? "Just now" : "2 days ago"}
                  </div>
                </div>
                {/* Divider */}
                <div style={{ width: 1, height: 32, background: BORDER, margin: "0 24px" }} />
                {/* Enabled column */}
                <div style={{ flex: 1.5 }}>
                  <div style={{ fontSize: 11, fontWeight: 500, color: TEXT_MUTED, textTransform: "uppercase", letterSpacing: ".04em", marginBottom: 6 }}>Enabled for</div>
                  <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                    {enabledStages.map((stage) => {
                      const chip = LIFECYCLE_CHIPS[stage];
                      return (
                        <div key={stage} style={{
                          padding: "2px 10px", borderRadius: 100,
                          background: chip.bg, color: chip.text,
                          fontSize: 11.5, fontWeight: 500, lineHeight: 1.5,
                        }}>
                          {stage}
                        </div>
                      );
                    })}
                  </div>
                </div>
              </div>

              {/* Section 1: What triggers this playbook? — always open */}
              <div className="animate-stageCardIn" style={{
                background: CARD_BG, border: `1px solid ${BORDER}`,
                borderRadius: 14, padding: "24px", marginBottom: 24,
                opacity: 0,
              }}>
                <div style={{ fontSize: 13, fontWeight: 600, color: TEXT, marginBottom: 4 }}>What triggers this playbook?</div>
                <div style={{ fontSize: 12.5, color: TEXT_MUTED, marginBottom: 18 }}>Define the goal and the moment this playbook should kick in.</div>

                <div style={{ marginBottom: 18 }}>
                  <label style={{ fontSize: 11, fontWeight: 600, color: TEXT_MUTED, display: "block", marginBottom: 4, letterSpacing: ".03em", textTransform: "uppercase" }}>Goal</label>
                  {editingField === "goal" ? (
                    <div>
                      <textarea
                        autoFocus
                        value={goal}
                        onChange={(e) => setGoal(e.target.value)}
                        placeholder="What should this playbook achieve?"
                        style={{
                          width: "100%", padding: "10px 12px", fontSize: 13.5, border: `1px solid ${ACCENT}40`,
                          borderRadius: 8, background: CARD_BG, fontFamily: "'Inter', sans-serif",
                          color: TEXT, minHeight: 70, resize: "vertical", lineHeight: 1.6,
                          outline: "none", boxShadow: `0 0 0 3px ${ACCENT}18`,
                        }}
                      />
                      <div style={{ display: "flex", justifyContent: "flex-end", marginTop: 8, gap: 8 }}>
                        <button onClick={() => setEditingField(null)} style={{ padding: "5px 14px", borderRadius: 6, border: `1px solid ${BORDER}`, background: "transparent", color: TEXT_MUTED, fontSize: 12, cursor: "pointer" }}>Cancel</button>
                        <button onClick={() => { setEditingField(null); if (onFieldSave) onFieldSave("goal", goal); }} style={{ padding: "5px 14px", borderRadius: 6, border: "none", background: ACCENT, color: "white", fontSize: 12, fontWeight: 500, cursor: "pointer" }}>Save</button>
                      </div>
                    </div>
                  ) : (
                    <div
                      onClick={() => setEditingField("goal")}
                      style={{
                        fontSize: 13.5, color: goal ? TEXT : TEXT_MUTED, lineHeight: 1.6,
                        cursor: "pointer", padding: "4px 0",
                        borderBottom: "1px dashed transparent", transition: "border-color .15s",
                      }}
                      onMouseEnter={(e) => { e.currentTarget.style.borderBottomColor = BORDER; }}
                      onMouseLeave={(e) => { e.currentTarget.style.borderBottomColor = "transparent"; }}
                    >
                      {goal || "Click to define the goal..."}
                    </div>
                  )}
                </div>

                <div>
                  <label style={{ fontSize: 11, fontWeight: 600, color: TEXT_MUTED, display: "block", marginBottom: 4, letterSpacing: ".03em", textTransform: "uppercase" }}>When to use the playbook</label>
                  {editingField === "trigger" ? (
                    <div>
                      <textarea
                        autoFocus
                        value={trigger}
                        onChange={(e) => setTrigger(e.target.value)}
                        placeholder="Describe what triggers this playbook..."
                        style={{
                          width: "100%", padding: "10px 12px", fontSize: 13.5, border: `1px solid ${ACCENT}40`,
                          borderRadius: 8, background: CARD_BG, fontFamily: "'Inter', sans-serif",
                          color: TEXT, minHeight: 70, resize: "vertical", lineHeight: 1.6,
                          outline: "none", boxShadow: `0 0 0 3px ${ACCENT}18`,
                        }}
                      />
                      <div style={{ display: "flex", justifyContent: "flex-end", marginTop: 8, gap: 8 }}>
                        <button onClick={() => setEditingField(null)} style={{ padding: "5px 14px", borderRadius: 6, border: `1px solid ${BORDER}`, background: "transparent", color: TEXT_MUTED, fontSize: 12, cursor: "pointer" }}>Cancel</button>
                        <button onClick={() => { setEditingField(null); if (onFieldSave) onFieldSave("trigger", trigger); }} style={{ padding: "5px 14px", borderRadius: 6, border: "none", background: ACCENT, color: "white", fontSize: 12, fontWeight: 500, cursor: "pointer" }}>Save</button>
                      </div>
                    </div>
                  ) : (
                    <div
                      onClick={() => setEditingField("trigger")}
                      style={{
                        fontSize: 13.5, color: trigger ? TEXT : TEXT_MUTED, lineHeight: 1.6,
                        cursor: "pointer", padding: "4px 0",
                        borderBottom: "1px dashed transparent", transition: "border-color .15s",
                      }}
                      onMouseEnter={(e) => { e.currentTarget.style.borderBottomColor = BORDER; }}
                      onMouseLeave={(e) => { e.currentTarget.style.borderBottomColor = "transparent"; }}
                    >
                      {trigger || "Click to define the trigger..."}
                    </div>
                  )}
                </div>

              </div>


              {/* Section 3: How should the agent behave? — collapsible */}
              <div className="animate-stageCardIn" style={{
                background: CARD_BG, border: `1px solid ${BORDER}`,
                borderRadius: 14, marginBottom: 24,
                opacity: 0, animationDelay: "80ms",
                transition: "all .2s",
                overflow: "hidden",
              }}>
                <div
                  onClick={() => setExpandedSections({ ...expandedSections, instructions: !expandedSections.instructions })}
                  style={{
                    padding: "20px 24px", cursor: "pointer", display: "flex", alignItems: "center",
                    transition: "background .15s",
                  }}
                  onMouseEnter={(e) => { if (!expandedSections.instructions) e.currentTarget.style.background = SURFACE + "80"; }}
                  onMouseLeave={(e) => { e.currentTarget.style.background = "transparent"; }}
                >
                  <div style={{ flex: 1 }}>
                    <div style={{ fontSize: 13, fontWeight: 600, color: TEXT }}>How should the agent behave?</div>
                    <div style={{ fontSize: 12.5, color: TEXT_MUTED, marginTop: 2 }}>Define approach, examples, and guardrails</div>
                  </div>
                  <svg width="14" height="14" viewBox="0 0 14 14" fill="none" style={{ transform: expandedSections.instructions ? "rotate(180deg)" : "rotate(0deg)", transition: "transform .2s", flexShrink: 0 }}>
                    <path d="M3 5.5l4 4 4-4" stroke={TEXT_MUTED} strokeWidth="1.3" strokeLinecap="round" strokeLinejoin="round" />
                  </svg>
                </div>

                {expandedSections.instructions && (
                  <div style={{ padding: "0 24px 24px" }}>
                    <div style={{ marginBottom: 18 }}>
                      <label style={{ fontSize: 11, fontWeight: 600, color: TEXT_MUTED, display: "block", marginBottom: 4, letterSpacing: ".03em", textTransform: "uppercase" }}>General approach</label>
                      {editingField === "approach" ? (
                        <div>
                          <textarea
                            autoFocus
                            value={approach}
                            onChange={(e) => setApproach(e.target.value)}
                            placeholder="How should the agent handle conversations?"
                            style={{
                              width: "100%", padding: "10px 12px", fontSize: 13.5, border: `1px solid ${ACCENT}40`,
                              borderRadius: 8, background: CARD_BG, fontFamily: "'Inter', sans-serif",
                              color: TEXT, minHeight: 120, resize: "vertical", lineHeight: 1.6,
                              outline: "none", boxShadow: `0 0 0 3px ${ACCENT}18`,
                            }}
                          />
                          <div style={{ display: "flex", justifyContent: "flex-end", marginTop: 8, gap: 8 }}>
                            <button onClick={() => setEditingField(null)} style={{ padding: "5px 14px", borderRadius: 6, border: `1px solid ${BORDER}`, background: "transparent", color: TEXT_MUTED, fontSize: 12, cursor: "pointer" }}>Cancel</button>
                            <button onClick={() => { setEditingField(null); if (onFieldSave) onFieldSave("approach", approach); }} style={{ padding: "5px 14px", borderRadius: 6, border: "none", background: ACCENT, color: "white", fontSize: 12, fontWeight: 500, cursor: "pointer" }}>Save</button>
                          </div>
                        </div>
                      ) : (
                        <div
                          onClick={() => setEditingField("approach")}
                          style={{
                            fontSize: 13.5, color: approach ? TEXT : TEXT_MUTED, lineHeight: 1.6,
                            cursor: "pointer", padding: "4px 0",
                            borderBottom: "1px dashed transparent", transition: "border-color .15s",
                          }}
                          onMouseEnter={(e) => { e.currentTarget.style.borderBottomColor = BORDER; }}
                          onMouseLeave={(e) => { e.currentTarget.style.borderBottomColor = "transparent"; }}
                        >
                          {approach || "Click to describe the approach..."}
                        </div>
                      )}
                    </div>

                    {/* Message examples */}
                    <div style={{ marginBottom: 18 }}>
                      <label style={{ fontSize: 12, fontWeight: 500, color: TEXT, display: "block", marginBottom: 6 }}>Message examples</label>
                      <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                        {playbook.name === "Browse Recovery" ? (
                          <>
                            <div style={{ padding: "12px 14px", background: SURFACE, borderRadius: 10 }}>
                              <div style={{ fontSize: 12, fontWeight: 500, color: TEXT, marginBottom: 4 }}>Example 1: Opening message</div>
                              <div style={{ fontSize: 12, color: TEXT_MUTED, lineHeight: 1.5 }}>{"\u201c"}Hey! I noticed you were checking out our [product]. It{"\u2019"}s one of our most popular picks — want me to help you find the right option?{"\u201d"}</div>
                              <div style={{ fontSize: 11, color: TEXT_MUTED, fontStyle: "italic", marginTop: 6 }}>What I like about this: warm, specific, not pushy</div>
                            </div>
                            <div style={{ padding: "12px 14px", background: SURFACE, borderRadius: 10 }}>
                              <div style={{ fontSize: 12, fontWeight: 500, color: TEXT, marginBottom: 4 }}>Example 2: Follow-up</div>
                              <div style={{ fontSize: 12, color: TEXT_MUTED, lineHeight: 1.5 }}>{"\u201c"}Just checking in — still thinking about [product]? Happy to answer any questions. By the way, shipping is free over $75.{"\u201d"}</div>
                              <div style={{ fontSize: 11, color: TEXT_MUTED, fontStyle: "italic", marginTop: 6 }}>What I like about this: gentle nudge, adds value with free shipping info</div>
                            </div>
                          </>
                        ) : (
                          <div style={{ padding: "16px", background: SURFACE, borderRadius: 10, textAlign: "center", color: TEXT_MUTED, fontSize: 13 }}>
                            Add example messages to guide the agent's tone and approach
                          </div>
                        )}
                      </div>
                    </div>

                    {/* Good to mention / Better to skip */}
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16, marginBottom: 18 }}>
                      <div>
                        <label style={{ fontSize: 12, fontWeight: 500, color: TEXT, display: "block", marginBottom: 6 }}>Good to mention</label>
                        <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                          {thingsToMention.map((item, idx) => (
                            <div key={idx} style={{
                              padding: "4px 10px", borderRadius: 8, background: SURFACE,
                              border: `1px solid ${BORDER}`, fontSize: 12, color: TEXT,
                              display: "flex", alignItems: "center", gap: 6,
                            }}>
                              {item}
                              <span onClick={() => removeMentionItem(thingsToMention, setThingsToMention, idx)} style={{ cursor: "pointer", color: TEXT_MUTED, fontSize: 14, lineHeight: 1 }}>&times;</span>
                            </div>
                          ))}
                          <button
                            onClick={() => addMentionItem(thingsToMention, setThingsToMention)}
                            style={{
                              padding: "4px 10px", borderRadius: 8, border: `1px dashed ${BORDER}`,
                              background: "transparent", fontSize: 12, color: TEXT_MUTED,
                              cursor: "pointer", transition: "all .15s",
                            }}
                            onMouseEnter={(e) => { e.currentTarget.style.borderColor = ACCENT; e.currentTarget.style.color = ACCENT; }}
                            onMouseLeave={(e) => { e.currentTarget.style.borderColor = BORDER; e.currentTarget.style.color = TEXT_MUTED; }}
                          >+ Add</button>
                        </div>
                      </div>
                      <div>

                        if (e.key === "Enter" && freeformText.trim()) {

                          setFreeformText("");
                          setFreeformActive(false);

                            addCopilotMessage({ role: "user", text });

                      style={{

                  </button>
                </div>

            </div>
          </div>
        )}
      </div>

                      setLibraryChatMessages((prev) => [...prev, { role: "user", content: userMsg }]);
                      setLibraryChatInput("");
                      setTimeout(() => {
                        setLibraryChatMessages((prev) => [...prev, { role: "assistant", content: "I can help you set that up. Based on your description, I'd recommend configuring a few settings first. Let me walk you through the key options — would you like to start with the trigger conditions or the messaging tone?" }]);
                      }, 800);

                  }}
                  placeholder="Type your message..."
                  style={{
                    flex: 1, padding: "12px 16px", borderRadius: 12,

                  <path d="M9 3L5 7l4 4" stroke="currentColor" strokeWidth="1.3" strokeLinecap="round" strokeLinejoin="round" />

                ]);

                </div>
              )}

              {/* Browse Library link */}
              <div style={{ textAlign: "center", marginTop: 32 }}>
                <button
                  onClick={() => setLibraryBrowseMode(true)}
                  style={{
                    border: "none", background: "none", cursor: "pointer",
                    fontSize: 13, color: TEXT_MUTED, fontFamily: "'Inter', sans-serif",
                    fontWeight: 500, transition: "color .15s", padding: "4px 0",
                  }}
                  onMouseEnter={(e) => { e.currentTarget.style.color = TEXT; }}
                  onMouseLeave={(e) => { e.currentTarget.style.color = TEXT_MUTED; }}
                >
                  Browse 100+ playbooks →
                </button>
              </div>
            </div>
          </div>
        )}
      </div>

      {/* ─── Co-Pilot Side Panel ─── */}
      {copilotOpen && (
        <div style={{
          width: 333, minWidth: 333, flexShrink: 0,
          display: "flex", flexDirection: "column",
          borderLeft: `1px solid ${BORDER}`, background: CARD_BG,
          animation: copilotClosing ? "copilotSlideOut .3s cubic-bezier(.16,1,.3,1) forwards" : "copilotSlideIn .35s cubic-bezier(.16,1,.3,1) forwards",
          overflow: "hidden",
        }}>
          {/* Copilot Header */}
          <div style={{
            padding: "16px 18px", borderBottom: `1px solid ${BORDER}`,
            display: "flex", alignItems: "center", justifyContent: "space-between",
            flexShrink: 0, background: "rgba(250,250,250,.95)",
          }}>
            <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
              <div style={{
                width: 28, height: 28, borderRadius: 8, background: ACCENT + "14",
                display: "flex", alignItems: "center", justifyContent: "center",
              }}>
                <svg width="13" height="13" viewBox="0 0 14 14" fill="none">
                  <path d="M7 1v4M7 9v4M1 7h4M9 7h4" stroke={ACCENT} strokeWidth="1.3" strokeLinecap="round" />
                </svg>
              </div>
              <div style={{ fontSize: 13, fontWeight: 600, color: TEXT }}>Co-pilot</div>
            </div>
            <button
              onClick={handleCloseCopilot}
              style={{
                width: 28, height: 28, borderRadius: 7, border: `1px solid ${BORDER}`,
                background: CARD_BG, cursor: "pointer", display: "flex",
                alignItems: "center", justifyContent: "center", transition: "all .15s",
              }}
              onMouseEnter={(e) => { e.currentTarget.style.borderColor = "#ccc"; e.currentTarget.style.background = SURFACE; }}
              onMouseLeave={(e) => { e.currentTarget.style.borderColor = BORDER; e.currentTarget.style.background = CARD_BG; }}
            >
              <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
                <path d="M2 2l8 8M10 2l-8 8" stroke={TEXT_MUTED} strokeWidth="1.3" strokeLinecap="round" />
              </svg>
            </button>
          </div>

          {/* Copilot Messages */}
          <div style={{ flex: 1, overflowY: "auto", padding: "16px 14px 16px" }}>
            {copilotMessages.map((msg, idx) => {
              if (msg.role === "typing") {
                return (
                  <div key={idx} style={{ display: "flex", gap: 8, marginBottom: 14, alignItems: "flex-start" }}>
                    <div style={{
                      width: 24, height: 24, borderRadius: 7, background: ACCENT + "14",
                      display: "flex", alignItems: "center", justifyContent: "center",
                      flexShrink: 0, marginTop: 1,
                    }}>
                      <svg width="10" height="10" viewBox="0 0 14 14" fill="none">
                        <path d="M7 1v4M7 9v4M1 7h4M9 7h4" stroke={ACCENT} strokeWidth="1.3" strokeLinecap="round" />
                      </svg>
                    </div>
                    <div style={{
                      padding: "10px 14px", borderRadius: "12px 12px 12px 4px",
                      background: SURFACE, display: "flex", gap: 4, alignItems: "center",
                    }}>
                      {[0, 1, 2].map((d) => (
                        <div key={d} style={{
                          width: 5, height: 5, borderRadius: "50%", background: TEXT_MUTED,
                          animation: `dotBounce .8s ease-in-out ${d * 0.15}s infinite`,
                        }} />
                      ))}
                    </div>
                  </div>
                );
              }

              if (msg.role === "ai") {
                return (
                  <div key={idx} className="animate-fadeIn" style={{ display: "flex", gap: 8, marginBottom: 14, opacity: 0, alignItems: "flex-start" }}>
                    <div style={{
                      width: 24, height: 24, borderRadius: 7, background: ACCENT + "14",
                      display: "flex", alignItems: "center", justifyContent: "center",
                      flexShrink: 0, marginTop: 1,
                    }}>
                      <svg width="10" height="10" viewBox="0 0 14 14" fill="none">
                        <path d="M7 1v4M7 9v4M1 7h4M9 7h4" stroke={ACCENT} strokeWidth="1.3" strokeLinecap="round" />
                      </svg>
                    </div>
                    <div style={{
                      padding: "10px 14px", borderRadius: "12px 12px 12px 4px",
                      background: SURFACE, fontSize: 13, lineHeight: 1.6,
                      color: "#3a3a3a", maxWidth: "calc(100% - 36px)",
                    }}>
                      {msg.text}
                    </div>
                  </div>
                );
              }

              // User message
              return (
                <div key={idx} className="animate-fadeIn" style={{ display: "flex", justifyContent: "flex-end", marginBottom: 14, opacity: 0 }}>
                  <div style={{
                    padding: "10px 14px", borderRadius: "12px 12px 4px 12px",
                    background: TEXT, color: "#F5F5F5", fontSize: 13, lineHeight: 1.6,
                    maxWidth: "85%",
                  }}>
                    {msg.text}
                  </div>
                </div>
              );
            })}
            <div ref={copilotEndRef} />
          </div>

          {/* Copilot Input */}
          <div style={{
            padding: "12px 14px", borderTop: `1px solid ${BORDER}`,
            background: "rgba(250,250,250,.95)", flexShrink: 0,
          }}>
            <div style={{
              display: "flex", alignItems: "flex-end", gap: 8,
              background: CARD_BG, border: `1px solid ${BORDER}`, borderRadius: 12, padding: 4,
            }}>
              <textarea
                value={copilotInput}
                onChange={(e) => setCopilotInput(e.target.value)}
                onKeyDown={(e) => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); handleCopilotSend(); } }}
                placeholder="Ask anything..."
                rows={1}
                style={{
                  flex: 1, border: "none", outline: "none", resize: "none",
                  padding: "8px 10px", fontSize: 13, lineHeight: 1.5,
                  color: TEXT, fontFamily: "'Inter', sans-serif", background: "transparent",
                }}
              />
              <button
                onClick={handleCopilotSend}
                style={{
                  width: 30, height: 30, borderRadius: 8, border: "none",
                  background: copilotInput.trim() ? ACCENT : "#E0E0E0", color: "white",
                  cursor: copilotInput.trim() ? "pointer" : "default",
                  display: "flex", alignItems: "center", justifyContent: "center",
                  flexShrink: 0, margin: 2, transition: "all .2s",
                }}
                onMouseEnter={(e) => { if (copilotInput.trim()) e.currentTarget.style.background = ACCENT_DARK; }}
                onMouseLeave={(e) => { e.currentTarget.style.background = copilotInput.trim() ? ACCENT : "#E0E0E0"; }}
              >
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                  <path d="M1 7h12M8 2l5 5-5 5" stroke="white" strokeWidth="1.3" strokeLinecap="round" strokeLinejoin="round" />
                </svg>
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function parseHSL(hslStr) {
  var match = hslStr.match(/([\d.]+)\s*([\d.]+)%?\s*([\d.]+)%?/);
  if (!match) return { h: 40, s: 80, l: 80 };
  return { h: parseFloat(match[1]), s: parseFloat(match[2]), l: parseFloat(match[3]) };
}
function buildGlowVars(glowColor, intensity) {
  var hsl = parseHSL(glowColor);
  var base = hsl.h + "deg " + hsl.s + "% " + hsl.l + "%";
  var opacities = [100, 60, 50, 40, 30, 20, 10];
  var keys = ["", "-60", "-50", "-40", "-30", "-20", "-10"];
  var vars = {};
  for (var i = 0; i < opacities.length; i++) {
    vars["--glow-color" + keys[i]] = "hsl(" + base + " / " + Math.min(opacities[i] * intensity, 100) + "%)";
  }
  return vars;
}
var GRADIENT_POSITIONS = ["80% 55%", "69% 34%", "8% 6%", "41% 38%", "86% 85%", "82% 18%", "51% 4%"];
var GRADIENT_KEYS = ["--gradient-one", "--gradient-two", "--gradient-three", "--gradient-four", "--gradient-five", "--gradient-six", "--gradient-seven"];
var COLOR_MAP = [0, 1, 2, 0, 1, 2, 1];
function buildGradientVars(colors) {
  var vars = {};
  for (var i = 0; i < 7; i++) {
    var c = colors[Math.min(COLOR_MAP[i], colors.length - 1)];
    vars[GRADIENT_KEYS[i]] = "radial-gradient(at " + GRADIENT_POSITIONS[i] + ", " + c + " 0px, transparent 50%)";
  }
  vars["--gradient-base"] = "linear-gradient(" + colors[0] + " 0 100%)";
  return vars;
}
function easeOutCubic(x) { return 1 - Math.pow(1 - x, 3); }
function easeInCubic(x) { return x * x * x; }
function animateValue(opts) {
  var start = opts.start != null ? opts.start : 0;
  var end = opts.end != null ? opts.end : 100;
  var duration = opts.duration != null ? opts.duration : 1000;
  var delay = opts.delay != null ? opts.delay : 0;
  var ease = opts.ease || easeOutCubic;
  var onUpdate = opts.onUpdate;
  var onEnd = opts.onEnd;
  var t0 = performance.now() + delay;
  function tick() {
    var elapsed = performance.now() - t0;
    var t = Math.min(elapsed / duration, 1);
    onUpdate(start + (end - start) * ease(t));
    if (t < 1) requestAnimationFrame(tick);
    else if (onEnd) onEnd();
  }
  setTimeout(function() { requestAnimationFrame(tick); }, delay);
}

function BorderGlow(props) {
  var children = props.children;
  var className = props.className || "";
  var edgeSensitivity = props.edgeSensitivity != null ? props.edgeSensitivity : 30;
  var glowColor = props.glowColor || "40 80 80";
  var backgroundColor = props.backgroundColor || "#060010";
  var borderRadius = props.borderRadius != null ? props.borderRadius : 28;
  var glowRadius = props.glowRadius != null ? props.glowRadius : 40;
  var glowIntensity = props.glowIntensity != null ? props.glowIntensity : 1.0;
  var coneSpread = props.coneSpread != null ? props.coneSpread : 25;
  var animated = !!props.animated;
  var colors = props.colors || ["#c084fc", "#f472b6", "#38bdf8"];
  var fillOpacity = props.fillOpacity != null ? props.fillOpacity : 0.5;

  var cardRef = React.useRef(null);

  var getCenterOfElement = React.useCallback(function(el) {
    var rect = el.getBoundingClientRect();
    return [rect.width / 2, rect.height / 2];
  }, []);

  var getEdgeProximity = React.useCallback(function(el, x, y) {
    var c = getCenterOfElement(el);
    var cx = c[0], cy = c[1];
    var dx = x - cx;
    var dy = y - cy;
    var kx = Infinity;
    var ky = Infinity;
    if (dx !== 0) kx = cx / Math.abs(dx);
    if (dy !== 0) ky = cy / Math.abs(dy);
    return Math.min(Math.max(1 / Math.min(kx, ky), 0), 1);
  }, [getCenterOfElement]);

  var getCursorAngle = React.useCallback(function(el, x, y) {
    var c = getCenterOfElement(el);
    var cx = c[0], cy = c[1];
    var dx = x - cx;
    var dy = y - cy;
    if (dx === 0 && dy === 0) return 0;
    var radians = Math.atan2(dy, dx);
    var degrees = radians * (180 / Math.PI) + 90;
    if (degrees < 0) degrees += 360;
    return degrees;
  }, [getCenterOfElement]);

  var handlePointerMove = React.useCallback(function(e) {
    var card = cardRef.current;
    if (!card) return;
    var rect = card.getBoundingClientRect();
    var x = e.clientX - rect.left;
    var y = e.clientY - rect.top;
    var edge = getEdgeProximity(card, x, y);
    var angle = getCursorAngle(card, x, y);
    card.style.setProperty("--edge-proximity", (edge * 100).toFixed(3));
    card.style.setProperty("--cursor-angle", angle.toFixed(3) + "deg");
  }, [getEdgeProximity, getCursorAngle]);

  React.useEffect(function() {
    if (!animated || !cardRef.current) return;
    var card = cardRef.current;
    var angleStart = 110;
    var angleEnd = 465;
    card.classList.add("sweep-active");
    card.style.setProperty("--cursor-angle", angleStart + "deg");

    animateValue({ duration: 500, onUpdate: function(v) { card.style.setProperty("--edge-proximity", v); } });
    animateValue({ ease: easeInCubic, duration: 1500, end: 50, onUpdate: function(v) {
      card.style.setProperty("--cursor-angle", ((angleEnd - angleStart) * (v / 100) + angleStart) + "deg");
    }});
    animateValue({ ease: easeOutCubic, delay: 1500, duration: 2250, start: 50, end: 100, onUpdate: function(v) {
      card.style.setProperty("--cursor-angle", ((angleEnd - angleStart) * (v / 100) + angleStart) + "deg");
    }});
    animateValue({ ease: easeInCubic, delay: 2500, duration: 1500, start: 100, end: 0,
      onUpdate: function(v) { card.style.setProperty("--edge-proximity", v); },
      onEnd: function() { card.classList.remove("sweep-active"); },
    });
  }, [animated]);

  var glowVars = buildGlowVars(glowColor, glowIntensity);
  var gradientVars = buildGradientVars(colors);
  var style = Object.assign({
    "--card-bg": backgroundColor,
    "--edge-sensitivity": edgeSensitivity,
    "--border-radius": borderRadius + "px",
    "--glow-padding": glowRadius + "px",
    "--cone-spread": coneSpread,
    "--fill-opacity": fillOpacity,
  }, glowVars, gradientVars);

  return (
    <div
      ref={cardRef}
      onPointerMove={handlePointerMove}
      className={"border-glow-card " + className}
      style={style}
    >
      <span className="edge-light" />
      <div className="border-glow-inner">
        {children}
      </div>
    </div>
  );
}
