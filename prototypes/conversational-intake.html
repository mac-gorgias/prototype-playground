  /* ─── BorderGlow ─── */
  .border-glow-card {

    --cursor-angle: 45deg;
    --edge-sensitivity: 30;
    --color-sensitivity: calc(var(--edge-sensitivity) + 20);

  }
  .border-glow-card::before,
  .border-glow-card::after,
  .border-glow-card > .edge-light {
    content: "";

    inset: 0;

  .border-glow-card:not(:hover):not(.sweep-active)::after,

  }
  .border-glow-card::before {
    border: 1px solid transparent;
    background:
      linear-gradient(var(--card-bg, #060010) 0 100%) padding-box,
      linear-gradient(rgb(255 255 255 / 0%) 0% 100%) border-box,
      var(--gradient-one, radial-gradient(at 80% 55%, hsla(268, 100%, 76%, 1) 0px, transparent 50%)) border-box,
      var(--gradient-two, radial-gradient(at 69% 34%, hsla(349, 100%, 74%, 1) 0px, transparent 50%)) border-box,
      var(--gradient-three, radial-gradient(at 8% 6%, hsla(136, 100%, 78%, 1) 0px, transparent 50%)) border-box,
      var(--gradient-four, radial-gradient(at 41% 38%, hsla(192, 100%, 64%, 1) 0px, transparent 50%)) border-box,
      var(--gradient-five, radial-gradient(at 86% 85%, hsla(186, 100%, 74%, 1) 0px, transparent 50%)) border-box,

      var(--gradient-seven, radial-gradient(at 51% 4%, hsla(12, 100%, 72%, 1) 0px, transparent 50%)) border-box,

    opacity: calc((var(--edge-proximity) - var(--color-sensitivity)) / (100 - var(--color-sensitivity)));
    mask-image:

        black calc(var(--cone-spread) * 1%),
        transparent calc((var(--cone-spread) + 15) * 1%),
        transparent calc((100 - var(--cone-spread) - 15) * 1%),
        black calc((100 - var(--cone-spread)) * 1%)

  }
  .border-glow-card::after {
    border: 1px solid transparent;
    background:
      var(--gradient-one, radial-gradient(at 80% 55%, hsla(268, 100%, 76%, 1) 0px, transparent 50%)) padding-box,
      var(--gradient-two, radial-gradient(at 69% 34%, hsla(349, 100%, 74%, 1) 0px, transparent 50%)) padding-box,

  .golive-checklist {

  .golive-card {

  /* Full-screen confetti (fires when Zendesk import initiates) */
  .fullscreen-confetti {

  /* Hide the noisy mesh-fill layer entirely — only the outer halo + colored border ring remain */
  .border-glow-card.live-chat-card::after {
    display: none;
  }
  .animate-fadeInUp { animation: fadeInUp .7s cubic-bezier(.16,1,.3,1) forwards; }
  .animate-fadeIn { animation: fadeIn .5s ease forwards; }
  .animate-slideUp { animation: slideUp .5s cubic-bezier(.16,1,.3,1) forwards; }

  .animate-stageCardIn { animation: stageCardIn .4s cubic-bezier(.16,1,.3,1) forwards; }
  .chip-dropdown { position: relative; display: inline-flex; }

function SignupPage({ onSubmit }) {
  const [email, setEmail] = useState("");
  const [name, setName] = useState("");
  const [storeUrl, setStoreUrl] = useState("");

  const fillDefaults = () => {
    if (!email && !name && !storeUrl) {
      setEmail("lisa@urbanstems.com");
      setName("Lisa T");
      setStoreUrl("urbanstems.com");
    }
  };

  const handleSubmit = (e) => {
    e.preventDefault();
    onSubmit({ email: email || "lisa@urbanstems.com", name: name || "Lisa T", storeUrl: storeUrl || "urbanstems.com" });
  };

  const inputStyle = {
    width: "100%", padding: "12px 14px", borderRadius: 10,
    border: `1.5px solid ${BORDER}`, fontSize: 14, color: TEXT,
    fontFamily: "'Inter', sans-serif", outline: "none",
    transition: "border-color .2s",
    background: CARD_BG,
  };

  const labelStyle = { fontSize: 13, fontWeight: 500, color: TEXT, marginBottom: 6, display: "block" };

  return (
    <div onClick={fillDefaults} style={{
      width: "100vw", height: "100vh", display: "flex", alignItems: "center", justifyContent: "center",
      background: BG,
    }}>
      <form onSubmit={handleSubmit} onClick={(e) => e.stopPropagation()} style={{
        width: 420, padding: "44px 40px 36px", borderRadius: 20,
        border: `1.5px solid ${BORDER}`, background: CARD_BG,
        boxShadow: "0 4px 24px rgba(0,0,0,.04)",

        {/* Logo */}

    e.preventDefault();
    livechatDragRef.current = { startX: e.clientX, startWidth: livechatPanelWidth };
    setLivechatResizing(true);
    const onMove = function(ev) {
      if (!livechatDragRef.current) return;
      const dx = livechatDragRef.current.startX - ev.clientX;
      const next = Math.max(360, Math.min(900, livechatDragRef.current.startWidth + dx));
      setLivechatPanelWidth(next);
    };
    const onUp = function() {
      livechatDragRef.current = null;
      setLivechatResizing(false);
      window.removeEventListener("mousemove", onMove);
      window.removeEventListener("mouseup", onUp);
      document.body.style.cursor = "";
      document.body.style.userSelect = "";
    };
    document.body.style.cursor = "col-resize";
    document.body.style.userSelect = "none";
    window.addEventListener("mousemove", onMove);
    window.addEventListener("mouseup", onUp);
  };

function parseHSL(hslStr) {

}

}

function easeInCubic(x) { return x * x * x; }

function BorderGlow(props) {

  var glowRadius = props.glowRadius != null ? props.glowRadius : 40;
  var glowIntensity = props.glowIntensity != null ? props.glowIntensity : 1.0;
  var coneSpread = props.coneSpread != null ? props.coneSpread : 25;
  var animated = !!props.animated;
  var colors = props.colors || ["#c084fc", "#f472b6", "#38bdf8"];

  var cardRef = React.useRef(null);

  var getCenterOfElement = React.useCallback(function(el) {
    var rect = el.getBoundingClientRect();
    return [rect.width / 2, rect.height / 2];

  var getEdgeProximity = React.useCallback(function(el, x, y) {
    var c = getCenterOfElement(el);
    var cx = c[0], cy = c[1];
    var dx = x - cx;
    var dy = y - cy;

    var ky = Infinity;

  var gradientVars = buildGradientVars(colors);
  var style = Object.assign({
    "--card-bg": backgroundColor,
    "--edge-sensitivity": edgeSensitivity,
    "--border-radius": borderRadius + "px",
    "--glow-padding": glowRadius + "px",
    "--cone-spread": coneSpread,
    "--fill-opacity": fillOpacity,
  }, glowVars, gradientVars);

  return (
    <div
      ref={cardRef}
      onPointerMove={handlePointerMove}
      className={"border-glow-card " + className}
      style={style}
    >
      <span className="edge-light" />
      <div className="border-glow-inner">
        {children}
      </div>
    </div>
  );
}

class __ErrorBoundary__ extends React.Component {
  constructor(props) { super(props); this.state = { hasError: false, error: null, info: null }; }
  static getDerivedStateFromError(error) { return { hasError: true, error }; }
  componentDidCatch(error, info) {
    console.error('REACT_CRASH:', error.message);
    console.error('COMPONENT_STACK:', info.componentStack);
  }
  render() {
    if (this.state.hasError) {
      return React.createElement('div', {style:{color:'red',padding:40,fontSize:16,fontFamily:'monospace',whiteSpace:'pre-wrap'}},
        'React Error: ' + this.state.error.message + '\n\nCheck browser console for details.');
    }
    return this.props.children;
  }
}
window.addEventListener('error', function(e) {
  console.error('GLOBAL_ERROR:', e.message, e.filename, e.lineno);
  var d = document.createElement('div');
  d.style.cssText = 'position:fixed;top:0;left:0;right:0;padding:20px;background:red;color:white;font:14px monospace;z-index:99999;white-space:pre-wrap';
  d.textContent = 'JS ERROR: ' + e.message + ' (line ' + e.lineno + ')';
  document.body.appendChild(d);
});
ReactDOM.createRoot(document.getElementById('root')).render(
  React.createElement(__ErrorBoundary__, null, React.createElement(__default__))
);
</script>
</body>
</html>
