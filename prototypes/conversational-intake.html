function matchScriptedIntent(text) {
  if (!text) return null;
  var lower = text.toLowerCase();
  for (var i = 0; i < SCRIPTED_INTENTS.length; i++) {
    var intent = SCRIPTED_INTENTS[i];
    for (var j = 0; j < intent.keywords.length; j++) {
      var phrase = intent.keywords[j];
      var allFound = true;
      for (var k = 0; k < phrase.length; k++) {
        if (lower.indexOf(phrase[k]) === -1) { allFound = false; break; }
      }
      if (allFound) return intent.response;
    }
  }
  return null;
}

function ModalLiveChat() {
  var messagesState = React.useState([
    { role: "assistant", text: "Hi! I\u2019m the UrbanStems AI Agent. Ask me anything \u2014 I have access to your store\u2019s products, orders, and policies." }
  ]);
  var messages = messagesState[0];
  var setMessages = messagesState[1];

  var inputState = React.useState("");
  var input = inputState[0];
  var setInput = inputState[1];

  var sendingState = React.useState(false);
  var sending = sendingState[0];
  var setSending = sendingState[1];

  var threadRef = React.useRef(null);

  React.useEffect(function() {
    if (threadRef.current) {
      threadRef.current.scrollTop = threadRef.current.scrollHeight;
    }
  }, [messages, sending]);

  var sendMessage = React.useCallback(function(text) {
    if (!text || sending) return;
    var newUserMsg = { role: "user", text: text };
    var nextMessages = messages.concat([newUserMsg]);
    setMessages(nextMessages);
    setInput("");
    setSending(true);

    var reply = matchScriptedIntent(text);
    var delay = 1000 + Math.random() * 500; // 1.0 – 1.5s
    setTimeout(function() {
      if (reply === null) {
        setMessages(function(prev) { return prev.concat([{ role: "assistant", isFallback: true }]); });
      } else {
        setMessages(function(prev) { return prev.concat([{ role: "assistant", text: reply }]); });
      }
      setSending(false);
    }, delay);
  }, [messages, sending]);

  var onChipClick = function(chip) { sendMessage(chip); };
  var onSendClick = function() { sendMessage(input.trim()); };
  var onKeyDown = function(e) {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage(input.trim());

                background: isUser ? "#6D4AC7" : "#fff",

                padding: "10px 14px",

                animation: i > 0 ? "fadeIn .3s ease forwards" : "none",
              }}>
                {m.isFallback ? (
                  <React.Fragment>
                    I&rsquo;m not able to answer that just yet &mdash; but I&rsquo;ll get smarter as you add more knowledge sources.{" "}
                    <a href="#" style={{ color: "#6D4AC7", textDecoration: "underline", fontWeight: 500 }}>Add your first one</a>
                    {" "}to teach me more.

              </div>
            );
          })}
          {sending && (
            <div style={{

function ChatConversationPage({ chatData }) {
  const [input, setInput] = useState("");
  const [messages, setMessages] = useState(chatData.messages || []);
  const [isTyping, setIsTyping] = useState(false);
  const messagesEndRef = useRef(null);

  useEffect(() => {
    messagesEndRef.current?.scrollIntoView({ behavior: "smooth" });
  }, [messages, isTyping]);

  // Start with AI response if it's a fresh chat
  useEffect(() => {
    if (messages.length === 1 && messages[0].role === "user") {
      setIsTyping(true);
      setTimeout(() => {
        setIsTyping(false);
        setMessages(prev => [...prev, {
          role: "ai",
          text: "I understand you'd like to " + messages[0].text.toLowerCase() + ". Let me pull up the relevant information and help you with that. What specific aspect would you like to start with?",
        }]);
      }, 1500);
    }
  }, []);

  const handleSend = () => {
    if (!input.trim()) return;
    const userText = input.trim();
    setInput("");
    setMessages(prev => [...prev, { role: "user", text: userText }]);
    setIsTyping(true);
    setTimeout(() => {
      setIsTyping(false);
      setMessages(prev => [...prev, { role: "ai", text: "That's a great question! Let me look into that for you and provide the best guidance." }]);
    }, 1200);
  };

  return (
    <div style={{ flex: 1, display: "flex", flexDirection: "column", background: BG, overflow: "hidden" }}>
      {/* Messages area */}
      <div style={{ flex: 1, overflowY: "auto", padding: "32px 0" }}>
        <div style={{ maxWidth: 640, margin: "0 auto", padding: "0 20px" }}>

            <div key={i} style={{
              marginBottom: 20,

                <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 6 }}>

                  }}>
                    <span style={{ color: "white", fontSize: 10, fontWeight: 700 }}>G</span>
                  </div>
                  <span style={{ fontSize: 12, fontWeight: 600, color: TEXT }}>Gorgias</span>
                </div>
              )}
              <div style={{
                padding: "12px 16px", borderRadius: 14,
                background: msg.role === "user" ? TEXT : CARD_BG,
                color: msg.role === "user" ? "white" : TEXT,
                fontSize: 14, lineHeight: 1.6, maxWidth: "85%",
                border: msg.role === "ai" ? `1px solid ${BORDER}` : "none",
              }}>
                {msg.text}
              </div>
            </div>
          ))}
          {isTyping && (
            <div style={{ marginBottom: 20, display: "flex", flexDirection: "column", alignItems: "flex-start" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 6 }}>
                <div style={{
                  width: 24, height: 24, borderRadius: 6, background: TEXT,
                  display: "flex", alignItems: "center", justifyContent: "center",
                }}>
                  <span style={{ color: "white", fontSize: 10, fontWeight: 700 }}>G</span>
                </div>
                <span style={{ fontSize: 12, fontWeight: 600, color: TEXT }}>Gorgias</span>
              </div>
              <div style={{
                padding: "12px 16px", borderRadius: 14, background: CARD_BG,
                border: `1px solid ${BORDER}`, display: "flex", gap: 4,
              }}>
                {[0, 1, 2].map(d => (
                  <div key={d} style={{
                    width: 6, height: 6, borderRadius: "50%", background: TEXT_MUTED,
                    animation: `dotBounce .6s ${d * 0.15}s infinite`,
                  }} />
                ))}
              </div>
            </div>
          )}
          <div ref={messagesEndRef} />
        </div>
      </div>

      {/* Input bar */}
      <div style={{ padding: "12px 20px 20px", borderTop: `1px solid ${BORDER}`, background: BG }}>
        <div style={{ maxWidth: 640, margin: "0 auto", display: "flex", gap: 8, alignItems: "flex-end" }}>

            flex: 1, border: `1.5px solid ${BORDER}`, borderRadius: 14, background: CARD_BG,

            <textarea
              value={input}
              onChange={(e) => setInput(e.target.value)}
              onKeyDown={(e) => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); handleSend(); } }}
              placeholder="Type a message..."
              rows={1}
              style={{
                width: "100%", border: "none", outline: "none", resize: "none",
                padding: "12px 16px", fontSize: 14, lineHeight: 1.5,
                fontFamily: "'Inter', sans-serif", color: TEXT, background: "transparent",
              }}
            />
          </div>
          <button
            onClick={handleSend}
            style={{
              width: 40, height: 40, borderRadius: 12, border: "none",
              background: input.trim() ? TEXT : "#E0E0E0",
              cursor: input.trim() ? "pointer" : "default",
              display: "flex", alignItems: "center", justifyContent: "center",
              transition: "background .15s", flexShrink: 0,
            }}
          >
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
              <path d="M1 7h12M8 2l5 5-5 5" stroke="white" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" />
            </svg>
          </button>
        </div>
      </div>
    </div>
  );
}

/* ─── Main App ─── */
const __default__ = function App() {
  const [onboardingPhase, setOnboardingPhase] = useState("signup"); // "signup" | "analysis" | "done"
  const [userProfile, setUserProfile] = useState(null);

  const [topMode, setTopMode] = useState("chat"); // "chat" | "records" | "insights"
  const [sidebarMode, setSidebarMode] = useState("chat"); // "chat" | "records" | "insights" | "settings"
  const [activePage, setActivePage] = useState("chat-landing"); // current active page id
  const [prevTopMode, setPrevTopMode] = useState("chat"); // remember mode before settings

  /* ─── Chat state ─── */
  const [chatHistory, setChatHistory] = useState([]);
  const [activeChatId, setActiveChatId] = useState(null);

  /* ─── Copilot state (for PlaybooksPage) ─── */
  const [skillsCopilotOpen, setSkillsCopilotOpen] = useState(false);
  const [skillsCopilotClosing, setSkillsCopilotClosing] = useState(false);
  const [skillsCopilotInput, setSkillsCopilotInput] = useState("");
  const [skillsCopilotMessages, setSkillsCopilotMessages] = useState([]);
  const [skillsCopilotReady, setSkillsCopilotReady] = useState(true);
  const skillsCopilotEndRef = useRef(null);

  const handleSkillsCopilotClose = useCallback(() => {
    setSkillsCopilotClosing(true);
    setTimeout(() => { setSkillsCopilotClosing(false); setSkillsCopilotOpen(false); }, 300);
  }, []);

  const handleSkillsCopilotOpen = useCallback(() => {
    setSkillsCopilotOpen(true);
    if (skillsCopilotMessages.length === 0) {
      setSkillsCopilotMessages([
        { role: "ai", text: "I\u2019ve set up your Marketing skill playbooks. Each one is a strategic brief that guides how the agent engages shoppers at different lifecycle moments." },
        { role: "ai", text: "You can review, customize, or create new playbooks. I\u2019ll help you define the right goals, audience, and guardrails for each one." },
      ]);
    }
  }, [skillsCopilotMessages.length]);

  const handleSkillsCopilotSend = useCallback(() => {
    if (!skillsCopilotInput.trim()) return;
    const userText = skillsCopilotInput.trim();
    setSkillsCopilotInput("");
    setSkillsCopilotMessages((prev) => [...prev, { role: "user", text: userText }]);
    setTimeout(() => {
      setSkillsCopilotMessages((prev) => [...prev, { role: "ai", text: "That's a great question! Let me look into that for you." }]);
    }, 1200);
  }, [skillsCopilotInput]);

  useEffect(() => {
    if (skillsCopilotEndRef.current) {
      setTimeout(() => skillsCopilotEndRef.current?.scrollIntoView({ behavior: "smooth", block: "end" }), 100);
    }
  }, [skillsCopilotMessages]);

  /* ─── Top mode change handler ─── */
  const handleChangeMode = (mode) => {
    setTopMode(mode);
    setSidebarMode(mode);
    if (mode === "chat") {
      setActivePage(activeChatId ? "chat-conversation" : "chat-landing");
    } else if (mode === "records") {
      setActivePage("inbox");
    } else if (mode === "insights") {
      setActivePage("insights");
    }
  };

  /* ─── Chat handlers ─── */
  const handleStartChat = (text) => {
    const newChat = {
      id: Date.now().toString(),
      title: text.length > 40 ? text.substring(0, 40) + "..." : text,
      messages: [{ role: "user", text }],
    };
    setChatHistory(prev => [newChat, ...prev]);
    setActiveChatId(newChat.id);
    setActivePage("chat-conversation");
  };

  const handleNewChat = () => {
    setActiveChatId(null);
    setActivePage("chat-landing");
  };

  const handleSelectChat = (chatId) => {
    setActiveChatId(chatId);
    setActivePage("chat-conversation");
  };

  /* ─── Navigation handlers ─── */
  const handleNavigate = (pageId) => setActivePage(pageId);

  const handleSwitchToSettings = () => {
    setPrevTopMode(topMode);
    setSidebarMode("settings");
    setActivePage("identity");
  };

  const handleBackFromSettings = () => {
    setSidebarMode(prevTopMode);
    setTopMode(prevTopMode);
    if (prevTopMode === "chat") {
      setActivePage(activeChatId ? "chat-conversation" : "chat-landing");
    } else if (prevTopMode === "records") {
      setActivePage("inbox");
    } else {
      setActivePage("insights");
    }
  };

  /* ─── Determine page content ─── */
  let pageContent;

  switch (activePage) {
    /* ─── Chat pages ─── */
    case "chat-landing":
      pageContent = (<ChatLandingPage onStartChat={handleStartChat} />);
      break;
    case "chat-conversation":
      const activeChat = chatHistory.find(c => c.id === activeChatId);
      pageContent = activeChat ? (<ChatConversationPage key={activeChatId} chatData={activeChat} />) : (<ChatLandingPage onStartChat={handleStartChat} />);
      break;

    /* ─── Settings pages ─── */
    case "identity":
      pageContent = (<IdentityPage />);
      break;
    case "knowledge":
      pageContent = (<KnowledgePage />);
      break;
    case "tools":
      pageContent = (<ToolsPage />);
      break;
    case "playbooks-nav":
      pageContent = (
        <PlaybooksPage
          copilotOpen={false}
          copilotClosing={false}
          handleCloseCopilot={() => {}}
          handleOpenCopilot={() => {}}
          copilotReady={true}
          copilotMessages={[]}
          setCopilotMessages={() => {}}
          copilotInput=""
          setCopilotInput={() => {}}
          handleCopilotSend={() => {}}
          copilotEndRef={{ current: null }}
          addCopilotMessage={() => {}}
        />
      );
      break;
    case "lifecycle-nav":
      pageContent = (<LifecyclePage />);
      break;
    case "guardrails-nav":
      pageContent = (<GuardrailsPage />);
      break;
    case "channels":
      pageContent = (<PlaceholderPage title="Channels" description="Manage the communication channels your agent operates on — email, SMS, chat, and social. Configure channel-specific settings and preferences." />);
      break;
    case "integrations":
      pageContent = (<PlaceholderPage title="Integrations" description="Connect your favorite tools and platforms. Manage Shopify, Klaviyo, and other integrations that power your agent's capabilities." />);
      break;
    case "users":
      pageContent = (<PlaceholderPage title="Users" description="Manage team members, roles, and permissions. Control who can configure the agent, review conversations, and access different parts of the platform." />);
      break;
    case "billing":
      pageContent = (<PlaceholderPage title="Billing and usage" description="Track your usage, manage your subscription, and view billing history. Monitor agent activity and costs across all channels." />);
      break;
    case "notifications":
      pageContent = (<PlaceholderPage title="Notifications" description="Configure how and when you receive notifications. Manage alerts for escalations, campaign updates, and system events across email, in-app, and mobile channels." />);
      break;

    /* ─── Records pages ─── */
    case "inbox":
      pageContent = (<InboxPage />);
      break;
    case "outreach":
      pageContent = (<OutreachPage />);
      break;
    case "customers":
      pageContent = (<CustomersPage />);
      break;
    case "logs":
      pageContent = (<LogsPage />);
      break;

    /* ─── Insights pages ─── */
    case "insights":
      pageContent = (<InsightsPage />);
      break;
    case "insights-voice":
      pageContent = (<InsightsPage categoryFilter="voice" />);
      break;
    case "insights-knowledge":
      pageContent = (<InsightsPage categoryFilter="knowledge" />);
      break;
    case "insights-playbooks":
      pageContent = (<InsightsPage categoryFilter="playbooks" />);
      break;
    case "insights-tools":
      pageContent = (<InsightsPage categoryFilter="tools" />);
      break;
    case "insights-guardrails":
      pageContent = (<InsightsPage categoryFilter="guardrails" />);
      break;

    default:
      pageContent = (<PlaceholderPage title="Page" description="This page is under construction." />);
  }

  const showTopHeader = sidebarMode !== "settings";

  /* ─── Onboarding gates ─── */
  if (onboardingPhase === "signup") {
    return (
      <SignupPage onSubmit={(profile) => {
        setUserProfile(profile);
        setOnboardingPhase("analysis");
      }} />
    );
  }

  if (onboardingPhase === "analysis") {
    return (
      <OnboardingChatPage
        profile={userProfile}
        onComplete={() => setOnboardingPhase("done")}
      />
    );
  }

  /* ─── Main product (onboarding complete) ─── */
  return (
    <div style={{ display: "flex", flexDirection: "column", height: "100vh", background: BG }}>
      {/* Top header with mode switcher */}
      {showTopHeader && <TopHeader topMode={topMode} onChangeMode={handleChangeMode} />}

      {/* Main content area: sidebar + page */}
      <div style={{ display: "flex", flex: 1, overflow: "hidden" }}>
        <SidebarNav
          sidebarMode={sidebarMode}
          activePage={activePage}
          onNavigate={handleNavigate}
          onSwitchToSettings={handleSwitchToSettings}
          onBackFromSettings={handleBackFromSettings}
          topMode={topMode}
          chatHistory={chatHistory}
          onNewChat={handleNewChat}
          onSelectChat={handleSelectChat}
        />
        {pageContent}
      </div>
    </div>
  );
}


class __ErrorBoundary__ extends React.Component {
  constructor(props) { super(props); this.state = { hasError: false, error: null, info: null }; }
  static getDerivedStateFromError(error) { return { hasError: true, error }; }
  componentDidCatch(error, info) {
    console.error('REACT_CRASH:', error.message);
    console.error('COMPONENT_STACK:', info.componentStack);
  }
  render() {
    if (this.state.hasError) {
      return React.createElement('div', {style:{color:'red',padding:40,fontSize:16,fontFamily:'monospace',whiteSpace:'pre-wrap'}},
        'React Error: ' + this.state.error.message + '\n\nCheck browser console for details.');
    }
    return this.props.children;
  }
}
window.addEventListener('error', function(e) {
  console.error('GLOBAL_ERROR:', e.message, e.filename, e.lineno);
  var d = document.createElement('div');
  d.style.cssText = 'position:fixed;top:0;left:0;right:0;padding:20px;background:red;color:white;font:14px monospace;z-index:99999;white-space:pre-wrap';
  d.textContent = 'JS ERROR: ' + e.message + ' (line ' + e.lineno + ')';
  document.body.appendChild(d);
});
ReactDOM.createRoot(document.getElementById('root')).render(
  React.createElement(__ErrorBoundary__, null, React.createElement(__default__))
);
</script>
