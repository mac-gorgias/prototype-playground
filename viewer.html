<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prototype Viewer</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { overflow: hidden; height: 100vh; background: #F8F7F6; }

    .back-btn {
      position: fixed; top: 14px; left: 14px; z-index: 9999;
      display: flex; align-items: center; gap: 6px;
      padding: 7px 14px 7px 10px; border-radius: 10px;
      border: 1px solid rgba(0,0,0,0.08);
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      color: #6B6B6B; font-size: 12.5px; font-weight: 500;
      font-family: 'DM Sans', -apple-system, sans-serif;
      cursor: pointer; text-decoration: none;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.03);
      transition: all 0.2s ease;
      opacity: 0.55;
    }
    .back-btn:hover {
      opacity: 1;
      border-color: rgba(0,0,0,0.12);
      color: #1A1A1A;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08), 0 1px 3px rgba(0,0,0,0.04);
    }
    .back-btn svg {
      width: 14px; height: 14px; stroke: currentColor; fill: none;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
    }

    iframe {
      width: 100%; height: 100vh; border: none; display: block;
    }
  </style>
</head>
<body>
  <a class="back-btn" href="./" id="backBtn">
    <svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
    Back to projects
  </a>
  <iframe id="viewer" sandbox="allow-scripts allow-same-origin allow-popups allow-forms"></iframe>

  <script>
    const params = new URLSearchParams(window.location.search);
    const file = params.get('file');
    if (file) {
      document.getElementById('viewer').src = 'prototypes/' + file;
      // Update page title from prototype name
      fetch('prototypes.json')
        .then(r => r.json())
        .then(data => {
          const proto = data.find(p => p.file === file);
          if (proto) document.title = proto.name;
        })
        .catch(() => {});
    } else {
      window.location.href = './';
    }
  </script>
</body>
</html>
