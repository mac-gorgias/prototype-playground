<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prototype Viewer</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { overflow: hidden; height: 100vh; background: #F8F7F6; }

    iframe {
      width: 100%; height: 100vh; border: none; display: block;
    }
  </style>
</head>
<body>
  <iframe id="viewer" sandbox="allow-scripts allow-same-origin allow-popups allow-forms"></iframe>

  <script>
    const params = new URLSearchParams(window.location.search);
    const file = params.get('file');
    if (file) {
      document.getElementById('viewer').src = 'prototypes/' + file;
      // Update page title from prototype name
      fetch('prototypes.json')
        .then(r => r.json())
        .then(data => {
          const proto = data.find(p => p.file === file);
          if (proto) document.title = proto.name;
        })
        .catch(() => {});
    } else {
      window.location.href = './';
    }
  </script>
</body>
</html>
