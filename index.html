<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mac's Prototype Playground</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #F8F7F6;
      --surface: #FFFFFF;
      --border: rgba(0,0,0,0.06);
      --border-hover: rgba(0,0,0,0.12);
      --text-primary: #1A1A1A;
      --text-secondary: #6B6B6B;
      --text-tertiary: #9A9A9A;
      --text-muted: #C0C0C0;
      --accent: #683FCF;
      --accent-light: rgba(104,63,207,0.08);
      --accent-border: rgba(104,63,207,0.3);
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.04), 0 1px 4px rgba(0,0,0,0.02);
      --shadow-md: 0 2px 8px rgba(0,0,0,0.06), 0 1px 4px rgba(0,0,0,0.03);
      --shadow-hover: 0 4px 16px rgba(0,0,0,0.08), 0 2px 6px rgba(0,0,0,0.04);
      --font: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      --mono: 'DM Mono', 'SF Mono', monospace;
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text-primary);
      font-family: var(--font);
      -webkit-font-smoothing: antialiased;
    }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes cardIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 3px; }

    .container { max-width: 1200px; margin: 0 auto; padding: 0 40px; }
    @media (max-width: 640px) { .container { padding: 0 20px; } }

    /* Header */
    .header { padding-top: 36px; animation: fadeIn 0.5s ease; }
    .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
    .header-brand { display: flex; align-items: center; gap: 12px; }
    .header-icon {
      width: 34px; height: 34px; border-radius: 10px;
      background: linear-gradient(135deg, var(--accent), #8B6AD8);
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; color: white;
    }
    .header-title {
      font-size: 19px; font-weight: 650; letter-spacing: -0.025em; color: var(--text-primary);
    }
    .header-meta { display: flex; align-items: center; gap: 10px; }
    .header-count { font-size: 11.5px; color: var(--text-tertiary); font-family: var(--mono); }
    .header-subtitle {
      margin-left: 46px; font-size: 13px; color: var(--text-tertiary); font-weight: 400;
    }

    /* Search */
    .toolbar { padding-top: 28px; animation: fadeIn 0.5s ease 0.1s both; }
    .search-wrap { position: relative; }
    .search-icon {
      position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
      color: var(--text-muted); font-size: 14px; pointer-events: none;
    }
    .search-input {
      width: 100%; padding: 11px 18px 11px 40px; border-radius: 12px;
      border: 1px solid var(--border); background: var(--surface);
      color: var(--text-primary); font-size: 13.5px; font-family: var(--font); outline: none;
      transition: all 0.15s ease; box-shadow: var(--shadow-sm);
    }
    .search-input::placeholder { color: var(--text-muted); }
    .search-input:focus {
      border-color: var(--accent-border); box-shadow: var(--shadow-md), 0 0 0 3px var(--accent-light);
    }

    /* Grid */
    .grid-area { padding: 24px 0 80px; }
    .grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px;
    }
    @media (max-width: 640px) { .grid { grid-template-columns: 1fr; } }

    .card {
      background: var(--surface); border-radius: 14px;
      border: 1px solid var(--border); overflow: hidden;
      cursor: pointer; transition: all 0.25s cubic-bezier(0.2, 0, 0, 1);
      text-decoration: none; color: inherit; display: block;
      box-shadow: var(--shadow-sm);
    }
    .card:hover {
      border-color: var(--border-hover); transform: translateY(-2px);
      box-shadow: var(--shadow-hover);
    }

    .card-preview {
      height: 180px; position: relative;
      display: flex; align-items: center; justify-content: center;
      border-bottom: 1px solid var(--border);
      overflow: hidden;
    }
    .card-preview-img {
      width: 100%; height: 100%; object-fit: cover; object-position: top;
    }
    .card-preview-lines { display: flex; flex-direction: column; gap: 6px; opacity: 0.6; width: 70%; }
    .card-preview-line { border-radius: 3px; }

    .card-hover-overlay {
      position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
      background: rgba(255,255,255,0); backdrop-filter: blur(0px);
      transition: all 0.25s ease; opacity: 0;
    }
    .card:hover .card-hover-overlay {
      background: rgba(255,255,255,0.6); backdrop-filter: blur(3px); opacity: 1;
    }
    .card-hover-label {
      padding: 8px 20px; border-radius: 8px; background: var(--accent);
      color: white; font-size: 13px; font-weight: 600; letter-spacing: -0.01em;
      box-shadow: 0 2px 8px rgba(104,63,207,0.3);
    }

    .card-body { padding: 14px 16px 16px; }
    .card-header { margin-bottom: 8px; }
    .card-title {
      font-size: 14px; font-weight: 600; color: var(--text-primary);
      letter-spacing: -0.01em; line-height: 1.3;
    }
    .card-desc {
      font-size: 12.5px; color: var(--text-secondary); line-height: 1.55;
      margin-bottom: 12px; display: -webkit-box; -webkit-line-clamp: 2;
      -webkit-box-orient: vertical; overflow: hidden;
    }
    .card-footer { display: flex; align-items: center; justify-content: space-between; }
    .card-author { display: flex; align-items: center; gap: 6px; }
    .card-avatar {
      width: 20px; height: 20px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 700; color: white;
    }
    .card-author-name { font-size: 12px; color: var(--text-secondary); font-weight: 450; }
    .card-date { font-size: 11px; color: var(--text-tertiary); }

    /* Empty */
    .empty { text-align: center; padding: 80px 20px; animation: fadeIn 0.3s ease; }
    .empty-icon { font-size: 32px; margin-bottom: 12px; opacity: 0.25; }
    .empty-text { color: var(--text-tertiary); font-size: 14px; }
    .empty-sub { color: var(--text-muted); font-size: 12.5px; margin-top: 6px; }

    /* Loading */
    .loading { text-align: center; padding: 80px 20px; }
    .loading-spinner {
      width: 24px; height: 24px; border: 2px solid rgba(0,0,0,0.08);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin 0.7s linear infinite; margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { color: var(--text-tertiary); font-size: 13px; }

    /* Footer */
    .footer-hint {
      position: fixed; bottom: 0; left: 0; right: 0;
      padding: 16px 40px; background: linear-gradient(transparent, var(--bg) 60%);
      display: flex; justify-content: center; pointer-events: none;
    }
    .footer-cmd {
      font-size: 11px; color: var(--text-muted); font-family: var(--mono);
      background: var(--surface); padding: 6px 14px; border-radius: 6px;
      border: 1px solid var(--border); box-shadow: var(--shadow-sm);
    }
  </style>
</head>
<body>

  <header class="container header">
    <div class="header-top">
      <div class="header-brand">
        <div class="header-icon">◈</div>
        <h1 class="header-title">Mac's Prototype Playground</h1>
      </div>
      <div class="header-meta">
        <span class="header-count" id="count"></span>
      </div>
    </div>
    <p class="header-subtitle">Gorgias Design Team</p>
  </header>

  <div class="container toolbar">
    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input class="search-input" type="text" placeholder="Search prototypes…" id="search">
    </div>
  </div>

  <div class="container grid-area">
    <div id="grid" class="grid"></div>
    <div id="empty" class="empty" style="display:none;">
      <div class="empty-icon">◇</div>
      <p class="empty-text">No prototypes yet</p>
      <p class="empty-sub">Publish your first one with /publish in Claude Code</p>
    </div>
    <div id="loading" class="loading">
      <div class="loading-spinner"></div>
      <p class="loading-text">Loading prototypes…</p>
    </div>
  </div>

  <div class="footer-hint">
    <span class="footer-cmd">/publish → Claude Code</span>
  </div>

  <script>
    let prototypes = [];
    let searchQuery = '';

    const COLORS = ['#683FCF','#3A7BE8','#E8723A','#10B981','#F59E0B','#EC4899','#06B6D4','#84CC16','#F97316','#6366F1','#14B8A6','#EF4444'];
    const authorColors = {};
    let colorIdx = 0;
    function getAuthorColor(name) {
      if (!authorColors[name]) { authorColors[name] = COLORS[colorIdx % COLORS.length]; colorIdx++; }
      return authorColors[name];
    }

    function formatDate(dateStr) {
      const d = new Date(dateStr + 'T00:00:00');
      const now = new Date();
      const diff = Math.floor((now - d) / 86400000);
      if (diff === 0) return 'Today';
      if (diff === 1) return 'Yesterday';
      if (diff < 7) return diff + 'd ago';
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }

    function previewHTML(p, color) {
      if (p.image) {
        return `<img class="card-preview-img" src="images/${p.image}" alt="${p.name}" />`;
      }
      return `
        <div class="card-preview-lines">
          <div class="card-preview-line" style="height:6px;background:${color};width:60%;opacity:0.35;"></div>
          <div class="card-preview-line" style="height:4px;background:rgba(0,0,0,0.06);width:90%;"></div>
          <div class="card-preview-line" style="height:4px;background:rgba(0,0,0,0.04);width:75%;"></div>
          <div style="display:flex;gap:6px;margin-top:6px;">
            <div style="height:22px;flex:1;background:rgba(0,0,0,0.03);border-radius:4px;"></div>
            <div style="height:22px;width:50px;background:${color}18;border-radius:4px;"></div>
          </div>
          <div class="card-preview-line" style="height:4px;background:rgba(0,0,0,0.04);width:85%;margin-top:4px;"></div>
          <div class="card-preview-line" style="height:4px;background:rgba(0,0,0,0.03);width:65%;"></div>
        </div>`;
    }

    function cardHTML(p, index) {
      const color = getAuthorColor(p.author);
      const href = p.url ? p.url : p.file ? 'viewer.html?file=' + encodeURIComponent(p.file) : '#';
      const target = p.url ? ' target="_blank"' : '';
      return `
        <a class="card" href="${href}"${target} style="animation: cardIn 0.4s cubic-bezier(0.2,0,0,1) ${index * 0.04}s both;">
          <div class="card-preview" style="${p.image ? '' : 'background: linear-gradient(135deg, ' + color + '10, ' + color + '06);'}">
            ${previewHTML(p, color)}
            <div class="card-hover-overlay">
              <span class="card-hover-label">Open Prototype →</span>
            </div>
          </div>
          <div class="card-body">
            <div class="card-header">
              <h3 class="card-title">${p.name}</h3>
            </div>
            <p class="card-desc">${p.description || ''}</p>
            <div class="card-footer">
              <div class="card-author">
                <div class="card-avatar" style="background:linear-gradient(135deg,${color},${color}AA);">${p.author[0]}</div>
                <span class="card-author-name">${p.author}</span>
              </div>
              <span class="card-date">${formatDate(p.date)}</span>
            </div>
          </div>
        </a>`;
    }

    function render() {
      const q = searchQuery.toLowerCase();
      const filtered = prototypes.filter(p => {
        if (q && !p.name.toLowerCase().includes(q) && !(p.description || '').toLowerCase().includes(q) && !p.author.toLowerCase().includes(q)) return false;
        return true;
      });

      const grid = document.getElementById('grid');
      const empty = document.getElementById('empty');

      if (filtered.length === 0) {
        grid.innerHTML = '';
        empty.style.display = 'block';
      } else {
        empty.style.display = 'none';
        grid.innerHTML = filtered.map((p, i) => cardHTML(p, i)).join('');
      }
    }

    document.getElementById('search').addEventListener('input', (e) => {
      searchQuery = e.target.value;
      render();
    });

    async function init() {
      try {
        const res = await fetch('prototypes.json');
        if (!res.ok) throw new Error('Failed to load');
        prototypes = await res.json();
      } catch (e) {
        prototypes = [];
      }

      document.getElementById('loading').style.display = 'none';
      const count = prototypes.length;
      document.getElementById('count').textContent = count + ' prototype' + (count !== 1 ? 's' : '');
      render();
    }

    init();
  </script>
</body>
</html>
